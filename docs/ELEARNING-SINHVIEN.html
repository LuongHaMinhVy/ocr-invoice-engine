Đọc nhanh (15')\r\nSửa lỗi an toàn: tái hiện → AI hỗ trợ tìm **root cause** (người xác nhận) → viết test bắt lỗi (đỏ) → sửa nhỏ nhất → full suite xanh. **Characterization test** = \"chụp ảnh\" hành vi hiện tại để refactor không vô tình đổi hành vi. Thêm tính năng vào Brownfield: hiểu vùng ảnh hưởng → spec hẹp → TDD → regression toàn cục.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Repo lạ + system map (M10) — repo nhóm khác hoặc [`lab-m10-11-brownfield`](10-lab-assets/lab-m10-11-brownfield/).\r\n- [ ] 2 yêu cầu bảo trì (1 bug, 1 tính năng) — vd [`MAINTENANCE-BRIEFS.md`](10-lab-assets/lab-m10-11-brownfield/MAINTENANCE-BRIEFS.md) của repo cho sẵn.\r\n\r\n---\r\n\r\n## Lab 11.1 — Sửa lỗi an toàn (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Fix bug không gây regression.\r\n\r\n📋 **Các bước**\r\n1. Tái hiện bug. Prompt root cause có kiểm soát:\r\n   ```\r\n   \"Lỗi: [mô tả + log]. Đề xuất TỐI ĐA 3 giả thuyết nguyên nhân, xếp theo khả\r\n   năng, kèm bằng chứng trong code/log. KHÔNG sửa code. Gợi ý cách kiểm chứng\r\n   nhanh từng giả thuyết.\"\r\n   ```\r\n2. **Xác nhận** root cause bằng kiểm chứng (không tin ngay).\r\n3. Viết test bắt lỗi (đỏ) → sửa nhỏ nhất → test xanh → **full suite**.\r\n4. Ghi `INC-###` vào `06-Maintenance/`.\r\n\r\n✅ **Checkpoint:** Bug hết, full suite xanh, có test bắt lỗi.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Giả thuyết AI xếp #1 có **đúng** không? Bạn bác/đổi dựa trên bằng chứng nào? (Chống \"sửa bừa che lỗi thật\".)\r\n\r\n📤 **Nộp:** `INC-###` + PR fix.\r\n\r\n---\r\n\r\n## Lab 11.2 — Refactor an toàn (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Dọn code mà giữ nguyên hành vi.\r\n\r\n📋 **Các bước**\r\n1. Chọn 1 module rối. **Viết characterization test** chốt hành vi hiện tại TRƯỚC.\r\n2. Refactor từng bước nhỏ (có thể nhờ AI), test giữ xanh.\r\n\r\n✅ **Checkpoint:** Code sạch hơn, characterization test luôn xanh.\r\n\r\n🔍 **Thẩm định:** Có bước refactor nào làm test đỏ không? Đó là lúc bạn **suýt gây regression** — ghi lại.\r\n\r\n📤 **Nộp:** Code refactor + characterization test.\r\n\r\n---\r\n\r\n## Lab 11.3 — Thêm tính năng + Feedback loop (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Mở rộng Brownfield an toàn.\r\n\r\n📋 **Các bước**\r\n1. Viết spec hẹp cho tính năng mới (bám system map vùng ảnh hưởng).\r\n2. TDD trong phạm vi hẹp → chạy **regression toàn cục**.\r\n3. Ghi feedback loop (giả lập phản hồi người dùng) vào `06-Maintenance/`.\r\n\r\n✅ **Checkpoint:** Tính năng mới + 0 regression.\r\n\r\n🔍 **Thẩm định:** Bằng chứng nào chứng minh bạn **không phá** chức năng cũ? (full suite + ảnh kết quả.)\r\n\r\n📤 **Nộp:** Tính năng + báo cáo regression (mốc Capstone: Pha B hoàn thành).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn vừa làm đúng thứ fresher gặp đầu tiên khi đi làm: **kế thừa & sửa code người khác** một cách an toàn — với AI làm trợ thủ.\r\n"}]},{"name":"Giai đoạn 5 — Quản trị, Đội ngũ & Tốt nghiệp","color":"#c08532","modules":[{"id":"M12","title":"Rủi ro, Governance & Human-AI Collaboration","theory":"# M12 — Rủi ro, Governance & Human-AI Collaboration\r\n\r\n> **Giai đoạn:** GĐ5 (Quản trị) · **CASAN:** Standard\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M0–M11\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Human-in-the-loop & Quality gates](09-so-do-truc-quan/12-human-in-the-loop-gates.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nTới đây học viên đã dùng AI khắp SDLC. Module này lùi lại một bước để hỏi: *làm sao dùng AI một cách **có trách nhiệm & an toàn**?* Đây là phần biến một \"người dùng AI nhanh\" thành một \"kỹ sư đáng tin cậy\" — thứ doanh nghiệp thực sự cần. Tổng hợp toàn bộ tinh thần \"Trust but Verify\" của khóa thành quy trình & checklist.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Liệt kê & nhận diện **rủi ro AI** trong SDLC.\r\n- [ ] Đánh giá **artifact AI** (yêu cầu/thiết kế/code/test) một cách hệ thống.\r\n- [ ] Thiết kế **quality gate** & checkpoint Human-in-the-loop.\r\n- [ ] Lập **Human-AI Responsibility Matrix**.\r\n- [ ] Thực hiện **AI Failure Analysis** (phân tích sự cố do AI).\r\n- [ ] Xây **AI Governance Checklist**.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| F — Tổ chức & Governance | Quản trị rủi ro, quality gate |\r\n| A — Thẩm định | Đánh giá artifact có hệ thống |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Rủi ro trong AI-Driven SE\r\n- **Hallucination** & sai sự thật. **Output mơ hồ/thiếu**. **Lỗ hổng bảo mật**. **Technical debt** do AI. **Over-reliance** (phụ thuộc, thui chột kỹ năng).\r\n\r\n### 4.2 Đánh giá artifact AI\r\nMỗi loại artifact có cách review riêng: requirement (truy nguồn), design (trade-off), code (spec+bảo mật), test (test thật?). Tổng hợp từ M4–M11.\r\n\r\n### 4.3 Human-in-the-loop vs on-the-loop\r\nChọn mức giám sát theo rủi ro: việc rủi ro cao (bảo mật, dữ liệu, tiền) → in-the-loop; việc rủi ro thấp → on-the-loop.\r\n\r\n### 4.4 Quality gate & Responsibility Matrix\r\n- **Quality gate:** điểm bắt buộc review trước khi đi tiếp (spec approved, PR review, security pass).\r\n- **Responsibility Matrix:** ai (người/AI) làm gì, ai chịu trách nhiệm ở mỗi giai đoạn.\r\n\r\n### 4.5 Trust but Verify & Responsible AI\r\nKhông dùng dữ liệu nhạy cảm bừa bãi; ghi nhận giới hạn; con người chịu trách nhiệm cuối — *AI không chịu trách nhiệm thay bạn*.\r\n\r\n### 4.6 ⭐ Local storage ≠ Local processing (chủ quyền dữ liệu)\r\nMột hiểu lầm phổ biến & nguy hiểm: *\"Mình dùng Obsidian + agent chạy trên máy → dữ liệu khách hàng an toàn, không lên cloud.\"* **SAI một nửa.**\r\n\r\n| | Lưu trữ (storage) | Xử lý (processing) |\r\n|---|---|---|\r\n| Obsidian vault | ✅ cục bộ trên máy bạn | — |\r\n| Antigravity / coding agent | (cache/log có thể cục bộ) | ⚠️ **MẶC ĐỊNH gửi ngữ cảnh lên LLM đám mây** (Gemini/Claude…); chỉ cục bộ thật nếu dùng model self-host (Ollama) |\r\n\r\nKhi agent đọc meeting notes / email khách để bóc tách yêu cầu, **nội dung đó ĐÃ rời máy bạn lên cloud của nhà cung cấp model**. Lưu cục bộ *không* đồng nghĩa xử lý cục bộ.\r\n\r\n**Hệ quả & quy tắc:**\r\n- Dữ liệu khách nhạy cảm (PII, tài chính, y tế) → cân nhắc *trước khi* cho agent cloud đọc; ẩn danh hoá nếu cần.\r\n- ⚖️ **Pháp lý VN — Nghị định 13/2023/NĐ-CP** về bảo vệ dữ liệu cá nhân: đưa **dữ liệu cá nhân** lên dịch vụ AI đám mây (xuyên biên giới) có ràng buộc pháp lý. Fresher cần biết: *không tự ý đẩy PII của khách lên LLM cloud* — phải theo chính sách dữ liệu của doanh nghiệp.\r\n- Muốn xử lý thật sự cục bộ → cần *model chạy local* (vd Ollama), không phải agent cloud.\r\n- Đây cũng là lý do **không nạp secret/dữ liệu nhạy cảm vào supermemory** (nhắc lại từ M1/M3).\r\n\r\n> 🔍 Đây là **case study thẩm định mẫu**: một khẳng định nghe rất hợp lý (\"local-first nên an toàn\") nhưng sai về kỹ thuật — đúng kiểu fresher dễ tin. Biết bóc tách *storage vs processing* chính là năng lực thẩm định khóa học theo đuổi.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Nhận diện rủi ro AI và biết cách \"mổ xẻ\" một sự cố thật do AI gây ra | Đọc 4.1–4.3 để nắm 5 nhóm rủi ro (hallucination, output mơ hồ, lỗ hổng bảo mật, technical debt, over-reliance); xem lại cách review từng loại artifact (requirement/design/code/test); phân biệt human-in-the-loop với on-the-loop và biết chọn mức giám sát theo rủi ro; sau đó vào **Lab 12.1**: lấy tình huống tính năng AI sinh ra \"chạy ngon trong demo nhưng sập trên production\", bạn truy ngược root cause, đánh giá rủi ro và thiết kế lại workflow Người–AI để chặn lỗi tái diễn | Bạn hiểu lỗi thường không phải \"tại AI\" mà do quy trình thiếu quality gate; nộp được `AI Failure Analysis Report` (lỗi → root cause → checkpoint chặn tái diễn) | 3h | Lab 12.1 — AI Failure Analysis |\r\n| 2 | Tự xây bộ \"khung quản trị\" cho dự án và hiểu đúng về chủ quyền dữ liệu | Đọc 4.4–4.6: cách đặt quality gate (spec approved, PR review, security pass), cách lập Responsibility Matrix (ai/AI làm gì, ai chịu trách nhiệm), tinh thần Trust but Verify, và phân biệt cốt lõi \"local storage ≠ local processing\" — vì sao agent cloud vẫn gửi dữ liệu khách lên LLM dù bạn lưu file cục bộ (lưu ý Nghị định 13/2023/NĐ-CP về dữ liệu cá nhân); sau đó vào **Lab 12.2**: thiết lập quality gate + Responsibility Matrix + AI Governance Checklist (quality/security/human oversight) cho dự án Capstone của bạn; cuối buổi chốt lại và rà soát toàn bộ deliverable trước khi nộp | Bạn có bộ governance hoàn chỉnh áp thẳng vào Capstone và tránh được bẫy \"local-first nên an toàn\"; nộp được Quality gate + Responsibility Matrix + Checklist | 3h | Lab 12.2 — Governance kit |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Tình huống AI Failure (cho Lab 12.1)\r\n```\r\nMột tính năng do AI sinh được deploy: nó \"hoạt động\" trong demo nhưng trên\r\nproduction gây lỗi (vd: không validate input → lộ dữ liệu / sập service khi\r\ntải cao). Truy: vì sao lọt qua? Thiếu checkpoint nào?\r\n```\r\n\r\n### Khung Responsibility Matrix\r\n```\r\n| Giai đoạn | AI làm | Người làm | Người chịu trách nhiệm |\r\n| Spec      | nháp   | duyệt     | BA/Lead |\r\n| Code      | sinh   | review    | Dev |\r\n| Deploy    | hỗ trợ | quyết định| DevOps/Lead |\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 12.1 — AI Failure Analysis (120 phút):** Phân tích tình huống sự cố: xác định lỗi, root cause, đánh giá rủi ro, **thiết kế lại workflow Người–AI** để chặn lỗi tái diễn. *Kết quả:* `AI Failure Analysis Report`.\r\n\r\n**Lab 12.2 — Governance kit (120 phút):** Lập Quality gate cho dự án Capstone + Responsibility Matrix + AI Governance Checklist (quality/security/human oversight). *Kết quả:* bộ governance áp vào Capstone.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| AI Failure Analysis Report | `06-Maintenance/` | `[[note]]` |\r\n| Quality gate + Responsibility Matrix + Checklist | `02-Design/` hoặc `_MOC` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Phân tích rủi ro | Nhận diện lỗi | Tìm root cause | Thiết kế checkpoint chặn tái diễn |\r\n| **Tư duy governance** | Biết \"verify\" | Có quality gate | Responsibility Matrix rõ + ownership đúng |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Đổ lỗi cho AI** thay vì sửa quy trình. *Phòng:* Lab 12.1.\r\n- ⚠️ **Quality gate hình thức** (duyệt cho có). *Phòng:* gắn tiêu chí đo được.\r\n- ⚠️ Đưa dữ liệu nhạy cảm vào công cụ đám mây. *Phòng:* 4.5.\r\n- ⚠️ **Tin \"local-first nên an toàn\"** mà quên agent gửi dữ liệu lên LLM cloud. *Phòng:* phân biệt storage vs processing (4.6).\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Khi AI viết code gây sự cố production, *ai* chịu trách nhiệm? Vì sao?\r\n- Quality gate nào là \"không thể thiếu\" dù có làm chậm?\r\n- \"Dùng Obsidian local nên dữ liệu khách an toàn\" — đúng hay sai? Khi nào dữ liệu thực sự rời máy bạn? (storage vs processing)\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Áp **bộ governance** vào quy trình Capstone của nhóm và ghi vào `_MOC`.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 4 — Human-AI Collaboration and Governance).\r\n","lab":"# Lab Guide — M12: Rủi ro, Governance & Human-AI Collaboration\r\n\r\n> Bám module [M12](02-modules/M12-rui-ro-governance.md). Workshop-style · 2 lab · ~6 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nRủi ro AI: hallucination, output mơ hồ/thiếu, lỗ hổng bảo mật, technical debt, **over-reliance**. **Quality gate** = điểm bắt buộc review trước khi đi tiếp. **Responsibility Matrix** = ai (người/AI) làm gì, ai chịu trách nhiệm. Nguyên tắc: *Trust but Verify*; **AI không chịu trách nhiệm thay bạn**. Chọn Human-in-the-loop (rủi ro cao) vs on-the-loop (rủi ro thấp).\r\n\r\n⭐ **Local storage ≠ local processing:** Obsidian lưu cục bộ, nhưng coding agent **gửi ngữ cảnh lên LLM đám mây** khi xử lý. \"Dùng local nên an toàn\" là khẳng định *sai* — dữ liệu khách đã rời máy bạn. Đây là case thẩm định mẫu.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Tình huống sự cố do giảng viên phát (tính năng AI gây lỗi production).\r\n- [ ] Dự án Capstone của nhóm.\r\n\r\n---\r\n\r\n## Lab 12.1 — AI Failure Analysis (⏱️ 120', nhóm)\r\n\r\n🎯 **Mục tiêu:** Phân tích sự cố & thiết kế lại quy trình để chặn tái diễn.\r\n\r\n📋 **Các bước**\r\n1. Đọc tình huống: tính năng AI sinh \"chạy trong demo\" nhưng production gây lỗi (vd không validate input → lộ dữ liệu / sập khi tải cao).\r\n2. Trả lời: **lỗi gì? root cause? vì sao lọt qua? thiếu checkpoint nào?**\r\n3. **Thiết kế lại workflow Người–AI** để chặn lỗi này.\r\n4. Viết `AI Failure Analysis Report` (issues · root causes · risk).\r\n\r\n✅ **Checkpoint:** Report đủ 3 phần + workflow sửa.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Lỗi này **của AI hay của quy trình**? Chỉ ra quality gate cụ thể nào lẽ ra đã chặn được.\r\n\r\n📤 **Nộp:** `AI Failure Analysis Report` vào `06-Maintenance/`.\r\n\r\n---\r\n\r\n## Lab 12.2 — Governance kit cho Capstone (⏱️ 120', nhóm)\r\n\r\n🎯 **Mục tiêu:** Áp governance vào dự án thật.\r\n\r\n📋 **Các bước**\r\n1. Lập **Quality gate** cho Capstone (vd: spec approved, PR review, security pass, test \"đập code\").\r\n2. Lập **Human-AI Responsibility Matrix** (giai đoạn × AI làm / người làm / người chịu trách nhiệm).\r\n3. Lập **AI Governance Checklist** (quality / security / human oversight).\r\n\r\n✅ **Checkpoint:** 3 sản phẩm gắn vào `_MOC` của vault.\r\n\r\n🔍 **Thẩm định:** Mỗi quality gate có **đo được** không, hay chỉ \"duyệt cho có\"? Sửa cho cụ thể.\r\n\r\n📤 **Nộp:** Governance kit (mốc Capstone: governance áp dụng).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn chuyển từ \"người dùng AI nhanh\" → \"kỹ sư đáng tin\": có cơ chế chặn lỗi, không đổ lỗi cho AI.\r\n"},{"id":"M13","title":"Tổ chức & Quản lý đội ngũ Developer thời AI","theory":"# M13 — Tổ chức & Quản lý đội ngũ Developer thời AI Agent\r\n\r\n> **Giai đoạn:** GĐ5 (Quản trị) · **CASAN:** Standard → Automated\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M0–M12\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Vòng đời AI-Driven SDLC](09-so-do-truc-quan/01-vong-doi-ai-sdlc.html) (vai trò Người–AI)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nPhương pháp phát triển mới không chỉ đổi *cách viết code*, mà đổi *cách tổ chức con người*. Fresher cần hiểu mình sẽ làm việc trong **đội hình nào**, vai trò mình ra sao, ai chịu trách nhiệm gì — để hòa nhập doanh nghiệp nhanh. Module này giúp học viên nhìn bức tranh tổ chức: vai trò tiến hóa, đội ít người điều phối nhiều agent, đo lường hiệu quả, và rủi ro con người (thui chột kỹ năng). Đây cũng là phần giúp học viên *nói chuyện được với quản lý* — một lợi thế lớn khi đi xin việc.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Mô tả **vai trò tiến hóa** (BA, Architect, Dev, QA, DevOps, Lead, PM) thời AI.\r\n- [ ] Mô tả **cấu trúc đội mới**: mỗi dev điều phối nhiều agent; vai \"orchestrator/reviewer\".\r\n- [ ] Thiết kế **quy trình làm việc nhóm** Người–AI với checkpoint.\r\n- [ ] Chọn **metrics** đo hiệu quả (lead time, defect rate, rework...).\r\n- [ ] Nhận diện rủi ro **skill atrophy** và cách mentoring junior thời AI.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| F — Tổ chức & Governance | Thiết kế đội & quy trình |\r\n| C — Quy trình | Đo lường & cải tiến |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Vai trò tiến hóa — *đổi trách nhiệm, không biến mất*\r\n| Vai trò | Trước | Thời AI |\r\n|---|---|---|\r\n| BA | Thu thập yêu cầu | Đặc tả AI-Ready, kiểm yêu cầu AI |\r\n| Architect | Vẽ thiết kế | Định khung & duyệt phương án AI đề xuất |\r\n| Developer | Gõ code | Điều phối agent + review + chịu trách nhiệm |\r\n| QA | Viết test tay | Thiết kế chiến lược test, bắt test giả |\r\n| DevOps | Vận hành | Tự động hóa + giám sát AI trong pipeline |\r\n| Lead/PM | Quản tiến độ | Thiết kế quy trình Người–AI, quality gate |\r\n\r\n### 4.2 Cấu trúc đội mới\r\nĐội nhỏ hơn, mỗi người **năng suất cao hơn nhờ điều phối nhiều agent**. Xuất hiện vai trò *orchestrator* (điều phối) và *reviewer* (thẩm định) là trọng tâm. Code ownership & accountability vẫn thuộc *con người*.\r\n\r\n### 4.3 Quy trình làm việc nhóm Người–AI\r\nKết hợp Responsibility Matrix (M12) + quality gate + Git workflow. Định rõ: ai duyệt spec, ai review PR, ai quyết deploy.\r\n\r\n### 4.4 Đo lường hiệu quả\r\nLead Time, Defect Rate, Rework Effort, PR throughput, Documentation Quality. *Cảnh báo:* đừng đo \"số dòng code\" — vô nghĩa thời AI.\r\n\r\n### 4.5 Rủi ro con người: skill atrophy & mentoring\r\nJunior dễ \"bấm Accept-All\" mà không học nền tảng → thui chột. Mentoring thời AI: bắt giải thích *vì sao*, review có người kèm, luân phiên làm phần không-AI để giữ nền tảng.\r\n\r\n### 4.6 Nghi thức Agile/Scrum trong đội có AI\r\nKhi AI là \"thành viên ảo\" được ủy thác việc, các nghi thức Scrum vẫn giữ — nhưng đổi nội dung:\r\n- **Sprint Planning:** chọn việc *người làm* vs việc *ủy thác cho agent*; ước lượng kèm thời gian **thẩm định** đầu ra AI, không chỉ thời gian \"viết\".\r\n- **Daily Standup:** mỗi người nêu *việc mình làm* tách bạch *việc đã giao cho agent* và trạng thái review — agent không \"tự báo cáo\", người chịu trách nhiệm báo thay.\r\n- **Sprint Review:** demo sản phẩm; nói rõ phần nào AI sinh, phần nào đã được người thẩm định/sửa.\r\n- **Retrospective:** rút kinh nghiệm *chỗ AI sai và chỗ thẩm định bị sót* → cập nhật checklist/quality gate cho sprint sau.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Hiểu vai trò tiến hóa & cấu trúc đội thời AI rồi tự thiết kế một đội cho dự án thật | Đọc 4.1 để thấy 7 vai trò (BA, Architect, Dev, QA, DevOps, Lead/PM) *đổi trách nhiệm chứ không biến mất*; học 4.2 về đội nhỏ hơn nhưng mỗi người điều phối nhiều agent, nắm rõ hai vai trọng tâm \"orchestrator\" và \"reviewer\"; ghi nhớ nguyên tắc code ownership & accountability vẫn thuộc về con người; sau đó vào **Lab 13.1**: nhận kịch bản startup 5 người làm web app 3 tháng, bạn phân vai (ai orchestrate phần nào, ai review, ai chịu trách nhiệm deploy), vẽ quy trình từ spec → ship kèm quality gate và quyết Human-in/on-the-loop ở từng khâu | Một tài liệu \"Mô hình tổ chức đội\" 1–2 trang: sơ đồ tổ chức + quy trình Người–AI + Responsibility Matrix + các quality gate, nhất quán với governance đã học ở M12 | 3h | Lab 13.1 |\r\n| 2 | Biết chọn đúng metrics đo hiệu quả và lập kế hoạch mentoring chống thui chột kỹ năng | Đọc 4.3 để chốt rõ ai duyệt spec, ai review PR, ai quyết deploy (kết hợp Responsibility Matrix + quality gate + Git workflow); học 4.4 các metrics nên dùng (Lead Time, Defect Rate, Rework Effort, PR throughput, Documentation Quality) và *tránh đo số dòng code* vì vô nghĩa thời AI; nghiền ngẫm 4.5 về rủi ro skill atrophy khi junior chỉ \"bấm Accept-All\"; vào **Lab 13.2**: bạn chọn 4–5 metrics phù hợp kèm cách thu thập từng cái, rồi viết kế hoạch mentoring junior (bắt giải thích *vì sao*, review có người kèm, luân phiên làm phần không-AI để giữ nền tảng); cuối buổi tự chốt lại toàn bộ output và đối chiếu với rubric ở mục 9 | Bảng 4–5 metrics có cách thu thập rõ ràng + một kế hoạch mentoring chống skill atrophy thuyết phục; cả hai deliverable đã sẵn sàng để nộp theo mục 8 | 3h | Lab 13.2 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Kịch bản cho Lab 13.1\r\n```\r\nStartup 5 người nhận dự án 3 tháng: 1 web app vừa. Hãy phân vai (ai orchestrate\r\nphần nào, ai review, ai chịu trách nhiệm deploy), thiết kế quy trình từ spec →\r\nship với các quality gate, và quyết Human-in/on-the-loop ở từng khâu.\r\n```\r\n\r\n### Thảo luận skill atrophy\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 13.1 — Thiết kế đội & quy trình (120 phút):** Theo kịch bản, lập sơ đồ tổ chức + quy trình Người–AI + Responsibility Matrix + quality gate. *Kết quả:* \"Mô hình tổ chức đội\" 1–2 trang.\r\n\r\n**Lab 13.2 — Metrics & mentoring (105 phút):** Chọn 4–5 metrics phù hợp + cách thu thập; viết kế hoạch mentoring junior chống skill atrophy. *Kết quả:* bảng metrics + kế hoạch mentoring.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Mô hình tổ chức đội + quy trình | `02-Design/` hoặc tài liệu nhóm | `[[note]]` |\r\n| Bảng metrics + kế hoạch mentoring | nt | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Thiết kế đội | Có phân vai | Có quy trình + gate | Nhất quán governance, ownership rõ |\r\n| Metrics & con người | Chọn được metrics | Hợp lý | Có kế hoạch chống skill atrophy thuyết phục |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Nghĩ AI thay thế vai trò** → tổ chức sai. *Phòng:* 4.1 (đổi trách nhiệm).\r\n- ⚠️ **Đo bằng số dòng code / số PR thô.** *Phòng:* 4.4.\r\n- ⚠️ Bỏ mặc junior với AI. *Phòng:* 4.5.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Một đội 5 người thời AI làm được việc của đội 15 người trước đây — điều đó đổi gì với sự nghiệp của bạn?\r\n- Làm Lead thời AI khác làm Lead truyền thống ở đâu?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Viết \"mô hình vận hành đội\" cho **nhóm Capstone** của bạn và áp dụng ở M14.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 5 — Evolving Roles, Measuring Success).\r\n- `00-MASTER-PLAN.md` mục 6.\r\n","lab":"# Lab Guide — M13: Tổ chức & Quản lý đội ngũ thời AI Agent\r\n\r\n> Bám module [M13](02-modules/M13-to-chuc-quan-ly-doi-ngu.md). Workshop-style · 2 lab · ~6 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nAI **đổi trách nhiệm, không xóa vai trò**: Dev → điều phối agent + review + chịu trách nhiệm; QA → thiết kế chiến lược test, bắt test giả; Lead → thiết kế quy trình Người–AI. Đội nhỏ hơn, mỗi người năng suất cao hơn; vai *orchestrator/reviewer* lên ngôi. Đo bằng Lead Time/Defect Rate/Rework — **không đo số dòng code**. Rủi ro: **skill atrophy** (junior bấm Accept-All, thui chột) → mentoring bắt giải thích *vì sao*.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Kịch bản đội (giảng viên phát) hoặc dùng chính nhóm Capstone.\r\n\r\n---\r\n\r\n## Lab 13.1 — Thiết kế đội & quy trình (⏱️ 120', nhóm)\r\n\r\n🎯 **Mục tiêu:** Thiết kế cách một đội vận hành với AI.\r\n\r\n📋 **Các bước**\r\n1. Kịch bản: *Startup 5 người, dự án 3 tháng, 1 web app vừa.*\r\n2. Phân vai: ai orchestrate phần nào, ai review, ai quyết deploy.\r\n3. Vẽ quy trình **spec → ship** với quality gate (kế thừa M12).\r\n4. Quyết Human-in/on-the-loop ở từng khâu.\r\n\r\n✅ **Checkpoint:** \"Mô hình tổ chức đội\" 1–2 trang.\r\n\r\n🔍 **Thẩm định:** Quy trình của bạn có **chỗ nào để AI tự quyết việc rủi ro cao** không? Có ai *thực sự* chịu trách nhiệm ở mỗi gate không?\r\n\r\n📤 **Nộp:** Mô hình tổ chức đội.\r\n\r\n---\r\n\r\n## Lab 13.2 — Metrics & Mentoring (⏱️ 105', nhóm)\r\n\r\n🎯 **Mục tiêu:** Đo hiệu quả + chống skill atrophy.\r\n\r\n📋 **Các bước**\r\n1. Chọn 4–5 metrics phù hợp + cách thu thập (vd Lead Time qua PR, Defect Rate qua bug sau release).\r\n2. Viết kế hoạch mentoring junior: làm sao để họ vẫn học nền tảng dù có AI.\r\n\r\n✅ **Checkpoint:** Bảng metrics + kế hoạch mentoring.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Nếu bạn để AI làm hết, sau 1 năm bạn giỏi hơn hay kém đi? Kế hoạch của bạn ngăn skill atrophy thế nào? (Nối về nghịch lý thẩm định M0.)\r\n\r\n📤 **Nộp:** Bảng metrics + kế hoạch mentoring (mốc Capstone: mô hình đội).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn hiểu mình sẽ làm việc trong đội hình nào và nói được chuyện với quản lý — lợi thế lớn khi đi xin việc.\r\n"},{"id":"M13.5","title":"Tự nghiên cứu & Đánh giá phương pháp mới","theory":"# M13.5 — Tự nghiên cứu & Đánh giá phương pháp mới (Research & Evaluation Literacy)\r\n\r\n> **Giai đoạn:** GĐ5 (Quản trị & Trưởng thành nghề) · **CASAN:** Standard → Automated\r\n> **Thời lượng:** 6 giờ (2 buổi; phần tìm nguồn có thể tự học) · **Tiên quyết:** M3 (eval-driven), M9 (review), M12 (governance)\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Đánh giá phương pháp mới (Find → Read → Spike → Decide)](09-so-do-truc-quan/14-danh-gia-phuong-phap-moi.html)\r\n\r\n---\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nPhần lớn công cụ & kỹ thuật dạy trong khóa này sẽ **lỗi thời một phần sau 1–2 năm**. Thứ *không* lỗi thời là khả năng **tự học và tự thẩm định cái mới**. Một fresher giỏi thời AI phải biết: tìm paper/repo đáng tin, đọc phê phán để tách *hype* khỏi *bằng chứng*, và tự **chạy thử đánh giá trên chính bài toán của mình** trước khi tin. Đây là \"capstone của năng lực thẩm định\": áp tư duy kiểm chứng lên *cả một lĩnh vực đang chuyển động*, không chỉ lên một output AI. Cùng tư duy *eval-driven* như đánh giá harness ([M3 §4.7](M3-ky-thuat-coding-agent.md)) — chỉ khác đối tượng là một *phương pháp* thay vì agent setup.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] **Tìm nguồn** đáng tin: paper (arXiv, Papers with Code, Scholar), repo (GitHub, awesome-lists), benchmark, release notes.\r\n- [ ] **Đọc phê phán** một paper/repo: bóc claim ↔ bằng chứng; phân biệt **hype vs evidence**; soi limitations & reproducibility.\r\n- [ ] Định nghĩa **bài toán + tiêu chí thành công của mình**, rồi chạy **spike/PoC nhỏ (timeboxed)** trên dữ liệu/task của mình.\r\n- [ ] Ra quyết định áp dụng bằng khung **Tech Radar** (Adopt / Trial / Assess / Hold) có lý lẽ chi phí–lợi ích–rủi ro.\r\n- [ ] Viết **Tech Evaluation Report** một trang.\r\n- [ ] Tránh **shiny-object syndrome** (đu theo mọi thứ mới).\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| A — Nền tảng & Thẩm định | Đọc phê phán, tách hype/evidence |\r\n| B — Kỹ thuật Coding Agent | Eval-driven adoption (nối harness eval) |\r\n| F — Tổ chức & Governance | Quyết định công nghệ có trách nhiệm |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 \"Học cách học\" là kỹ năng số 1\r\nVòng đời một kỹ thuật AI ngày càng ngắn. Nhà tuyển dụng không trả tiền cho \"người biết tool hôm nay\", mà cho \"người tự cập nhật & đánh giá được tool ngày mai\". Tài sản bền = **năng lực thẩm định**, không phải kiến thức tĩnh.\r\n\r\n### 4.2 Tìm nguồn (Source discovery)\r\n| Loại | Nơi tìm | Tín hiệu chất lượng |\r\n|---|---|---|\r\n| Paper | arXiv (cs.AI, cs.SE), **Papers with Code** (có code + benchmark), Google/Semantic Scholar | có code tái lập, trích dẫn, peer-review, baseline rõ |\r\n| Repo | GitHub (trending, awesome-lists), release notes | maintain gần đây, issues được xử lý, test, license rõ |\r\n| Tin tức/cộng đồng | release notes nhà cung cấp, blog kỹ thuật | nguồn gốc rõ, có số liệu |\r\n\r\n> ⚠️ **Số sao ≠ chất lượng.** Repo nhiều sao vẫn có thể bỏ hoang/không hợp bài toán bạn. Kiểm ngày commit cuối, issues, ai maintain.\r\n\r\n### 4.3 Đọc phê phán (Critical reading)\r\n- **Đọc theo lớp:** Abstract → Hình/Kết quả → Method → **Limitations** (mục hay bị bỏ qua nhưng quan trọng nhất).\r\n- **Câu hỏi thẩm định:** Claim là gì? Bằng chứng nào? Đo trên **benchmark nào — có giống bài toán mình không**? Tái lập được không? So với baseline nào? Ai làm/tài trợ (bias)?\r\n- **Hype vs Evidence:** dấu hiệu hype = \"SOTA\" trên một benchmark hẹp, ví dụ cherry-pick, thiếu ablation, **không có mục limitations**, không có baseline công bằng.\r\n- Dùng AI **hỗ trợ đọc** (tóm tắt, dịch) nhưng **xác minh** — AI cũng bịa khi tóm tắt paper.\r\n\r\n### 4.4 Đánh giá độ phù hợp (Fit evaluation) — Eval-driven adoption\r\n> Cùng quy trình eval-driven như [đánh giá harness M3 §4.7](M3-ky-thuat-coding-agent.md), nhưng đối tượng là *một phương pháp/tool*.\r\n\r\n1. **Viết rõ bài toán + tiêu chí thành công của BẠN** (đo được).\r\n2. **Spike/PoC nhỏ, timeboxed (1–2h):** chạy phương pháp trên **dữ liệu/task của bạn**, không phải demo của tác giả.\r\n3. **Đo trên tiêu chí của bạn** + cân nhắc **chi phí** (học, tích hợp, bảo trì, license) vs **lợi ích** vs **rủi ro**.\r\n4. **Quyết định** (xem 4.5).\r\n\r\n### 4.5 Khung quyết định — Tech Radar\r\n| Mức | Nghĩa |\r\n|---|---|\r\n| **Adopt** | Đủ bằng chứng, dùng ngay trong dự án thật |\r\n| **Trial** | Hứa hẹn — thử trong phạm vi có kiểm soát, theo dõi |\r\n| **Assess** | Đáng để mắt — làm PoC/đọc thêm, chưa dùng thật |\r\n| **Hold** | Chưa đủ bằng chứng / không hợp / rủi ro cao — đừng dùng |\r\n\r\n### 4.6 ⚠️ Anti-patterns nghề nghiệp\r\n- **Shiny-object syndrome:** đu theo mọi thứ mới, không bao giờ làm xong gì.\r\n- **Tin benchmark/README của tác giả** mà không test trên dữ liệu mình.\r\n- **Adopt theo hype** (Twitter/HN/số sao) thay vì bằng chứng.\r\n- **Resume-driven development:** chọn công nghệ để \"đẹp CV\" thay vì hợp bài toán.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| Tự học (trước Buổi 1) | Tự kiếm \"nguyên liệu\" thật để học, không dùng ví dụ cho sẵn | Đọc §4.2 để biết tìm nguồn ở đâu (arXiv, Papers with Code, GitHub, awesome-lists); chọn 1 vấn đề thật bạn quan tâm (vd giảm hallucination của agent review, memory cho coding agent); săn về 1 paper + 1 repo cho vấn đề đó; kiểm nhanh tín hiệu chất lượng (ngày commit cuối, issues, có code tái lập, license) | Trong tay 1 paper + 1 repo gắn với 1 bài toán cụ thể của bạn, sẵn sàng mổ xẻ ở Buổi 1 | ~1h | — |\r\n| 1 | Hình thành phản xạ đọc phê phán: tách *hype* khỏi *bằng chứng* | Đọc §4.1 (vì sao \"học cách học\" là kỹ năng số 1) và §4.3 (đọc theo lớp: Abstract → Kết quả → Method → **Limitations**; bộ câu hỏi thẩm định claim ↔ bằng chứng); xem prompt mẫu §6 để nhờ AI tóm tắt paper rồi tự mở mục Limitations xác minh; sau đó vào **Lab 13.5.1**: đọc paper + repo của bạn theo lớp, điền checklist thẩm định §4.3, phân loại từng claim là hype hay evidence | Bản đọc phê phán hoàn chỉnh + danh sách các claim **chưa được chứng minh** cho bài toán của bạn | 3h | Lab 13.5.1 |\r\n| 2 | Tự chạy thử đánh giá trên task của mình và ra quyết định áp dụng có lý lẽ | Đọc §4.4 (eval-driven adoption: viết bài toán + tiêu chí thành công đo được, chạy spike timeboxed trên dữ liệu của bạn), §4.5 (khung Tech Radar: Adopt / Trial / Assess / Hold) và §4.6 (anti-pattern: shiny-object, resume-driven, tin benchmark tác giả); rồi vào **Lab 13.5.2**: viết bài toán + tiêu chí của mình, chạy spike timeboxed (vd thử kỹ thuật mới vào agent của bạn) đo trên task thật, viết **Tech Evaluation Report** một trang theo mẫu §6 và xếp verdict Tech Radar; cuối buổi trình bày verdict của bạn và cùng cả lớp xếp một Tech Radar chung | Tech Evaluation Report một trang + verdict Adopt/Trial/Assess/Hold có lý lẽ chi phí–lợi ích–rủi ro, đã trình bày và đối chiếu với cả lớp | 3h | Lab 13.5.2 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — dùng AI hỗ trợ đọc paper (có ràng buộc thẩm định)\r\n```\r\n\"Tóm tắt paper này theo: (1) claim chính, (2) phương pháp, (3) benchmark & baseline\r\nđã dùng, (4) LIMITATIONS tác giả tự nêu, (5) điều paper KHÔNG chứng minh. Trích\r\nnguyên văn cho mục limitations. Đừng tô hồng — nêu cả điểm yếu.\"\r\n```\r\n\r\n### Mổ xẻ một claim \"SOTA\"\r\n```\r\n\"Phương pháp X đạt SOTA, vượt baseline 12%.\"\r\nHỏi: SOTA trên benchmark nào? Benchmark đó có giống bài toán của bạn?\r\nBaseline là gì — có công bằng (cùng điều kiện)? 12% trên mẫu bao nhiêu?\r\nCó ablation để biết phần nào tạo ra cải thiện?\r\n```\r\n\r\n### Mẫu Tech Evaluation Report (một trang)\r\n```\r\nPhương pháp/Repo:        Nguồn (link):\r\nClaim của tác giả:       Bằng chứng họ đưa:\r\nBài toán của tôi:        Tiêu chí thành công (đo được):\r\nSpike đã làm (1–2h):     Kết quả trên task của tôi:\r\nChi phí / Rủi ro:        Lợi ích:\r\n► Quyết định (Tech Radar): Adopt / Trial / Assess / Hold — vì ...\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 13.5.1 — Đọc phê phán (⏱️ 135'):** Chọn 1 paper + 1 repo (từ phần tự học) cho một vấn đề thật, vd *\"giảm hallucination của agent review\"* hoặc *\"memory cho coding agent\"*. Đọc theo lớp; điền checklist thẩm định 4.3; **phân loại từng claim: hype hay evidence**. *Kết quả:* bản phân tích + danh sách claim chưa được chứng minh.\r\n\r\n**Lab 13.5.2 — Spike đánh giá + Report (⏱️ 120'):** Viết bài toán + tiêu chí của mình; chạy **spike timeboxed** (vd thử một skill/kỹ thuật mới vào agent của bạn) đo trên task thật; viết **Tech Evaluation Report** + xếp Tech Radar. *Kết quả:* report một trang + verdict có lý lẽ.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Bản đọc phê phán (hype vs evidence) | `04-Development/` | `[[note]]` |\r\n| Tech Evaluation Report + verdict Tech Radar | `04-Development/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Đọc phê phán | Tóm tắt được | Bóc được limitations | Tách rõ hype/evidence, bắt claim không chứng minh |\r\n| **Spike trên task của mình** | Chạy được demo của tác giả | Thử trên task gần giống | Đo trên *task thật của mình*, có số liệu |\r\n| Quyết định | Có chọn Tech Radar | Có lý lẽ | Cân chi phí–lợi ích–rủi ro, dám \"Hold\" khi thiếu bằng chứng |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Tin benchmark của tác giả** không test trên dữ liệu mình. *Phòng:* spike bắt buộc (4.4).\r\n- ⚠️ **Adopt theo hype/số sao.** *Phòng:* khung Tech Radar + tiêu chí của mình.\r\n- ⚠️ **Shiny-object syndrome.** *Phòng:* timebox spike + dám \"Hold\".\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Một paper \"SOTA\" có nghĩa là nó hợp với *bài toán của bạn* không? Vì sao?\r\n- Khi nào \"Hold\" (không áp dụng cái mới) lại là quyết định *đúng đắn & dũng cảm*?\r\n- Đánh giá một phương pháp mới khác/giống đánh giá output của AI (M9) và đánh giá harness (M3) ở đâu?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Lập **\"Tech Radar cá nhân\"**: chọn 3–5 phương pháp/tool đang hot, mỗi cái một dòng verdict Adopt/Trial/Assess/Hold + lý do. Cập nhật định kỳ sau khóa.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- arXiv · Papers with Code · Semantic Scholar · GitHub awesome-lists.\r\n- Khung Technology Radar (ThoughtWorks).\r\n- Nối: [M3 §4.7 Eval-driven harness](M3-ky-thuat-coding-agent.md) · [M9 Review](M9-code-review-secure-dev.md) · [M12 Governance](M12-rui-ro-governance.md).\r\n","lab":"# Lab Guide — M13.5: Tự nghiên cứu & Đánh giá phương pháp mới\r\n\r\n> Bám module [M13.5](02-modules/M13.5-tu-nghien-cuu-danh-gia.md). 2 lab · ~6 giờ (+ tự học). Sơ đồ: [Đánh giá phương pháp mới](09-so-do-truc-quan/14-danh-gia-phuong-phap-moi.html).\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nCông cụ sẽ lỗi thời; **năng lực tự thẩm định cái mới thì không**. Quy trình 4 bước: **Tìm** (paper/repo đáng tin) → **Đọc phê phán** (tách *hype* khỏi *evidence*, soi limitations) → **Spike** (chạy thử trên *task của mình*, không tin benchmark của tác giả) → **Quyết định** (Tech Radar: Adopt/Trial/Assess/Hold). Đây là tư duy eval-driven của M3 áp lên cả một lĩnh vực.\r\n\r\n> ⚠️ Số sao GitHub ≠ chất lượng · \"SOTA\" trên benchmark hẹp ≠ hợp bài toán bạn · README của tác giả ≠ bằng chứng.\r\n\r\n## 🧰 Chuẩn bị (tự học trước buổi 1, ~1h)\r\n- [ ] Chọn **một vấn đề thật** bạn quan tâm (vd: \"giảm hallucination của agent review\", \"memory cho coding agent\", \"test generation tốt hơn\").\r\n- [ ] Mang về **1 paper** (arXiv / Papers with Code) + **1 repo** (GitHub) liên quan.\r\n\r\n---\r\n\r\n## Lab 13.5.1 — Đọc phê phán + tách hype/evidence (⏱️ 135')\r\n\r\n🎯 **Mục tiêu:** Bóc tách claim ↔ bằng chứng, soi limitations.\r\n\r\n📋 **Các bước**\r\n1. Dùng AI hỗ trợ tóm tắt (có ràng buộc thẩm định):\r\n   ```\r\n   \"Tóm tắt paper này theo: (1) claim chính, (2) phương pháp, (3) benchmark &\r\n   baseline, (4) LIMITATIONS (trích nguyên văn), (5) điều paper KHÔNG chứng minh.\r\n   Đừng tô hồng.\"\r\n   ```\r\n2. **Mở đúng mục Limitations trong paper để xác minh** AI có bỏ sót/làm đẹp không.\r\n3. Điền checklist thẩm định: benchmark có giống task mình? baseline công bằng? tái lập được? ai tài trợ?\r\n4. Phân loại **từng claim: HYPE hay EVIDENCE**.\r\n5. Với repo: kiểm commit cuối, issues, test, license.\r\n\r\n✅ **Checkpoint:** Bản phân tích + danh sách \"claim chưa được chứng minh\".\r\n\r\n🔍 **Thẩm định (trọng tâm):** AI tóm tắt có \"giấu\" điểm yếu nào mà bạn tìm thấy khi đọc tay không? Claim nào nghe kêu nhưng *không* có bằng chứng cho task của bạn?\r\n\r\n📤 **Nộp:** Bản đọc phê phán vào `04-Development/`.\r\n\r\n🐞 **Lỗi thường gặp:** Tin tóm tắt của AI là đủ → luôn mở mục Limitations gốc.\r\n\r\n---\r\n\r\n## Lab 13.5.2 — Spike đánh giá + Tech Evaluation Report (⏱️ 120')\r\n\r\n🎯 **Mục tiêu:** Quyết định áp dụng dựa trên thử nghiệm trên *task của mình*.\r\n\r\n📋 **Các bước**\r\n1. Viết **bài toán của bạn + tiêu chí thành công đo được**.\r\n2. **Spike timeboxed (≤60'):** chạy phương pháp/repo trên dữ liệu hoặc agent của *bạn* (vd cắm thử một skill/kỹ thuật mới). Không chạy demo có sẵn của tác giả.\r\n3. Đo trên tiêu chí của bạn; ghi chi phí (học/tích hợp/bảo trì/license), lợi ích, rủi ro.\r\n4. Điền **Tech Evaluation Report** (template [`Tech_Eval`](07-obsidian-vault-template/99-Templates/Tech_Eval.md)) → xếp **Tech Radar**: Adopt / Trial / Assess / Hold.\r\n\r\n✅ **Checkpoint:** Report một trang + verdict có lý lẽ.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Kết quả trên *task của bạn* có khớp con số tác giả công bố không? Nếu lệch — vì sao? Bạn có dám **\"Hold\"** khi bằng chứng chưa đủ, dù nó đang hot?\r\n\r\n📤 **Nộp:** Tech Evaluation Report vào `04-Development/` (homework: lập \"Tech Radar cá nhân\" 3–5 mục).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn rời khóa với kỹ năng **future-proof**: tự tìm, tự đọc phê phán, tự chạy thử và tự quyết — để mỗi khi ngành tung ra cái mới, bạn *đánh giá được nó hợp hay không* thay vì chạy theo hype. Đây là năng lực thẩm định ở cấp độ cao nhất.\r\n"},{"id":"M14","title":"Capstone Project (xuyên suốt)","theory":"# M14 — Capstone Project (xuyên suốt + tổng kết)\r\n\r\n> **Giai đoạn:** GĐ5 (Tốt nghiệp) · **CASAN:** Automated\r\n> **Thời lượng:** 12 giờ tập trung (2 buổi tổng kết) + làm xuyên suốt khóa · **Tiên quyết:** M0–M13\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Capstone 2 pha + hoán đổi repo](09-so-do-truc-quan/13-capstone-2-pha.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nCapstone là nơi học viên **chứng minh năng lực tích hợp**: chạy trọn SDLC với AI làm trợ thủ, qua *cả hai tầng* Greenfield và Brownfield, với bộ não dự án (Obsidian + supermemory) và quy trình có governance. Đây cũng là **sản phẩm để đưa vào portfolio đi xin việc** — bằng chứng \"tôi làm được\", không chỉ \"tôi học rồi\".\r\n\r\n> Capstone *chạy xuyên suốt khóa*: mỗi module nộp một deliverable trung gian. M14 là phần **tổng kết, hoàn thiện & bảo vệ**.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Tích hợp toàn bộ kỹ năng M0–M13 vào một sản phẩm thật.\r\n- [ ] Vận hành bộ não dự án xuyên suốt vòng đời.\r\n- [ ] Thực hiện cả **Pha A (Greenfield)** và **Pha B (Brownfield)**.\r\n- [ ] Trình bày & bảo vệ quyết định kỹ thuật + cách thẩm định AI.\r\n\r\n## 3. Cấu trúc Capstone (2 pha)\r\n- **Pha A — Greenfield (M4–M9):** Nhóm 3–4 người xây mới một sản phẩm (vd: app đặt lịch / mini e-commerce / công cụ nội bộ) từ BA → spec → code → test → review. Tri thức trong Obsidian.\r\n- **Pha B — Brownfield (M10–M11):** Nhóm **nhận codebase của nhóm khác** (hoặc codebase cho sẵn) để bảo trì: hiểu hệ thống, sửa lỗi an toàn, thêm tính năng — không regression.\r\n\r\n## 4. Yêu cầu sản phẩm (Definition of Done)\r\n- [ ] Vault Obsidian đầy đủ: requirements → design (ADR) → specs (approved) → test reports → maintenance.\r\n- [ ] Repo với lịch sử Git sạch, PR có review, test xanh có ý nghĩa.\r\n- [ ] `AGENTS.md` + cấu hình agent (skills, memory) của nhóm.\r\n- [ ] Bộ governance: quality gate + Responsibility Matrix.\r\n- [ ] Báo cáo Pha B: system map + bug fix + tính năng thêm + bằng chứng không regression.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n> Capstone chạy *xuyên suốt khóa*: hai mốc đầu (Pha A & Pha B) bạn làm dần trong các module tương ứng và nộp deliverable trung gian; hai buổi cuối là phần tổng kết tập trung (12 giờ). Hãy tích lũy tri thức vào vault Obsidian ngay từ mốc đầu để buổi tổng kết bạn chỉ việc hoàn thiện.\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| Mốc A — Greenfield (xuyên suốt M4–M9) | Cùng nhóm 3–4 người xây mới một sản phẩm thật từ con số 0, chạy trọn SDLC với AI làm trợ thủ | Chọn đề (app đặt lịch / mini e-commerce / công cụ nội bộ); bạn đi từ BA → spec → code → test → review; mỗi module bạn nộp một deliverable trung gian; bạn ghi mọi requirement, ADR và spec đã duyệt vào vault Obsidian | Sản phẩm Greenfield chạy đúng spec; vault có requirements → design (ADR) → specs (approved) → test reports; repo có lịch sử Git sạch, PR có review, test xanh có ý nghĩa | Làm xuyên suốt M4–M9 | Các deliverable trung gian của M4–M9 |\r\n| Mốc B — Brownfield (xuyên suốt M10–M11) | Nhận codebase của nhóm khác (hoặc cho sẵn) và bảo trì an toàn, không gây regression | Bạn đọc hiểu hệ thống lạ và dựng system map; bạn sửa một bug theo cách an toàn; bạn thêm một tính năng mới mà không làm hỏng phần đang chạy; bạn thu thập bằng chứng không regression (test xanh trước/sau) | Báo cáo Pha B trong vault: system map + bug đã sửa + tính năng thêm + bằng chứng không regression; phần maintenance được ghi lại đầy đủ | Làm xuyên suốt M10–M11 | Deliverable Brownfield của M10–M11 |\r\n| Buổi 1 — Hoàn thiện & rà soát | Khóa sổ sản phẩm: đối chiếu Definition of Done, dọn dẹp vault và repo trước Demo Day | Bạn rà từng mục Definition of Done và bổ sung phần còn thiếu (`AGENTS.md`, cấu hình agent, quality gate, Responsibility Matrix); bạn dọn vault cho mạch lạc và làm sạch lịch sử Git; bạn tận dụng phần mentor review xen kẽ để chỉnh sửa theo góp ý | Sản phẩm đạt đủ Definition of Done; vault và repo gọn gàng, sẵn sàng trình bày; đã tiếp thu phản hồi từ mentor | 3h | Checklist Definition of Done (mục 4) |\r\n| Buổi 2 — Demo Day & Retro | Trình bày, bảo vệ quyết định kỹ thuật và đúc kết toàn khóa | Bạn chuẩn bị bài thuyết trình 15–20' theo khung ở mục 6 (sản phẩm & demo → cách dùng AI xuyên SDLC → MỘT quyết định khó và cách bạn THẨM ĐỊNH output AI → Pha Brownfield → bài học); bạn demo trực tiếp và trả lời Q&A; sau đó bạn làm retro toàn khóa và đối chiếu lại bản tự định vị CASAN so với lúc bắt đầu (M0) | Bài bảo vệ hoàn chỉnh được chấm theo rubric (mục 7); bản tự đánh giá CASAN cập nhật; danh sách bài học để đóng gói thành portfolio | 3h | Khung thuyết trình (mục 6) + Rubric (mục 7) |\r\n\r\n## 6. Nội dung buổi tổng kết (Teaching content)\r\n\r\n### Khung thuyết trình (mỗi nhóm 15–20')\r\n```\r\n1. Sản phẩm & demo (5')\r\n2. Cách dùng AI xuyên SDLC + bộ não dự án (4')\r\n3. MỘT quyết định khó & cách nhóm THẨM ĐỊNH output AI (4')  ← trọng tâm chấm\r\n4. Pha Brownfield: hiểu & sửa code lạ an toàn (3')\r\n5. Bài học & điều làm lại (2')\r\n```\r\n\r\n## 7. Rubric tổng (chi tiết hóa ở `06-assessment/`)\r\n| Tiêu chí | Trọng số |\r\n|---|---|\r\n| Chất lượng sản phẩm (chạy đúng spec) | 20% |\r\n| **Mức độ thẩm định AI output** (sợi chỉ đỏ) | 25% |\r\n| Chất lượng bộ não dự án (vault) | 15% |\r\n| Test & chất lượng code | 15% |\r\n| Pha Brownfield (an toàn, không regression) | 10% |\r\n| Governance & teamwork | 10% |\r\n| Thuyết trình & phản biện | 5% |\r\n\r\n## 8. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Sản phẩm đẹp nhưng không chứng minh được đã thẩm định AI.** *Phòng:* bắt buộc phần (3) thuyết trình.\r\n- ⚠️ **Vault bỏ bê**, chỉ có code. *Phòng:* Definition of Done.\r\n- ⚠️ Pha B làm qua loa. *Phòng:* trọng số riêng + bằng chứng không regression.\r\n\r\n## 9. Bài tập về nhà / Sau khóa\r\n- Đóng gói Capstone thành **portfolio** (README kể câu chuyện SDLC + AI + thẩm định).\r\n- Cập nhật bản tự định vị CASAN cuối khóa.\r\n\r\n## 10. Tài nguyên & Đọc thêm\r\n- `03-capstone/` (đề bài chi tiết + dữ liệu mẫu — sẽ soạn ở Đợt 3).\r\n- Toàn bộ M0–M13.\r\n","lab":"# Lab Guide — M14: Capstone (Hoàn thiện + Demo Day)\r\n\r\n> Bám module [M14](02-modules/M14-capstone-project.md) + [đề bài](03-capstone/de-bai-capstone.md). ~12 giờ tổng kết.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (10')\r\nCapstone là **bằng chứng năng lực** + **portfolio đi xin việc**. Chấm nặng nhất **năng lực thẩm định** (25%+). Definition of Done: vault đầy đủ · repo sạch + test có ý nghĩa · agent config · governance kit · báo cáo Pha B không regression · portfolio README.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Toàn bộ deliverable M1–M13 trong vault & repo.\r\n- [ ] Checklist [Definition of Done](03-capstone/de-bai-capstone.md#5-definition-of-done-toàn-dự-án).\r\n\r\n---\r\n\r\n## Buổi 1 — Hoàn thiện & Rà DoD (⏱️ 3h)\r\n\r\n📋 **Các bước**\r\n1. Rà từng mục Definition of Done; bịt lỗ hổng.\r\n2. Dọn vault (status đúng, liên kết đủ) & repo (Git history, PR có review).\r\n3. Viết **portfolio README**: kể câu chuyện SDLC + cách nhóm thẩm định AI.\r\n4. Mentor review từng nhóm.\r\n\r\n✅ **Checkpoint:** DoD đủ; README kể được câu chuyện.\r\n\r\n🔍 **Thẩm định:** Vault có *dấu vết thẩm định* xuyên suốt không (review notes, \"đập code\", bắt yêu cầu bịa)? Nếu chỉ có code đẹp mà thiếu dấu vết → bổ sung ngay.\r\n\r\n---\r\n\r\n## Buổi 2 — Demo Day (⏱️ 3h + chấm)\r\n\r\n📋 **Khung thuyết trình (15–20'/nhóm)**\r\n```\r\n1. Sản phẩm & demo (5')\r\n2. Dùng AI xuyên SDLC + bộ não dự án (4')\r\n3. MỘT quyết định khó & cách nhóm THẨM ĐỊNH output AI (4')  ← chấm nặng\r\n4. Pha Brownfield: hiểu & sửa code lạ an toàn (3')\r\n5. Bài học & làm lại (2')\r\n```\r\n\r\n🔍 **Thẩm định (trọng tâm chấm):** Chuẩn bị trả lời sâu: *\"Chỗ nào AI sai và nhóm phát hiện bằng cách nào?\"* — đây là câu hỏi cốt lõi của Demo Day.\r\n\r\n📤 **Nộp:** Bản thuyết trình + repo + vault + portfolio README.\r\n\r\n---\r\n\r\n## Retro toàn khóa (⏱️ cuối buổi)\r\n- Cập nhật **tự định vị CASAN** cuối khóa, đối chiếu bản ở M0 — đo *tiến bộ*.\r\n- Mỗi cá nhân: \"1 thói quen thẩm định tôi sẽ mang vào công việc đầu tiên.\"\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn ra khóa với: một sản phẩm thật chạy trọn SDLC + Brownfield, một bộ não dự án, và quan trọng nhất — **bằng chứng bạn điều phối được AI mà vẫn làm chủ chất lượng**. Đó là chân dung fresher doanh nghiệp đang tìm.\r\n"}]}];
const TOTAL_MODULES = 17;

const KEY='aidlc-elearning-progress';

const flat=[];
COURSE.forEach(s=>s.modules.forEach(m=>flat.push({...m,stage:s.name,color:s.color})));
let current=null;

/* ============ Sidebar ============ */
function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=COURSE.map(s=>`
    <div class="stage" data-stage>
      <div class="stage-head"><span class="bar" style="background:${s.color}"></span>${s.name}</div>
      ${s.modules.map(m=>`
        <div class="modlink ${done[m.id]?'done':''}" data-id="${m.id}" data-search="${(m.id+' '+m.title).toLowerCase()}" onclick="openModule('${m.id}')">
          <span class="id">${m.id}</span>
          <span style="flex:1">${m.title}</span>
          <span class="chk">${done[m.id]?'✓':''}</span>
        </div>`).join('')}
    </div>`).join('');
}
function filterNav(v){
  v=v.toLowerCase().trim();
  document.querySelectorAll('.modlink').forEach(el=>{
    el.classList.toggle('hidden', v && !el.dataset.search.includes(v));
  });
  document.querySelectorAll('[data-stage]').forEach(st=>{
    const any=[...st.querySelectorAll('.modlink')].some(e=>!e.classList.contains('hidden'));
    st.style.display=any?'':'none';
  });
}
function refreshProgress(){
  const n=flat.filter(m=>done[m.id]).length;
  document.getElementById('pbar').style.width=(n/TOTAL_MODULES*100)+'%';
  document.getElementById('ptxt').textContent=`${n}/${TOTAL_MODULES} module hoàn thành`;
}

let currentTab='theory';   // 'theory' (Bài giảng) | 'lab' (Thực hành) — giữ qua các module

  current=id;location.hash=id;closeNav();
  const m=flat[idx];
  document.querySelectorAll('.modlink').forEach(e=>e.classList.toggle('active',e.dataset.id===id));

  updateMarkBtn();
  const prev=flat[idx-1],next=flat[idx+1];
  const body=currentTab==='lab'?m.lab:m.theory;
  document.getElementById('content').innerHTML=`
    <div class="tabs">
      <button class="tab ${currentTab==='theory'?'on':''}" onclick="switchTab('theory')">📚 Bài giảng <span>lý thuyết</span></button>
      <button class="tab ${currentTab==='lab'?'on':''}" onclick="switchTab('lab')">🧪 Lab thực hành <span>hands-on</span></button>
    </div>
    <article class="doc" id="doc">${mdToHtml(body)}</article>
    <div class="lesson-foot">
      <button class="btn" onclick="goHome()">← Trang chủ</button>
      <div class="navbtns">
        ${prev?`<button class="btn" onclick="openModule('${prev.id}')">← ${prev.id}</button>`:''}
        <button class="btn primary" onclick="toggleDone()" id="footMark">${done[id]?'✓ Đã hoàn thành':'Đánh dấu hoàn thành'}</button>
        ${next?`<button class="btn" onclick="openModule('${next.id}')">${next.id} →</button>`:''}
      </div>
    </div>`;
  if(!keepScroll)window.scrollTo(0,0);
}
function switchTab(t){
  if(t===currentTab)return;
  currentTab=t;
  openModule(current,true);
  document.getElementById('doc')?.scrollIntoView({block:'start'});
}
function updateMarkBtn(){
  const b=document.getElementById('markBtn');
  if(done[current]){b.textContent='✓ Đã hoàn thành';b.classList.add('done');}
  else{b.textContent='Đánh dấu hoàn thành';b.classList.remove('done');}
}
function toggleDone(){
  if(!current)return;
  done[current]=!done[current];if(!done[current])delete done[current];
  saveDone(done);
  document.querySelector(`.modlink[data-id="${current}"]`)?.classList.toggle('done',!!done[current]);
  const chk=document.querySelector(`.modlink[data-id="${current}"] .chk`);if(chk)chk.textContent=done[current]?'✓':'';
  updateMarkBtn();
  const fm=document.getElementById('footMark');if(fm)fm.textContent=done[current]?'✓ Đã hoàn thành':'Đánh dấu hoàn thành';
  refreshProgress();
}

/* ============ Nav drawer (mobile) ============ */
function openNav(){document.getElementById('sidebar').classList.add('open');document.getElementById('scrim').classList.add('show');}
function closeNav(){document.getElementById('sidebar').classList.remove('open');document.getElementById('scrim').classList.remove('show');}


/* ============ Init ============ */
buildNav();refreshProgress();
const h = location.hash.replace('#','');
if(h && flat.some(m=>m.id===h))openModule(h);else goHome();
</script>
</body>
</html>
