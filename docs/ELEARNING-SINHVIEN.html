g? Liệt kê những story bịa và vì sao bạn loại.\r\n\r\n📤 **Nộp:** Các `US-###` + danh sách \"câu hỏi cần làm rõ\".\r\n\r\n🐞 **Lỗi thường gặp:** Story chung chung (\"quản lý lịch\") → tách nhỏ theo hành vi cụ thể.\r\n\r\n---\r\n\r\n## Lab 4.2 — Gap analysis + Traceability map (⏱️ 110')\r\n\r\n🎯 **Mục tiêu:** Phát hiện thiếu sót/mâu thuẫn, ưu tiên hóa, và **soi đồ thị truy xuất bắt node mồ côi**.\r\n\r\n📋 **Các bước**\r\n1. Prompt gap analysis:\r\n   ```\r\n   \"Rà danh sách story: (1) trường hợp biên bị bỏ, (2) mâu thuẫn, (3) yêu cầu\r\n   mơ hồ không đo được. KHÔNG tự sửa, chỉ liệt kê để con người quyết.\"\r\n   ```\r\n2. Lập bảng **MoSCoW** (Must/Should/Could/Won't). Lưu ý: thanh toán online ở CAP-1 = **Won't** (giai đoạn 1).\r\n3. Làm rõ điểm mơ hồ (vd \"hủy trước 2 tiếng\" → tiêu chí đo được).\r\n4. **Mở Graph View** trong Obsidian. Tìm: (a) story/Epic **không có liên kết ngược** về mục tiêu → nghi *bịa/scope creep*; (b) `[[Meeting]]` có yêu cầu nhưng **không story nào trỏ tới** → *bỏ sót*. Lập danh sách \"mồ côi / bỏ sót\".\r\n\r\n✅ **Checkpoint:** Backlog ưu tiên + Graph View \"sạch\" (mọi story truy được về Epic & nguồn) hoặc có danh sách mồ côi cần xử lý.\r\n\r\n🔍 **Thẩm định:** Mỗi node mồ côi → quyết: bỏ (bịa) hay bổ sung link (thiếu)? Dựa vào câu gốc nào của khách?\r\n\r\n📤 **Nộp:** Backlog MoSCoW + ảnh Graph View + danh sách mồ côi/bỏ sót (mốc Capstone: backlog ≥8 story có truy xuất).\r\n\r\n---\r\n\r\n## Lab 4.3 — Execution Handoff (⏱️ 45', nâng cao/tùy chọn)\r\n\r\n🎯 **Mục tiêu:** Bàn giao yêu cầu sạch xuống công cụ giao task.\r\n\r\n📋 **Các bước**\r\n1. Export backlog đã chốt thành CSV/JSON (nhờ agent sinh từ các `US-###`).\r\n2. (Nếu có) đẩy sang Jira/Trello/Lark qua API hoặc một flow **n8n** đơn giản.\r\n\r\n✅ **Checkpoint:** Task xuất hiện ở công cụ quản lý, vẫn truy ngược được về `US-###`.\r\n\r\n🔍 **Thẩm định:** Dữ liệu đẩy đi có rò rỉ thông tin nhạy cảm của khách không? (nối M12).\r\n\r\n📤 **Nộp:** Ảnh task đã tạo + ghi chú luồng. *(Bỏ qua nếu thiếu thời gian.)*\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn đã biến cuộc trò chuyện lộn xộn thành yêu cầu rõ ràng, **có cấu trúc Epic→Story và truy xuất ngược**, *và* bắt được yêu cầu ảo qua đồ thị — kỹ năng BA cốt lõi thời AI.\r\n"},{"id":"M5","title":"Thiết kế & Kiến trúc hệ thống với AI","theory":"# M5 — Thiết kế & Kiến trúc hệ thống với AI\r\n\r\n> **Giai đoạn:** GĐ3 (Greenfield) · **CASAN:** Augmented\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M4\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Vòng đời AI-Driven SDLC](09-so-do-truc-quan/01-vong-doi-ai-sdlc.html) (giai đoạn Design)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nThiết kế là nơi quyết định \"hình hài\" hệ thống — sai ở đây thì code đúng cũng vô ích. AI rất giỏi **brainstorm phương án** và phân tích trade-off, giúp fresher (vốn ít vốn kiến trúc) nhìn được nhiều lựa chọn. Nhưng *quyết định cuối* phải là con người, và phải **ghi lại lý do** (ADR). Module dạy dùng AI để mở rộng không gian phương án rồi thu hẹp có lý lẽ, lưu vào `02-Design/`.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Dùng AI **brainstorm 2–3 phương án kiến trúc** kèm trade-off.\r\n- [ ] Ra **quyết định công nghệ** có lý lẽ và ghi **ADR**.\r\n- [ ] Vẽ **sơ đồ kiến trúc** (Draw.io) từ mô tả.\r\n- [ ] Đưa **cân nhắc bảo mật** vào thiết kế từ sớm (security-aware).\r\n- [ ] Thẩm định: nhận ra khi AI đề xuất kiến trúc **over-engineered** hoặc không hợp ngữ cảnh.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| C — AI-Assisted Engineering | Brainstorm & đánh giá thiết kế |\r\n| A — Nền tảng & Thẩm định | Phê phán phương án AI đề xuất |\r\n| D — Quản trị tri thức | Ghi ADR, liên kết vault |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Brainstorm kiến trúc với AI\r\nYêu cầu AI đưa **nhiều phương án** (không chỉ một) + ưu/nhược + điều kiện phù hợp. Người chọn dựa trên ràng buộc thật (đội ngũ, thời gian, quy mô).\r\n\r\n### 4.2 ADR — Architecture Decision Record\r\nGhi lại: bối cảnh → các phương án → quyết định → **vì sao** → hệ quả. Dùng template `ADR`. ADR là tài sản tri thức để người sau (và AI) hiểu lý do.\r\n\r\n### 4.3 Chọn công nghệ & trade-off\r\nTránh \"chọn theo hype\". Đánh giá theo: độ phù hợp bài toán, đường cong học, cộng đồng/bảo trì, vận hành.\r\n\r\n### 4.4 Security-aware design\r\nNghĩ về luồng dữ liệu nhạy cảm, xác thực/phân quyền, điểm tin cậy **ngay từ thiết kế** — rẻ hơn sửa sau.\r\n\r\n### 4.5 ⚠️ Rủi ro: over-engineering\r\nAI hay đề xuất kiến trúc \"hoành tráng\" (microservices, hàng tá lớp trừu tượng) cho bài toán nhỏ. **Quy tắc:** chọn giải pháp *đơn giản nhất đủ dùng*; bắt AI biện minh độ phức tạp theo yêu cầu thật.\r\n\r\n### 4.6 Thiết kế & thẩm định API + Database (thực chiến)\r\nCapstone là app CRUD sống chết bằng **API contract** và **schema** — đúng chỗ AI dễ sinh \"trông ổn nhưng sai\", và đúng chỗ fresher dễ \"Accept-All\". Đây là checklist thẩm định khi AI sinh API/DB:\r\n\r\n**Checklist REST (thẩm định API contract AI sinh):**\r\n- [ ] **Resource & method** đúng nghĩa (GET không đổi dữ liệu, POST tạo, PATCH sửa một phần...).\r\n- [ ] **Status code** đúng: 200/201/204 · 400 (validate) · 401/403 (auth) · 404 · 409 (xung đột) · 500.\r\n- [ ] **Lỗi nhất quán** (cùng một shape `{error, message}`), có mã lỗi nghiệp vụ.\r\n- [ ] **Pagination** cho danh sách (limit/offset hoặc cursor) — đừng trả \"tất cả\".\r\n- [ ] **Versioning** nếu cần (`/v1/...`).\r\n- [ ] Validate input ở biên; không tin client.\r\n\r\n**Checklist Schema quan hệ (thẩm định DB AI sinh):**\r\n- [ ] **PK/FK** rõ; quan hệ đúng (1-n, n-n có bảng nối).\r\n- [ ] **Chuẩn hóa** vừa đủ (tránh trùng lặp dữ liệu), nhưng không chuẩn hóa quá mức gây N+1.\r\n- [ ] **Index** cho cột hay truy vấn/lọc/join — AI hay quên → query chậm khi data lớn.\r\n- [ ] **Migration** có versioned (không sửa schema bằng tay trên prod).\r\n- [ ] Kiểu dữ liệu & ràng buộc (NOT NULL, UNIQUE) đúng; thời gian lưu UTC.\r\n\r\n> 🔍 **Thẩm định:** cho AI sinh API contract + schema cho một tính năng Capstone, rồi soát theo 2 checklist trên — bắt **≥3 thiếu sót** (thiếu status code? thiếu index? N+1? lỗi không nhất quán?).\r\n\r\n### 4.7 Khả năng tiếp cận (accessibility) cơ bản — nếu Capstone có UI\r\n> ⚠️ **Chỉ áp dụng nếu sản phẩm có UI** (web/app). Bỏ qua mục này nếu Capstone là API/CLI thuần.\r\n\r\nĐưa accessibility vào *từ thiết kế* sẽ rẻ hơn vá sau. Mức cơ bản theo **WCAG**:\r\n- **HTML ngữ nghĩa:** dùng `<button>`, `<nav>`, `<main>`, `<h1>…` đúng nghĩa — không lạm dụng `<div>` cho mọi thứ.\r\n- **Label cho input:** mỗi ô nhập có `<label>` gắn (hoặc `aria-label`) — không chỉ dựa placeholder.\r\n- **Độ tương phản màu:** chữ/nền đạt tỉ lệ tối thiểu (WCAG AA: **4.5:1** cho chữ thường).\r\n- **Điều hướng bàn phím:** thao tác được bằng Tab/Enter, không kẹt focus, có trạng thái focus thấy rõ.\r\n- **Alt cho ảnh:** ảnh có nội dung cần `alt` mô tả; ảnh trang trí để `alt=\"\"`.\r\n\r\n> 🔍 **Thẩm định:** AI sinh UI hay quên `label` và **độ tương phản** đủ chuẩn → soát lại 2 điểm này trước, đừng tin \"trông đẹp là xong\".\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Mở rộng không gian phương án kiến trúc và ra quyết định có lý lẽ | Đọc mục 4.1–4.3 để hiểu cách brainstorm kiến trúc với AI, cấu trúc một ADR, và nguyên tắc chọn công nghệ tránh \"chọn theo hype\"; lấy một story bạn đã viết ở M4 làm đầu vào; dùng prompt mẫu (mục 6) để bắt AI sinh đúng 3 phương án từ đơn giản đến phức tạp kèm trade-off; tự chọn 1 phương án dựa trên ràng buộc thật (đội ngũ, thời gian, quy mô) rồi viết ADR ghi rõ \"vì sao\" | Hoàn thành Lab 5.1: có ≥1 file `ADR-###` trong `02-Design/`, nêu rõ bối cảnh, các phương án, quyết định và lý do | 3h | Lab 5.1 |\r\n| 2 | Hoàn thiện bản thiết kế: vẽ sơ đồ, rà bảo mật và bắt lỗi over-engineering | Đọc mục 4.4–4.7 về security-aware design, rủi ro over-engineering, checklist thẩm định API/Database và accessibility cơ bản (chỉ nếu Capstone có UI); mô tả kiến trúc đã chọn cho AI để sinh mô tả sơ đồ rồi vẽ lại trong Draw.io; soát thiết kế của bạn theo các checklist — bắt ≥3 thiếu sót về API/DB và rà 2 điểm dễ sai (thiếu index, lỗi không nhất quán); cuối buổi review chéo bài bạn cùng học rồi chốt lại Blueprint | Hoàn thành Lab 5.2: có `Architecture Blueprint` (sơ đồ + danh sách thành phần + quyết định công nghệ) trong `02-Design/`, đã qua rà bảo mật và độ phức tạp | 3h | Lab 5.2 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — brainstrom có kiểm soát độ phức tạp\r\n```\r\n\"Cho yêu cầu [dán SPEC/US]. Đề xuất ĐÚNG 3 phương án kiến trúc từ ĐƠN GIẢN\r\nđến phức tạp. Với mỗi phương án: ưu, nhược, khi nào nên dùng, và chi phí vận\r\nhành. Mặc định ưu tiên phương án đơn giản nhất đủ đáp ứng — nêu rõ vì sao có\r\nthể KHÔNG cần phương án phức tạp.\"\r\n```\r\n\r\n### Mẫu ADR rút gọn (điền nhanh tại lớp)\r\n```\r\nBối cảnh: ... | Phương án: A/B/C | Chọn: B vì ... | Đánh đổi: ...\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 5.1 — Brainstorm + ADR (135 phút):** Lấy một story từ M4, dùng AI brainstorm 3 phương án, chọn 1, viết `ADR-###`. *Kết quả:* ≥1 ADR trong `02-Design/`.\r\n\r\n**Lab 5.2 — Sơ đồ + rà soát (120 phút):** Mô tả kiến trúc đã chọn cho AI → sinh mô tả sơ đồ → vẽ trong Draw.io; rà bảo mật & độ phức tạp. *Kết quả:* `Architecture Blueprint` (sơ đồ + thành phần + quyết định công nghệ).\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| ADR | `02-Design/ADR-###` | `[[note]]` |\r\n| Architecture Blueprint + sơ đồ | `02-Design/` | `[[note]]` + ảnh |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Chất lượng ADR | Có quyết định | Có trade-off | \"Vì sao\" thuyết phục, sát ràng buộc |\r\n| **Mức độ thẩm định** | Nhận thiết kế AI | So sánh phương án | Bác được phương án over-engineered, bảo vệ lựa chọn |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Chọn kiến trúc phức tạp cho oai.** *Phòng:* quy tắc 4.5.\r\n- ⚠️ **ADR chỉ ghi \"chọn gì\" không ghi \"vì sao\".** *Phòng:* template + chấm điểm phần lý do.\r\n- ⚠️ Bỏ bảo mật tới cuối. *Phòng:* 4.4.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao \"đơn giản nhất đủ dùng\" thường khó hơn \"phức tạp cho chắc\"?\r\n- AI nên có tiếng nói tới đâu trong quyết định kiến trúc?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Hoàn thiện **Architecture Blueprint cho Capstone**: ≥2 ADR + 1 sơ đồ tổng thể.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 2 — AI-Assisted Architecture and System Design).\r\n- `07-obsidian-vault-template/99-Templates/ADR.md`.\r\n","lab":"# Lab Guide — M5: Thiết kế & Kiến trúc hệ thống với AI\r\n\r\n> Bám module [M5](02-modules/M5-thiet-ke-kien-truc-voi-ai.md). 2 lab · ~6 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nDùng AI **mở rộng không gian phương án** (2–3 lựa chọn + trade-off) rồi **người thu hẹp** theo ràng buộc thật. Ghi quyết định vào **ADR** — giá trị nhất ở chữ *\"vì sao\"*. Đưa **bảo mật** vào từ sớm. Rủi ro: AI hay **over-engineer** → chọn giải pháp đơn giản nhất đủ dùng.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Backlog từ M4 trong vault.\r\n- [ ] Draw.io (hoặc bản tích hợp).\r\n\r\n---\r\n\r\n## Lab 5.1 — Brainstorm + ADR (⏱️ 135')\r\n\r\n🎯 **Mục tiêu:** Ra quyết định kiến trúc có lý lẽ.\r\n\r\n📋 **Các bước**\r\n1. Chọn 1 story/cụm tính năng từ M4. Prompt brainstorm:\r\n   ```\r\n   \"Cho yêu cầu [dán]. Đề xuất ĐÚNG 3 phương án kiến trúc từ đơn giản đến phức\r\n   tạp. Mỗi phương án: ưu, nhược, khi nào nên dùng, chi phí vận hành. Ưu tiên\r\n   đơn giản nhất đủ đáp ứng — nêu vì sao có thể KHÔNG cần phương án phức tạp.\"\r\n   ```\r\n2. Chọn 1 phương án, viết `ADR-###` (template) vào `02-Design/`, nêu rõ **vì sao** + đánh đổi.\r\n\r\n✅ **Checkpoint:** ≥1 ADR có đủ bối cảnh/phương án/quyết định/hệ quả.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Trong 3 phương án AI đưa, có cái nào **over-engineered** cho quy mô phòng khám nhỏ không? Bạn bác bằng ràng buộc thực tế nào (đội ngũ, thời gian, tải)?\r\n\r\n📤 **Nộp:** `ADR-###` trong vault.\r\n\r\n---\r\n\r\n## Lab 5.2 — Sơ đồ + rà soát (⏱️ 120')\r\n\r\n🎯 **Mục tiêu:** Trực quan hóa & kiểm bảo mật/độ phức tạp.\r\n\r\n📋 **Các bước**\r\n1. Mô tả kiến trúc đã chọn cho AI → sinh mô tả thành phần & luồng.\r\n2. Vẽ sơ đồ trong Draw.io (thành phần + luồng dữ liệu chính).\r\n3. Rà bảo mật: dữ liệu nhạy cảm (thông tin bệnh nhân), xác thực/phân quyền.\r\n\r\n✅ **Checkpoint:** `Architecture Blueprint` = sơ đồ + danh sách thành phần + quyết định công nghệ.\r\n\r\n🔍 **Thẩm định:** AI có bỏ sót điểm bảo mật nào với dữ liệu y tế không? Bạn bổ sung gì?\r\n\r\n📤 **Nộp:** Architecture Blueprint vào `02-Design/` (mốc Capstone: ≥2 ADR + blueprint).\r\n\r\n🐞 **Lỗi thường gặp:** Sơ đồ quá chi tiết/rối → giữ ở mức \"high-level\" đủ hiểu.\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn đã định \"hình hài\" hệ thống và *bảo vệ được lựa chọn* — chống lại cám dỗ phức tạp hóa của AI.\r\n"},{"id":"M6","title":"Spec-Driven Development","theory":"# M6 — Spec-Driven Development (Đặc tả AI-Ready)\r\n\r\n> **Giai đoạn:** GĐ3 (Greenfield) · **CASAN:** Augmented → Standard\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M4, M5\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Cổng duyệt Spec (draft→approved→code)](09-so-do-truc-quan/08-cong-duyet-spec.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐây là **bản lề** của cả khóa. Khi AI viết phần lớn code, thứ con người tạo ra giá trị nhất là **đặc tả (spec)** — \"mã nguồn mới\" mà từ đó code được sinh ra. Spec mơ hồ → AI đoán → code sai. Spec rõ → AI làm đúng và *kiểm chứng được*. Module dạy viết spec \"AI-Ready\" và thiết lập **cổng duyệt** (`status: approved`) — quy tắc xương sống: *agent không code khi spec chưa duyệt*.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Nêu **đặc điểm của spec tốt / AI-Ready**.\r\n- [ ] Chuyển **User Story → Feature Spec** chi tiết, không placeholder.\r\n- [ ] Viết **hợp đồng kỹ thuật** (API, data, lỗi) và **test cases mong muốn**.\r\n- [ ] Vận hành **cổng duyệt spec** (`draft → reviewed → approved`).\r\n- [ ] Tự kiểm spec bằng checklist \"AI-Ready\".\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| C — AI-Assisted Engineering | Spec-first, đặc tả AI-Ready |\r\n| E — Quy trình | Cổng duyệt & traceability |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Vì sao spec quan trọng trở lại\r\nCode-centric → spec-centric: giá trị dịch từ \"viết code\" sang \"viết spec đúng để AI sinh code\". Spec là nơi con người *thực sự* suy nghĩ.\r\n\r\n### 4.2 Đặc điểm spec AI-Ready\r\n- Rõ phạm vi (in/out), hành vi chi tiết, trường hợp biên & lỗi.\r\n- Hợp đồng kỹ thuật cụ thể (interface, data shape, mã lỗi).\r\n- **Có sẵn test mong muốn** (để TDD).\r\n- **Không placeholder** (TODO/TBD/\"xử lý sau\").\r\n- Đủ rõ để *người khác hoặc agent* làm mà không hỏi lại.\r\n\r\n### 4.3 Từ User Story → Executable Specification\r\nStory trả lời \"cái gì & vì sao\"; spec trả lời \"chính xác như thế nào\". Spec đủ tốt gần như *thực thi được* (executable): test cases trong spec chính là tiêu chí RED của TDD ở M7.\r\n\r\n### 4.4 Cổng duyệt (Approval gate)\r\n`status: draft → reviewed → approved`. **Agent chỉ code khi `approved`.** Đây là checkpoint Human-in-the-loop quan trọng nhất trước khi giao việc cho agent.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Hiểu vì sao spec là \"mã nguồn mới\" và viết được bản Feature Spec đầu tiên | Đọc mục 4.1–4.2 để nắm vì sao giá trị dịch từ viết code sang viết spec; ghi nhớ 5 đặc điểm của spec AI-Ready (rõ phạm vi, có contract, có test mong muốn, không placeholder); chọn 1 user story (M4) kèm ADR (M5) rồi viết `SPEC-###` theo template với đầy đủ contract + test cases; tự đối chiếu ví dụ \"mơ hồ vs AI-Ready\" ở mục 6 để soát lại bài của bạn | Một Feature Spec ở `status: draft`, có hợp đồng kỹ thuật và test cases, liên kết về story/ADR gốc | 3h (0:45 lý thuyết + 2:15 Lab) | Lab 6.1 — Story → Spec |\r\n| 2 | Biến spec thành \"executable\", red-team để bắt lỗ hổng và đưa spec qua cổng duyệt | Đọc mục 4.3–4.4 để hiểu spec đủ tốt gần như thực thi được và quy tắc cổng duyệt `draft → reviewed → approved` (agent chỉ code khi `approved`); đổi spec với nhóm/bạn khác để review chéo; dùng prompt \"công kích\" ở mục 6 để tự tìm chỗ mơ hồ, thiếu trường hợp biên; sửa spec tới khi đạt checklist AI-Ready rồi chuyển trạng thái sang `approved` và chốt lại | Spec đạt `status: approved`, không còn placeholder, kèm review notes, sẵn sàng giao cho agent ở M7 | 3h (0:30 lý thuyết + 1:45 Lab + 0:45 duyệt & chốt) | Lab 6.2 — Red-team & duyệt |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Đối chiếu: spec mơ hồ vs AI-Ready\r\n```\r\n❌ Mơ hồ: \"Người dùng đăng nhập được và hệ thống bảo mật.\"\r\n✅ AI-Ready:\r\n  - POST /login {email, password} → 200 {token} | 401 {error}\r\n  - Khóa tài khoản sau 5 lần sai trong 10 phút (mã lỗi ACCOUNT_LOCKED)\r\n  - Test: (1) đúng mật khẩu→token; (2) sai 5 lần→khóa; (3) email rỗng→400\r\n```\r\n\r\n### Prompt mẫu — nhờ AI \"công kích\" spec của chính mình\r\n```\r\n\"Đóng vai kỹ sư khó tính. Spec sau còn chỗ nào mơ hồ, thiếu trường hợp biên,\r\nhay có thể hiểu theo 2 nghĩa? Liệt kê câu hỏi cần làm rõ TRƯỚC khi code.\"\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 6.1 — Story → Spec (135 phút):** Chọn 1 story (M4) + ADR (M5); viết `SPEC-###` theo template, đầy đủ contract + test cases. *Kết quả:* spec `status: draft`.\r\n\r\n**Lab 6.2 — Red-team & duyệt (105 phút):** Nhóm khác review chéo spec; dùng prompt \"công kích\" để tìm lỗ hổng; sửa tới khi đạt checklist AI-Ready rồi chuyển `approved`. *Kết quả:* spec `approved`, sẵn sàng cho M7.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Feature Spec (approved) | `03-Specs/SPEC-###` | `[[note]]` |\r\n| Spec review notes | `03-Specs/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Độ rõ của spec | Có contract | Có test cases | Đạt full checklist AI-Ready, không placeholder |\r\n| **Mức độ thẩm định** | Tự viết spec | Review chéo | Red-team được spec, bắt mơ hồ trước khi code |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Spec để placeholder** rồi \"code rồi tính\". *Phòng:* checklist cấm placeholder.\r\n- ⚠️ **Duyệt spec cho có** (`approved` mà chưa review). *Phòng:* bắt buộc review chéo Lab 6.2.\r\n- ⚠️ Spec quá chi tiết tới mức *viết luôn code* — mất linh hoạt. *Phòng:* spec mô tả *hành vi & contract*, không phải implementation.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- \"Spec là mã nguồn mới\" — bạn đồng ý tới đâu? Có gì AI *không* nên được giao quyết định trong spec?\r\n- Cổng duyệt spec có làm chậm không? Đánh đổi gì để đạt được gì?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Viết & duyệt **≥2 spec AI-Ready** cho các tính năng Capstone, liên kết về story/ADR.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 5 — Rise of Specification-Driven Software Engineering).\r\n- `08-agent-setup-kit/skills-catalog.md` (`/spec`).\r\n- `07-obsidian-vault-template/99-Templates/Feature_Spec.md`.\r\n","lab":"# Lab Guide — M6: Spec-Driven Development (AI-Ready)\r\n\r\n> Bám module [M6](02-modules/M6-spec-driven-development.md). 2 lab · ~6 giờ. **Bản lề của khóa.**\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nKhi AI viết code, **spec là \"mã nguồn mới\"**. Spec AI-Ready: rõ phạm vi, hành vi chi tiết, contract kỹ thuật (API/data/lỗi), **có sẵn test cases mong muốn**, **không placeholder**, đủ rõ để người/agent khác làm mà không hỏi lại. Cổng duyệt: `draft → reviewed → approved`. **Agent chỉ code khi `approved`.**\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Story (M4) + ADR (M5) trong vault.\r\n\r\n---\r\n\r\n## Lab 6.1 — Story → Feature Spec (⏱️ 135')\r\n\r\n🎯 **Mục tiêu:** Viết spec đủ rõ để AI code đúng & kiểm chứng được.\r\n\r\n📋 **Các bước**\r\n1. Chọn 1 story + ADR liên quan. Tạo `SPEC-###` (template) trong `03-Specs/`.\r\n2. Điền đủ: phạm vi in/out, hành vi (gồm biên & lỗi), **contract** (endpoint, request/response, mã lỗi), **bảng test cases mong muốn**.\r\n3. Chạy checklist \"AI-Ready\" cuối template — không để mục nào hở.\r\n\r\n✅ **Checkpoint:** Spec đạt checklist, `status: draft`.\r\n\r\n🔍 **Thẩm định:** Đối chiếu spec mơ hồ vs AI-Ready (ví dụ trong module). Đưa cả hai cho agent sinh code thử — chất lượng khác nhau ra sao?\r\n\r\n📤 **Nộp:** `SPEC-###` (draft).\r\n\r\n🐞 **Lỗi thường gặp:** Spec chi tiết tới mức *viết luôn code* → mô tả *hành vi & contract*, không phải implementation.\r\n\r\n---\r\n\r\n## Lab 6.2 — Red-team & duyệt spec (⏱️ 105')\r\n\r\n🎯 **Mục tiêu:** Làm spec \"chống đạn\" trước khi giao agent.\r\n\r\n📋 **Các bước**\r\n1. Nhóm khác review chéo spec của bạn.\r\n2. Dùng prompt red-team:\r\n   ```\r\n   \"Đóng vai kỹ sư khó tính. Spec sau còn chỗ nào mơ hồ, thiếu trường hợp biên,\r\n   hiểu được 2 nghĩa? Liệt kê câu hỏi cần làm rõ TRƯỚC khi code.\"\r\n   ```\r\n3. Sửa tới khi hết hở → chuyển `status: approved`.\r\n\r\n✅ **Checkpoint:** Spec `approved`, có dấu vết review chéo.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Liệt kê **≥3 điểm mơ hồ** mà red-team (AI hoặc nhóm bạn) phát hiện mà bạn đã bỏ sót. Đây là bằng chứng năng lực thẩm định.\r\n\r\n📤 **Nộp:** `SPEC-###` (approved) + spec review notes (mốc Capstone: ≥2 spec approved).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nSpec approved = \"đèn xanh\" cho agent ở M7. Đầu tư vào spec chính là đầu tư vào chất lượng code AI sẽ sinh.\r\n"},{"id":"M7","title":"Agentic Coding thực chiến (7 bước, TDD)","theory":"# M7 — Agentic Coding thực chiến (Quy trình 7 bước + TDD)\r\n\r\n> **Giai đoạn:** GĐ3 (Greenfield) · **CASAN:** Standard → Automated\r\n> **Thời lượng:** 12 giờ (4 buổi) · **Tiên quyết:** M3 (agent), M6 (spec approved)\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Quy trình Agentic 7 bước + vòng TDD](09-so-do-truc-quan/09-agentic-7-buoc-tdd.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐây là module để học viên thực sự **để AI viết code còn mình điều phối & thẩm định**. Khác với \"chat xin code\", ta áp dụng một **quy trình kỷ luật 7 bước** (chuẩn `superpowers`) với TDD làm xương sống. Mục tiêu: AI viết **phần lớn code thường lệ** (tỉ lệ tùy dự án & độ chín của agent), học viên đóng vai **reviewer & orchestrator** — và *code chỉ tồn tại khi có test bảo chứng*. Đây là nơi nghịch lý thẩm định được giải bằng quy trình, không bằng may rủi.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Chạy trọn **quy trình 7 bước**: Brainstorm → Worktrees → Plans → Subagent → TDD → Review → Finish.\r\n- [ ] Áp dụng **TDD** (RED-GREEN-REFACTOR) với agent: test thất bại trước, code sau.\r\n- [ ] Viết **plan chi tiết** (task 2–5 phút, đường dẫn file, không placeholder).\r\n- [ ] Dùng **Git worktree** để cô lập môi trường.\r\n- [ ] Đóng vai **reviewer**: đọc & duyệt từng thay đổi agent tạo ra.\r\n- [ ] Kết thúc nhánh đúng quy trình (Merge / PR / Keep / Discard).\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| B — Kỹ thuật Coding Agent | Điều phối agent theo quy trình |\r\n| C — AI-Assisted Engineering | TDD với AI, planning |\r\n| A — Nền tảng & Thẩm định | Review từng diff |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Quy trình 7 bước (superpowers)\r\n1. **Brainstorming** — làm rõ mục tiêu, agent hỏi từng câu, tạo spec (đã có từ M6).\r\n2. **Git Worktrees** — nhánh & môi trường sạch, chạy test suite ban đầu.\r\n3. **Writing Plans** — chia task cực nhỏ (2–5'), rõ file/đường dẫn/lệnh test, **không placeholder**.\r\n4. **Subagent-Driven** — ủy thác việc cơ học, agent chính điều phối.\r\n5. **TDD** — không viết code production nếu chưa có test fail; code viết trước test → xóa.\r\n6. **Code Review** — review chéo spec ↔ code bởi reviewer độc lập.\r\n7. **Finishing Branch** — chạy lại full test, đưa 4 lựa chọn, dọn worktree.\r\n\r\n### 4.2 TDD với AI: RED → GREEN → REFACTOR\r\n- **RED:** viết test theo \"test cases mong muốn\" trong spec → chạy → thất bại.\r\n- **GREEN:** để agent viết code tối thiểu cho test pass.\r\n- **REFACTOR:** dọn sạch, test vẫn xanh.\r\n\r\n### 4.3 Vai trò con người ở đây\r\nBạn **không gõ phần lớn code**, nhưng bạn: duyệt plan, đọc từng diff, chạy test, quyết định merge. *Năng suất tăng nhưng trách nhiệm không giảm.*\r\n\r\n### 4.4 Map với slash command (agent-skills)\r\n`/spec` (M6) → `/plan` → `/build` → `/test` → `/review` → `/ship`.\r\n\r\n### 4.5 Debug có hệ thống với AI\r\nGặp bug, **đừng dán nguyên stacktrace bảo AI \"sửa giúp\"** — đó là cửa ngõ của \"Accept-All\". Theo quy trình **CON NGƯỜI dẫn dắt, AI hỗ trợ**:\r\n1. **Reproduce** — tái hiện lỗi ổn định (bước, input, môi trường). Chưa tái hiện được thì *chưa sửa*.\r\n2. **Isolate** — thu hẹp phạm vi: binary search trên commit/đoạn code, tắt bớt biến số đến khi cô lập được điểm hỏng.\r\n3. **Hypothesize** — nêu giả thuyết nguyên nhân gốc. AI giúp **đọc log, gợi ý giả thuyết**; bạn chọn cái hợp lý nhất.\r\n4. **Fix** — sửa đúng nguyên nhân gốc, không vá triệu chứng.\r\n5. **Verify** — viết/chạy test tái hiện bug (regression test) → phải xanh; chạy lại full suite.\r\n\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Nắm khung quy trình 7 bước và chuẩn bị môi trường sạch để agent làm việc | Đọc mục 4.1 để hiểu trọn 7 bước (Brainstorm → Worktrees → Plans → Subagent → TDD → Review → Finish) và vai trò điều phối của bạn; từ một `SPEC-###` đã approved ở M6, bạn tạo Git worktree để cô lập môi trường và chạy test suite ban đầu; bạn yêu cầu agent viết plan chi tiết rồi **tự tay duyệt plan** (task 2–5', rõ đường dẫn file, không placeholder) trước khi cho build | Bạn có một worktree sạch và một bản plan đạt chuẩn, không placeholder, sẵn sàng để build | 3h | Lab 7.1 — Worktree + Plan |\r\n| 2 | Làm chủ vòng TDD (RED → GREEN → REFACTOR) khi để agent viết code | Đọc mục 4.2 để hiểu vì sao \"code chỉ tồn tại khi có test bảo chứng\"; bạn bắt agent viết test trước và **cho thấy nó FAIL** ở bước RED, sau đó để agent viết code tối thiểu cho test pass (GREEN), rồi dọn sạch mà vẫn giữ test xanh (REFACTOR); bạn quan sát và nhắc rules nếu agent \"nhảy cóc\" viết code trước test | Bạn có một tính năng với code + test đều xanh, và lịch sử commit phản ánh đúng nhịp TDD | 3h | Lab 7.2 — RED-GREEN-REFACTOR với agent |\r\n| 3 | Hoàn thiện một tính năng đầy đủ và biết ủy thác việc cơ học cho subagent | Bạn mở rộng tính năng ở Buổi 2 cho đến khi khớp trọn spec; bạn áp dụng mô hình Subagent-Driven (mục 4.1) — giao các việc cơ học, lặp lại cho subagent trong khi agent chính điều phối; bạn vẫn đọc từng diff và chạy test sau mỗi bước thay vì \"Accept-All\" | Bạn có một tính năng hoàn chỉnh đúng spec, được xây qua việc điều phối subagent có kiểm soát | 3h | Lab 7.3 — Hoàn thiện tính năng + subagent |\r\n| 4 | Đóng vai reviewer và kết thúc nhánh đúng quy trình | Đọc mục 4.3 để thấm \"năng suất tăng nhưng trách nhiệm không giảm\"; bạn chạy lại full test suite, đọc & duyệt từng thay đổi, rồi chọn một trong các lựa chọn kết thúc (Merge / PR / Keep / Discard) và dọn sạch worktree; cuối cùng bạn viết một bản retro ngắn rút ra bài học cho lần sau | Bạn có một PR sạch kèm review notes, nhánh được dọn gọn, và một retro ngắn ghi lại điều học được | 3h | Lab 7.4 — Finishing branch + retro |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Plan tốt vs tệ\r\n```\r\n❌ Tệ: \"Làm chức năng login.\"\r\n✅ Tốt:\r\n  Task 1 (3'): tạo src/auth/login.test.ts — test: đúng mk→token, sai 5 lần→khóa\r\n  Task 2 (4'): tạo src/auth/login.ts — implement tối thiểu cho test pass\r\n  Task 3 (3'): thêm rate-limit; cập nhật test ACCOUNT_LOCKED\r\n  Lệnh kiểm thử: npm test src/auth\r\n```\r\n\r\n### Quan sát TDD thực tế\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 7.1 — Worktree + Plan (2.5h):** Từ `SPEC-###` approved, tạo worktree, để agent viết plan chi tiết; học viên **duyệt plan** trước khi cho build. *Kết quả:* plan đạt chuẩn (không placeholder).\r\n\r\n**Lab 7.2 — TDD (2.5h):** Chạy RED-GREEN-REFACTOR cho 1 tính năng với agent. *Kết quả:* code + test xanh, lịch sử commit theo TDD.\r\n\r\n**Lab 7.3 — Hoàn thiện + subagent (2.5h):** Mở rộng tính năng; ủy thác việc cơ học cho subagent. *Kết quả:* tính năng hoàn chỉnh đúng spec.\r\n\r\n**Lab 7.4 — Finishing branch (2h):** Chạy full test, chọn Merge/PR; viết retro ngắn. *Kết quả:* PR sạch + nhánh được dọn.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Source code + test | Repo Capstone | code |\r\n| Dev log / quyết định | `04-Development/` vault | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Tuân quy trình | Có dùng agent | Có plan + TDD | Trọn 7 bước, commit theo TDD |\r\n| **Mức độ thẩm định** | Chấp nhận code | Đọc diff | Duyệt từng task, bắt lỗi trước khi merge |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Bỏ TDD \"cho nhanh\".** *Phòng:* rules + chấm điểm lịch sử commit.\r\n- ⚠️ **Merge mà không đọc diff.** *Phòng:* yêu cầu review notes mỗi PR.\r\n- ⚠️ **Plan mơ hồ.** *Phòng:* duyệt plan ở Lab 7.1.\r\n- ⚠️ **Tin bản vá đầu tiên của AI khi chưa tái hiện được lỗi gốc.** *Phòng:* bắt buộc reproduce trước khi sửa (4.5).\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Nếu agent viết 80% code, vì sao TDD lại *quan trọng hơn* chứ không kém đi?\r\n- \"Năng suất tăng nhưng trách nhiệm không giảm\" nghĩa là gì với bạn?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Triển khai **≥2 tính năng Capstone** trọn quy trình 7 bước, có PR + test xanh.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- `obra/superpowers` (7-step workflow), `08-agent-setup-kit/subagent-patterns.md`.\r\n- Ghi chú AI-DLC (mục Agentic Coding).\r\n","lab":"# Lab Guide — M7: Agentic Coding thực chiến (7 bước + TDD)\r\n\r\n> Bám module [M7](02-modules/M7-agentic-coding-thuc-chien.md). 4 lab · ~12 giờ. **Kỹ năng khó nhất khóa.**\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nQuy trình 7 bước (superpowers): Brainstorm → **Worktrees** → **Writing Plans** → **Subagent** → **TDD** → **Code Review** → **Finishing Branch**. TDD: **RED** (test fail trước) → **GREEN** (code tối thiểu) → **REFACTOR**. Bạn không gõ phần lớn code, nhưng **duyệt plan, đọc từng diff, chạy test, quyết merge**. Map: `/plan → /build → /test → /review → /ship`.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Spec `approved` (M6) + agent cấu hình (M3).\r\n- [ ] Repo Capstone, Git worktree khả dụng.\r\n\r\n---\r\n\r\n## Lab 7.1 — Worktree + Plan (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Cô lập môi trường + có plan chi tiết bạn đã duyệt.\r\n\r\n📋 **Các bước**\r\n1. Tạo worktree cho tính năng:\r\n   ```bash\r\n   git worktree add ../wt-feature-1 -b feature/dat-lich\r\n   ```\r\n2. Chạy test suite ban đầu để chắc môi trường sạch.\r\n3. Cho agent `/plan` từ `SPEC-###` approved → plan chia task ≤5', rõ đường dẫn file, **không placeholder**.\r\n4. **Duyệt plan** trước khi cho build.\r\n\r\n✅ **Checkpoint:** Plan đạt chuẩn (mỗi task có file + lệnh test, 0 TODO/TBD).\r\n\r\n🔍 **Thẩm định (trọng tâm):** Tìm trong plan ≥1 task mơ hồ/placeholder và yêu cầu agent làm rõ. *Plan mơ hồ = agent tự do sáng tác.*\r\n\r\n📤 **Nộp:** Plan đã duyệt vào `04-Development/`.\r\n\r\n---\r\n\r\n## Lab 7.2 — TDD: RED-GREEN-REFACTOR (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Để agent code nhưng có test bảo chứng.\r\n\r\n📋 **Các bước**\r\n1. **RED:** yêu cầu agent viết test theo \"test cases mong muốn\" trong spec → chạy → **phải FAIL**.\r\n2. **GREEN:** agent viết code tối thiểu cho test pass.\r\n3. **REFACTOR:** dọn code, test vẫn xanh.\r\n4. Commit theo từng pha.\r\n\r\n✅ **Checkpoint:** Lịch sử commit thể hiện RED → GREEN → REFACTOR; test xanh.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Ở bước RED, bạn có **thấy test FAIL thật** trước khi có code không? Nếu agent \"nhảy cóc\" viết code trước — nhắc rule & ghi lại.\r\n\r\n📤 **Nộp:** Code + test, lịch sử commit TDD.\r\n\r\n🐞 **Lỗi thường gặp:** Agent viết test luôn-pass để \"qua\" RED → ép test phản ánh đúng hành vi spec.\r\n\r\n---\r\n\r\n## Lab 7.3 — Hoàn thiện + Subagent (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Mở rộng tính năng + ủy thác việc cơ học.\r\n\r\n📋 **Các bước**\r\n1. Tiếp tục TDD cho phần còn lại của tính năng.\r\n2. Giao subagent việc cơ học (vd: sinh boilerplate cho các route tương tự) theo `subagent-patterns.md`.\r\n\r\n✅ **Checkpoint:** Tính năng hoàn chỉnh đúng spec, test xanh.\r\n\r\n🔍 **Thẩm định:** Kết quả subagent có chỗ nào ngoài phạm vi/sai không? Bạn vẫn duyệt cuối chứ?\r\n\r\n📤 **Nộp:** Tính năng hoàn chỉnh.\r\n\r\n---\r\n\r\n## Lab 7.4 — Finishing Branch (⏱️ 2h)\r\n\r\n🎯 **Mục tiêu:** Kết thúc nhánh đúng quy trình.\r\n\r\n📋 **Các bước**\r\n1. Chạy lại **full test suite**.\r\n2. Đọc toàn bộ diff như reviewer; viết review notes.\r\n3. Chọn: Merge / Push & PR / Keep / Discard. Dọn worktree:\r\n   ```bash\r\n   git worktree remove ../wt-feature-1\r\n   ```\r\n4. Viết retro ngắn (cái gì tốt/làm lại).\r\n\r\n✅ **Checkpoint:** PR sạch + worktree đã dọn.\r\n\r\n🔍 **Thẩm định:** Bạn có merge mà chưa đọc hết diff không? (Đừng.) Diff có dòng nào bạn *không hiểu* không — hỏi agent giải thích & xác minh.\r\n\r\n📤 **Nộp:** Link PR + retro (mốc Capstone: ≥2 tính năng trọn quy trình).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn vừa để AI viết phần lớn code mà vẫn **giữ quyền kiểm soát** qua plan, TDD và review. \"Năng suất tăng nhưng trách nhiệm không giảm.\"\r\n"},{"id":"M8","title":"Kiểm thử với AI (Self-Healing)","theory":"# M8 — Kiểm thử với AI (Self-Healing Testing)\r\n\r\n> **Giai đoạn:** GĐ3 (Greenfield) · **CASAN:** Standard\r\n> **Thời lượng:** 9 giờ (3 buổi) · **Tiên quyết:** M7\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [\"Đập code\" săn test giả](09-so-do-truc-quan/10-dap-code-test-gia.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nTest là \"lưới an toàn\" cho phần mềm — đặc biệt khi AI viết phần lớn code. AI sinh test rất nhanh, nhưng test do AI viết có thể **\"test cho có\"** (luôn pass, không kiểm đúng hành vi). Module dạy dùng AI sinh unit/e2e test hiệu quả *và* thẩm định để test thực sự bảo vệ. Báo cáo test đẩy về `05-Testing/`.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Dùng AI sinh **unit test**, **test data**, hỗ trợ **regression**.\r\n- [ ] Viết **e2e test** với Playwright từ mô tả (kể cả mô tả tiếng Việt).\r\n- [ ] Đọc & đánh giá **coverage** và chất lượng test (không chỉ con số).\r\n- [ ] Phát hiện **test giả** (luôn pass / không assert đúng).\r\n- [ ] Ghi **Test Report** vào vault.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| C — AI-Assisted Engineering | Sinh & đánh giá test |\r\n| A — Nền tảng & Thẩm định | Bắt test giả, đọc coverage có phê phán |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Các loại test & vai trò\r\n- **Unit** — kiểm logic nhỏ, nhanh, nhiều.\r\n- **e2e** — kiểm luồng người dùng thật (Playwright trên trình duyệt; nhóm API/headless dùng **supertest** mức API).\r\n- **Test data** — sinh dữ liệu biên/đa dạng.\r\n\r\n### 4.2 Self-Healing Testing (ý niệm)\r\nViết yêu cầu test bằng ngôn ngữ tự nhiên → agent biến thành mã chạy thử (Playwright) → tự chạy trên trình duyệt → báo lỗi về vault (`TR-###`).\r\n\r\n### 4.3 ⚠️ \"Test giả\" — cạm bẫy lớn nhất\r\nAI có thể viết test luôn pass (assert hời hợt, mock quá tay che mất lỗi). **Quy tắc kiểm:** test phải *thất bại khi code sai* — thử \"đập\" code (mutation thủ công) xem test có bắt không.\r\n\r\n### 4.4 Coverage không phải chân lý\r\n100% coverage vẫn có thể bỏ sót hành vi. Đọc *test có kiểm đúng điều quan trọng không*, đừng thờ phụng con số.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Hiểu các loại test và biết dùng AI sinh unit test có ý nghĩa | Đọc mục 4.1 để nắm vai trò của unit / e2e / test data; chọn 1 tính năng bạn đã làm ở M7; nhờ AI sinh unit test cho tính năng đó; rà lại để chắc test phủ các trường hợp biên trong spec, không chỉ \"happy path\" | Một bộ unit test xanh, có ý nghĩa, phủ được các ca biên cho tính năng từ M7 | 3h | Lab 8.1 — Unit test với AI |\r\n| 2 | Viết được e2e test bằng Playwright xuất phát từ mô tả tiếng Việt | Đọc mục 4.2 về Self-Healing Testing; dùng prompt mẫu để mô tả luồng người dùng (vd luồng đặt lịch CAP-1); để AI dịch mô tả thành mã Playwright dùng getByRole/getByText; chạy test trên trình duyệt và xem nó pass/fail; viết ít nhất 2 kịch bản e2e | ≥2 kịch bản e2e chạy được trên trình duyệt, kèm ảnh chụp màn hình hoặc log kết quả | 3h | Lab 8.2 — e2e Playwright từ mô tả |\r\n| 3 | Phát hiện \"test giả\", đọc coverage có phê phán và ghi Test Report | Đọc mục 4.3–4.4 về test giả và giới hạn của coverage; \"đập code\" — cố tình sửa code cho sai (vd bỏ quy tắc hủy lịch sát giờ) rồi chạy lại test; loại những test vẫn xanh khi code đã sai và viết lại; đọc coverage để xem test có kiểm đúng điều quan trọng không; ghi `TR-###` vào `05-Testing/` | Test Report `TR-###` trong vault `05-Testing/`, kèm ghi chú các test giả đã loại và lý do | 3h | Lab 8.3 — Săn test giả + Test Report |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — e2e từ mô tả tiếng Việt\r\n```\r\n\"Viết test Playwright cho luồng CAP-1: bệnh nhân mở /dat-lich, chọn chuyên\r\nkhoa, chọn bác sĩ, chọn giờ trống, bấm 'Xác nhận', kỳ vọng thấy 'Đặt lịch\r\nthành công'. Dùng getByRole/getByText. Test phải FAIL nếu thông báo không xuất hiện.\"\r\n```\r\n\r\n### Bài tập \"đập code\" để lộ test giả\r\n```\r\nSửa code cho cố tình sai (vd bỏ kiểm quy tắc hủy sát giờ < 2 tiếng) → chạy test.\r\nTest TỐT sẽ chuyển đỏ. Test GIẢ vẫn xanh → vứt và viết lại.\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 8.1 — Unit test (2.5h):** Sinh unit test cho tính năng từ M7; đảm bảo phủ biên trong spec. *Kết quả:* bộ unit test xanh, có ý nghĩa.\r\n\r\n**Lab 8.2 — e2e Playwright (2.5h):** Viết ≥2 kịch bản e2e từ mô tả; chạy trên trình duyệt. *Kết quả:* e2e chạy + ảnh/log.\r\n\r\n**Lab 8.3 — Săn test giả + Report (2.5h):** \"Đập code\" để kiểm test; loại test giả; viết `TR-###`. *Kết quả:* Test Report trong `05-Testing/` + ghi chú test bị loại.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Bộ test (unit + e2e) | Repo Capstone | code |\r\n| Test Report | `05-Testing/TR-###` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Chất lượng test | Có test xanh | Phủ biên | Test fail đúng khi code sai (đã kiểm) |\r\n| **Mức độ thẩm định** | Nhận test AI | Đọc coverage | Bắt & loại được test giả |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Tin coverage 100%.** *Phòng:* 4.4 + \"đập code\".\r\n- ⚠️ **Test giả luôn pass.** *Phòng:* Lab 8.3.\r\n- ⚠️ Mock quá tay che lỗi thật. *Phòng:* ưu tiên test hành vi thật.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Một bộ test \"xanh hết\" có chắc là tốt? Làm sao biết test đáng tin?\r\n- Khi AI vừa viết code vừa viết test, rủi ro gì xuất hiện?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Đạt **bộ test có ý nghĩa** cho các tính năng Capstone + 1 Test Report mỗi tính năng.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 3 — AI-Assisted Testing).\r\n- Playwright docs; `08-agent-setup-kit/skills-catalog.md` (`/test`, `test-engineer`).\r\n","lab":"# Lab Guide — M8: Kiểm thử với AI (Self-Healing)\r\n\r\n> Bám module [M8](02-modules/M8-kiem-thu-voi-ai.md). 3 lab · ~9 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nAI sinh test nhanh nhưng dễ tạo **test giả** (luôn pass, assert hời hợt, mock quá tay). Quy tắc vàng: **test phải FAIL khi code sai** — kiểm bằng cách \"đập code\". Coverage cao ≠ test tốt. **Self-healing:** viết yêu cầu test bằng ngôn ngữ tự nhiên → agent → Playwright → report về `05-Testing/`.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Tính năng + code từ M7.\r\n- [ ] Công cụ e2e cài trong repo — chọn theo Capstone: **Playwright** (nhóm có UI): `npm i -D @playwright/test && npx playwright install`; HOẶC **supertest** (nhóm API/headless): `npm i -D supertest`.\r\n\r\n---\r\n\r\n## Lab 8.1 — Unit test với AI (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Bộ unit test phủ đúng spec.\r\n\r\n📋 **Các bước**\r\n1. Cho agent sinh unit test cho tính năng M7, bám \"test cases mong muốn\" trong `SPEC-###`.\r\n2. Bổ sung test cho trường hợp biên còn thiếu.\r\n3. Chạy, đạt xanh.\r\n\r\n✅ **Checkpoint:** Unit test phủ happy path + biên + lỗi.\r\n\r\n🔍 **Thẩm định:** Có test nào chỉ \"chạy hàm\" mà **không assert** kết quả đúng không? Đánh dấu & sửa.\r\n\r\n📤 **Nộp:** Bộ unit test.\r\n\r\n---\r\n\r\n## Lab 8.2 — e2e với Playwright (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Kiểm luồng người dùng thật.\r\n\r\n📋 **Các bước**\r\n1. Prompt sinh e2e từ mô tả tiếng Việt (bám luồng CAP-1 \"Đặt lịch hẹn phòng khám\"), dùng selector theo **role/text** ổn định:\r\n   ```\r\n   \"Viết test Playwright cho luồng đặt lịch: bệnh nhân mở /dat-lich, chọn chuyên\r\n   khoa 'Tim mạch', chọn bác sĩ, chọn một giờ trống, bấm nút 'Xác nhận'. Kỳ vọng\r\n   thấy thông báo 'Đặt lịch thành công'. Dùng getByRole/getByText (KHÔNG dùng\r\n   selector CSS dễ vỡ). Test phải FAIL nếu thông báo không xuất hiện.\"\r\n   ```\r\n2. Viết ≥2 kịch bản e2e cho tính năng chính (vd thêm ca quy tắc: **không cho hủy sát giờ** — bấm \"Hủy lịch\" khi còn < 2 tiếng trước hẹn, kỳ vọng thấy lỗi \"Không thể hủy sát giờ\"). Chạy trên trình duyệt.\r\n\r\n> 🗺️ **Nhóm KHÔNG có UI (headless / API-only).** Capstone không bắt buộc UI. Nếu Capstone của bạn chỉ có API, làm e2e ở **mức API** bằng **supertest** chạy thẳng trên app Express (không cần trình duyệt).\r\n>\r\n> **Prompt mẫu (tiếng Việt):**\r\n> ```\r\n> \"Viết test e2e mức API bằng supertest + node:test cho CAP-1: gửi POST\r\n> /appointments với body hợp lệ (chuyên khoa, bác sĩ, giờ trống), kỳ vọng 201\r\n> và body trả về có 'id' + status 'confirmed'. Thêm ca kiểm quy tắc hủy sát giờ:\r\n> DELETE một lịch còn < 2 tiếng trước hẹn, kỳ vọng 409. Test phải FAIL nếu mã\r\n> trạng thái hoặc body không đúng kỳ vọng.\"\r\n> ```\r\n>\r\n> **Code minh họa** (`test/appointments.e2e.test.js`):\r\n> ```js\r\n> const { test } = require('node:test');\r\n> const assert = require('node:assert/strict');\r\n> const request = require('supertest');\r\n> const app = require('../src/app'); // app Express, KHÔNG gọi app.listen ở đây\r\n>\r\n> test('POST /appointments tạo lịch hợp lệ → 201', async () => {\r\n>   const res = await request(app)\r\n>     .post('/appointments')\r\n>     .send({ specialty: 'tim-mach', doctorId: 'bs-01', slot: '2026-07-01T09:00:00Z' });\r\n>   assert.equal(res.status, 201);\r\n>   assert.ok(res.body.id);\r\n>   assert.equal(res.body.status, 'confirmed');\r\n> });\r\n>\r\n> test('Hủy sát giờ (< 2h trước hẹn) → 409', async () => {\r\n>   const res = await request(app).delete('/appointments/appt-soon'); // hẹn còn <2h\r\n>   assert.equal(res.status, 409); // quy tắc nghiệp vụ chặn hủy sát giờ\r\n> });\r\n> ```\r\n\r\n✅ **Checkpoint:** e2e chạy, có ảnh/log (UI) hoặc kết quả `node --test` xanh (API).\r\n\r\n🔍 **Thẩm định:** Câu \"test phải FAIL nếu...\" có thực sự ép assertion đúng không? Thử bỏ điều kiện và xem test có còn ý nghĩa.\r\n\r\n📤 **Nộp:** Bộ e2e + log.\r\n\r\n🐞 **Lỗi thường gặp:** Selector dễ vỡ → ưu tiên role/text ổn định. Với supertest: quên `module.exports = app` (đừng `app.listen` trong file test) → test treo/lỗi.\r\n\r\n---\r\n\r\n## Lab 8.3 — Săn test giả + Report (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Chứng minh test đáng tin.\r\n\r\n📋 **Các bước**\r\n1. **Đập code:** sửa code cho cố tình sai (vd bỏ kiểm quy tắc hủy sát giờ < 2 tiếng) → chạy test.\r\n2. Test TỐT chuyển đỏ. Test GIẢ vẫn xanh → **vứt & viết lại**.\r\n3. Khôi phục code. Viết `TR-###` (template) vào `05-Testing/`.\r\n\r\n✅ **Checkpoint:** Mọi test đã qua bài \"đập code\"; Test Report hoàn chỉnh.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Liệt kê test giả bạn đã loại + vì sao chúng giả. Đây là bằng chứng năng lực thẩm định test.\r\n\r\n📤 **Nộp:** Bộ test đã kiểm + `TR-###` (mốc Capstone: test có ý nghĩa + report).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn không chỉ \"có test xanh\" mà **chứng minh được test bắt lỗi** — khác biệt giữa lưới an toàn thật và giả.\r\n"},{"id":"M9","title":"Code Review & Secure Dev","theory":"# M9 — Code Review & Secure Development\r\n\r\n> **Giai đoạn:** GĐ3 (Greenfield) · **CASAN:** Standard\r\n> **Thời lượng:** 9 giờ (3 buổi) · **Tiên quyết:** M2 (đọc/review nền), M7, M8\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Human-in-the-loop & Quality gates](09-so-do-truc-quan/12-human-in-the-loop-gates.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐây là **chốt chặn chất lượng** trước khi code ra production. Khi AI sinh nhiều code, review trở thành kỹ năng *giá trị nhất* của kỹ sư — và bảo mật là rủi ro AI dễ tạo ra (input không validate, secret lộ, phụ thuộc lỗi thời). Module dạy review code (của người *và* của AI) một cách có hệ thống, dùng AI hỗ trợ review nhưng **người validate cuối**. Nâng cấp checklist nền từ M2 lên mức chuyên nghiệp.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Review code theo **chuẩn chất lượng** (đúng spec, smell, bảo trì).\r\n- [ ] Thực hiện **security-aware review**: nhận diện lỗ hổng phổ biến.\r\n- [ ] Dùng **persona AI** (`code-reviewer`, `security-auditor`) hỗ trợ review.\r\n- [ ] Áp dụng **2-stage review** (subagent độc lập).\r\n- [ ] **Validate** kết quả review của AI — không tin tuyệt đối.\r\n- [ ] Viết **Code Review Report**.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| A — Nền tảng & Thẩm định | Review chuyên nghiệp |\r\n| F — Governance | Security-aware, human validation |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Review chất lượng — đối chiếu spec\r\nCâu hỏi gốc: *code này có làm đúng `SPEC-###` không?* Sau đó mới tới smell, hiệu năng, bảo trì.\r\n\r\n### 4.2 Security-aware review (lỗ hổng phổ biến)\r\n- Input không validate (injection: SQL, XSS, command).\r\n- Secret hardcode / log lộ dữ liệu nhạy cảm.\r\n- Phân quyền/xác thực thiếu hoặc sai.\r\n- Phụ thuộc (dependency) lỗi thời/không an toàn.\r\n\r\n### 4.3 AI hỗ trợ review — và giới hạn\r\nPersona `code-reviewer`/`security-auditor` quét nhanh, nhưng có thể **bỏ sót lỗi ngữ cảnh** hoặc **báo động giả**. Người là trọng tài cuối.\r\n\r\n### 4.4 2-stage review (chống thiên kiến)\r\nSubagent A viết code; subagent B *độc lập* review đối chiếu spec; cuối cùng **người** duyệt. \"Góc nhìn tươi\" bắt được lỗi mà người viết bị mù.\r\n\r\n### 4.5 Technical debt do AI\r\nAI có thể tạo nợ kỹ thuật ngầm (trùng lặp, lớp thừa). Review cần đặt câu hỏi bảo trì dài hạn.\r\n\r\n### 4.6 Checklist OWASP khi review code AI\r\nVài mục **OWASP Top 10 (2021)** hay gặp với fresher — mỗi mục: *AI thường sinh sai thế nào* → *cách thẩm định*:\r\n- **A01 Broken Access Control:** AI hay quên kiểm tra chủ sở hữu tài nguyên (user A sửa được dữ liệu user B). → Thẩm định: thử truy cập chéo bằng id của người khác, kiểm tra có check authz ở **mọi** endpoint nhạy cảm.\r\n- **A02 Cryptographic Failures:** AI hash mật khẩu bằng MD5/SHA-1 hoặc lưu plaintext; lộ secret trong code/log. → Thẩm định: bắt buộc **bcrypt/argon2** có salt; secret nằm ở biến môi trường, không hardcode.\r\n- **A03 Injection (SQLi/XSS):** AI nối chuỗi vào câu SQL hoặc render input chưa escape. → Thẩm định: dùng **parameterized query/ORM**, escape/encode output; thử payload `' OR 1=1--` và `<script>`.\r\n- **A05 Security Misconfiguration:** AI bật debug/stacktrace ra production, CORS `*`, header bảo mật thiếu. → Thẩm định: tắt debug ở prod, siết CORS, kiểm header (CSP, HSTS).\r\n- **A06 Vulnerable & Outdated Components:** AI đề xuất thư viện/phiên bản cũ có CVE. → Thẩm định: chạy `npm audit` (hoặc tương đương) và rà phiên bản trước khi cài.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Review chất lượng bám sát spec | Đọc 4.1 để hiểu vì sao câu hỏi gốc luôn là \"code này có làm đúng `SPEC-###` không?\" trước khi xét tới smell, hiệu năng, bảo trì; lấy code bạn đã làm ở M7 ra đối chiếu từng yêu cầu trong spec; tập tách bạch \"sai lệch so với spec\" và \"code smell\" rồi phân loại từng phát hiện; làm **Lab 9.1** để viết review notes có hệ thống | Bạn có một bộ review notes phân loại rõ ràng (đúng/sai spec, smell), biết soi code theo spec thay vì cảm tính | 3h | Lab 9.1 — Review đối chiếu spec |\r\n| 2 | Security-aware review với AI hỗ trợ | Đọc 4.2 để nhận diện các lỗ hổng phổ biến (input không validate, injection SQL/XSS/command, secret hardcode, phân quyền sai, dependency lỗi thời) và lướt qua checklist OWASP ở 4.6; đọc 4.3 để hiểu AI review nhanh nhưng dễ bỏ sót lỗi ngữ cảnh và báo động giả; dùng persona `security-auditor` quét code có lỗ hổng cài sẵn, đồng thời tự đọc tay; đối chiếu hai nguồn xem ai bắt được gì; làm **Lab 9.2** | Bạn có danh sách lỗ hổng kèm mức độ và cách sửa, và biết khi nào tin AI, khi nào cần tự xác minh | 3h | Lab 9.2 — Security review với persona |\r\n| 3 | 2-stage review độc lập & viết Report | Đọc 4.4 để hiểu vì sao người viết code thường \"mù lỗi\" của chính mình và cách subagent/người review độc lập bắt được lỗi đó; đọc 4.5 để đặt câu hỏi về nợ kỹ thuật AI tạo ra (trùng lặp, lớp thừa); thực hành quy trình một bên viết — một bên review độc lập; tổng hợp toàn bộ phát hiện thành `Code Review Report`; làm **Lab 9.3** | Bạn nộp được `Code Review Report` hoàn chỉnh trong `04-Development/` gồm quality issues, security và recommendations | 3h | Lab 9.3 — 2-stage review + Report |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — security review có ràng buộc\r\n```\r\n\"Đóng vai security-auditor. Rà đoạn code sau theo: validate input, injection,\r\nsecret hardcode, phân quyền. Với mỗi phát hiện: mức độ (cao/trung/thấp), dòng,\r\nvà cách sửa. Nếu KHÔNG chắc, ghi 'cần con người xác minh' thay vì khẳng định.\"\r\n```\r\n\r\n### Code có lỗ hổng để mổ xẻ\r\n```javascript\r\napp.get('/user', (req, res) => {\r\n  const q = `SELECT * FROM users WHERE id = ${req.query.id}`; // ❌ SQL injection\r\n  db.query(q).then(r => res.json(r));\r\n});\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 9.1 — Review đối chiếu spec (2.5h):** Review code M7 so với `SPEC-###`; tìm sai lệch, smell. *Kết quả:* review notes phân loại.\r\n\r\n**Lab 9.2 — Security review (2.5h):** Dùng persona `security-auditor` + đọc tay trên code có lỗ hổng cài sẵn; đối chiếu hai nguồn. *Kết quả:* danh sách lỗ hổng + cách sửa.\r\n\r\n**Lab 9.3 — 2-stage review + Report (2.5h):** Một học viên/agent viết, người khác review độc lập; tổng hợp `Code Review Report`. *Kết quả:* report trong `04-Development/` (quality issues, security, recommendations).\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Code Review Report | `04-Development/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Độ sâu review | Bắt smell cơ bản | Đối chiếu spec | Bắt lỗ hổng bảo mật + nợ kỹ thuật |\r\n| **Mức độ thẩm định** | Dùng AI review | Đối chiếu AI vs tay | Bác được báo động giả & bổ sung lỗi AI bỏ sót |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Tin tuyệt đối review của AI.** *Phòng:* 4.3 + đối chiếu đọc tay.\r\n- ⚠️ **Chỉ xem \"chạy được\", bỏ bảo mật.** *Phòng:* checklist 4.2.\r\n- ⚠️ Review chính code mình viết → mù lỗi. *Phòng:* 2-stage (4.4).\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao review là kỹ năng *tăng giá* nhất thời AI?\r\n- AI review tốt hơn người ở điểm nào, kém hơn ở điểm nào?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Mỗi PR Capstone phải có **Code Review Report** trước khi merge.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 3–4 — Code Review & Secure Development, Evaluating AI Artifacts).\r\n- `08-agent-setup-kit/skills-catalog.md` (`/review`, `code-reviewer`, `security-auditor`).\r\n","lab":"# Lab Guide — M9: Code Review & Secure Development\r\n\r\n> Bám module [M9](02-modules/M9-code-review-secure-dev.md). 3 lab · ~9 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nReview là **chốt chặn chất lượng** và là kỹ năng *tăng giá* nhất thời AI. Câu hỏi gốc: *code có đúng `SPEC-###` không?* rồi mới tới smell/bảo mật/bảo trì. Lỗ hổng AI hay tạo: input không validate (injection), secret hardcode, phân qu�yền sai, dependency lỗi thời. Persona AI (`code-reviewer`, `security-auditor`) là **đầu vào**, người là trọng tài cuối. **2-stage review** chống thiên kiến.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Code + test từ M7–M8.\r\n- [ ] Skill persona đã cài (M3). Repo có sẵn 1 file \"lỗ hổng cài đặt\" (giảng viên phát).\r\n\r\n---\r\n\r\n## Lab 9.1 — Review đối chiếu spec (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Bắt sai lệch giữa code và spec.\r\n\r\n📋 **Các bước**\r\n1. Mở code M7 cạnh `SPEC-###`.\r\n2. Đối chiếu từng hành vi/contract; ghi sai lệch & smell.\r\n3. Phân loại: bug · smell · lệch spec.\r\n\r\n✅ **Checkpoint:** Review notes phân loại rõ.\r\n\r\n🔍 **Thẩm định:** Có hành vi nào code làm *khác* spec mà test vẫn xanh không? (Lỗ hổng test.)\r\n\r\n📤 **Nộp:** Review notes.\r\n\r\n---\r\n\r\n## Lab 9.2 — Security review (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Phát hiện lỗ hổng bảo mật.\r\n\r\n📋 **Các bước**\r\n1. Prompt persona security:\r\n   ```\r\n   \"Đóng vai security-auditor. Rà code theo: validate input, injection, secret\r\n   hardcode, phân quyền. Mỗi phát hiện: mức độ, dòng, cách sửa. Nếu KHÔNG chắc,\r\n   ghi 'cần con người xác minh' thay vì khẳng định.\"\r\n   ```\r\n2. **Đọc tay** file \"lỗ hổng cài đặt\" độc lập.\r\n3. Đối chiếu kết quả AI vs đọc tay.\r\n\r\n✅ **Checkpoint:** Danh sách lỗ hổng + cách sửa.\r\n\r\n🔍 **Thẩm định (trọng tâm):** AI có **báo động giả** nào không? Có lỗ hổng nào **AI bỏ sót mà bạn bắt được** (hoặc ngược lại)? Ghi cụ thể.\r\n\r\n📤 **Nộp:** Báo cáo bảo mật.\r\n\r\n---\r\n\r\n## Lab 9.3 — 2-stage review + Report (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Review độc lập + tổng hợp.\r\n\r\n📋 **Các bước**\r\n1. Một người/agent viết, **người khác** review độc lập (không phải người viết).\r\n2. Tổng hợp `Code Review Report`: quality issues, security, recommendations.\r\n\r\n✅ **Checkpoint:** Report đủ 3 phần, gắn về `SPEC-###`.\r\n\r\n🔍 **Thẩm định:** \"Góc nhìn tươi\" của reviewer độc lập bắt được lỗi gì mà người viết bị mù?\r\n\r\n📤 **Nộp:** `Code Review Report` vào `04-Development/` (mỗi PR Capstone cần report trước merge).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn đã đặt chốt chặn chất lượng + bảo mật, và biết **dùng AI review mà không lệ thuộc nó**. Pha A Greenfield khép lại — sẵn sàng bàn giao cho nhóm khác ở Pha B.\r\n"},{"id":"M9.5","title":"Triển khai & Vận hành với AI (CI/CD)","theory":"# M9.5 — Triển khai & Vận hành với AI (Deploy · CI/CD · Observability)\r\n\r\n> **Giai đoạn:** GĐ3 (khép vòng Greenfield) · **CASAN:** Standard\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M7 (code), M8 (test), M9 (review)\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Vòng đời AI-Driven SDLC](09-so-do-truc-quan/01-vong-doi-ai-sdlc.html) (giai đoạn Deployment)\r\n\r\n---\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nKhóa học cho tới đây dừng ở \"PR merged, test xanh\" — nhưng **doanh nghiệp trả lương cho phần mềm CHẠY ĐƯỢC trên production**, không phải code nằm trong repo. Một fresher \"job-ready\" phải biết **đóng gói, kiểm thử tự động (CI), triển khai và vận hành** sản phẩm. Module này khép vòng Greenfield: từ code đã review → **đưa lên chạy thật**. Đúng tinh thần khóa: AI sinh phần lớn cấu hình hạ tầng (Dockerfile, CI, deploy), còn bạn **thẩm định** — vì config hạ tầng do AI sinh rất dễ chứa rủi ro (lộ secret, quyền quá rộng, image phình to).\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Giải thích vì sao \"test xanh\" chưa phải \"đã ship\"; nắm chuỗi build → đóng gói → CI → deploy → vận hành.\r\n- [ ] Dùng AI sinh **Dockerfile** cơ bản và **thẩm định** (image nhỏ, không nhúng secret, không chạy root).\r\n- [ ] Viết một **CI pipeline** (GitHub Actions: lint + test + build) làm quality gate tự động trên PR.\r\n- [ ] **Deploy** sản phẩm lên một PaaS miễn phí; phân biệt môi trường dev/staging/prod; thực hiện **rollback**.\r\n- [ ] Thêm **observability** cơ bản: structured logging + health check endpoint.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| E — Quy trình | Deploy/CI/CD, vòng đời đến vận hành |\r\n| A — Thẩm định | Thẩm định config hạ tầng AI sinh (bảo mật, kích thước) |\r\n| F — Governance | CI làm cổng chất lượng tự động |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Từ \"test xanh\" đến \"chạy trên production\"\r\n\"Done\" thật = người dùng chạm được sản phẩm. Chuỗi: code review xong → **đóng gói** (build artifact / Docker image) → **CI** kiểm tự động → **deploy** lên môi trường → **vận hành & giám sát**.\r\n\r\n### 4.2 Đóng gói với Docker (AI sinh, người thẩm định)\r\n- Dockerfile cơ bản: base image gọn, cài deps, copy code, chạy non-root, expose cổng.\r\n- ⚠️ Thẩm định: **không `COPY .env` / secret vào image**; base image có lỗ hổng không; image có phình to vô lý không (multi-stage build).\r\n\r\n### 4.3 CI cơ bản — quality gate tự động\r\nGitHub Actions chạy mỗi PR: **lint → test → build**. PR đỏ thì không merge. Đây là phiên bản tự động của các cổng chất lượng đã học (M9/M12).\r\n\r\n### 4.4 Môi trường & Deploy & Rollback\r\n- **dev / staging / prod** — vì sao tách; config qua biến môi trường, không hardcode.\r\n- Deploy lên **PaaS miễn phí** (vd Render/Railway/Fly/Vercel — tùy stack).\r\n- **Rollback:** quay về phiên bản trước khi deploy hỏng — kỹ năng vận hành tối thiểu.\r\n\r\n### 4.5 Observability cơ bản\r\n- **Structured logging** (log có cấu trúc, không `console.log` bừa) để truy vết sự cố.\r\n- **Health check** endpoint (`/health`) để biết dịch vụ còn sống.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Đóng gói được sản phẩm Capstone thành Docker image và biết thẩm định rủi ro config AI sinh | Đọc 4.1–4.2 để hiểu vì sao \"test xanh\" chưa phải \"đã ship\" và chuỗi build → đóng gói; bạn dùng prompt mẫu để AI sinh `Dockerfile` (multi-stage, base image alpine, chạy non-root); bạn build & chạy thử container; bạn rà bảo mật từng dòng — có `COPY .env`/secret không, có chạy root không, image có phình to không — rồi sửa lại | Một container chạy được trên máy bạn, kèm ghi chú \"rủi ro đã bắt\" (secret/root/size) đã xử lý | 3h (0:00–3:00) | Lab 9.5.1 |\r\n| 2 | Đưa sản phẩm lên chạy thật với CI làm cổng chất lượng và biết vận hành cơ bản | Đọc 4.3–4.5 để nắm CI quality gate, tách môi trường dev/staging/prod và observability; bạn tạo 1 workflow GitHub Actions (lint + test + build) chạy mỗi PR; bạn deploy lên một PaaS miễn phí (Render/Railway/Fly/Vercel tùy stack) qua biến môi trường; bạn thêm endpoint `/health` và structured logging; bạn cố tình deploy hỏng rồi **rollback** về bản trước | Một PR có CI xanh, một URL deploy hoạt động, endpoint `/health` trả về OK và bạn đã rollback thành công ít nhất 1 lần | 3h (0:00–3:00) | Lab 9.5.2 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — sinh Dockerfile có ràng buộc thẩm định\r\n```\r\n\"Sinh Dockerfile cho app Node này: dùng multi-stage build, base image alpine gọn,\r\nchạy bằng user non-root, KHÔNG copy file .env hay secret vào image, chỉ copy thứ\r\ncần để chạy. Giải thích từng dòng để tôi review.\"\r\n```\r\n\r\n### CI tối thiểu (GitHub Actions)\r\n```yaml\r\n# .github/workflows/ci.yml\r\non: [pull_request]\r\njobs:\r\n  check:\r\n    runs-on: ubuntu-latest\r\n    steps:\r\n      - uses: actions/checkout@v4\r\n      - uses: actions/setup-node@v4\r\n        with: { node-version: 20 }\r\n      - run: npm ci\r\n      - run: npm test\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 9.5.1 — Đóng gói + thẩm định (⏱️ 140'):** Trên sản phẩm Capstone, để AI sinh `Dockerfile`; build & chạy container; **rà bảo mật** (secret? root? image size?) và sửa. *Kết quả:* container chạy được + ghi chú \"rủi ro đã bắt\".\r\n\r\n**Lab 9.5.2 — CI + Deploy + Rollback (⏱️ 140'):** Thêm 1 workflow CI (lint+test+build) chạy trên PR; deploy lên một PaaS miễn phí; thêm `/health`; thử **rollback** về bản trước. *Kết quả:* PR có CI xanh + URL deploy hoạt động + health check.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Dockerfile + ghi chú thẩm định | Repo Capstone + `04-Development/` | file + `[[note]]` |\r\n| CI workflow + URL deploy + `/health` | Repo + `05-Testing/` hoặc `06-Maintenance/` | file + link |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Đóng gói & deploy | Container/deploy chạy | + CI xanh trên PR | + dev/staging/prod, rollback được |\r\n| **Mức độ thẩm định** | Nhận config AI | Đọc & hiểu | Bắt rủi ro bảo mật (secret/root/size) trong config AI sinh |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **`COPY . .`** kéo secret/`.git`/`node_modules` vào image. *Phòng:* multi-stage + `.dockerignore` + thẩm định.\r\n- ⚠️ **Hardcode config theo môi trường.** *Phòng:* biến môi trường.\r\n- ⚠️ **Coi CI là đủ, bỏ review người.** *Phòng:* CI bổ trợ M9, không thay.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao \"test xanh ở máy tôi\" chưa đủ để gọi là \"đã ship\"?\r\n- Config hạ tầng do AI sinh nguy hiểm ở đâu so với code nghiệp vụ?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- **Capstone:** Dockerfile + 1 CI workflow xanh + deploy được + `/health` (cập nhật Definition of Done).\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 1 — Deployment and Operations).\r\n- GitHub Actions docs; tài liệu PaaS miễn phí phù hợp stack nhóm.\r\n","lab":"# Lab Guide — M9.5: Triển khai & Vận hành với AI (Deploy · CI/CD)\r\n\r\n> Bám module [M9.5](02-modules/M9.5-trien-khai-van-hanh.md). 2 lab · ~6 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\n\"Test xanh\" chưa phải \"đã ship\" — doanh nghiệp trả tiền cho phần mềm **chạy trên production**. Chuỗi: code review → **đóng gói (Docker)** → **CI** (lint+test+build mỗi PR) → **deploy** (dev/staging/prod) → **vận hành** (logging + health check + rollback). AI sinh phần lớn config, nhưng **config hạ tầng AI sinh rất dễ chứa rủi ro** (lộ secret, chạy root, image phình to) → bạn phải thẩm định.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Sản phẩm Capstone (hoặc `lab-m3-task-api`) chạy được + có test.\r\n- [ ] Docker cài trên máy; tài khoản GitHub; tài khoản một PaaS miễn phí (Render/Railway/Fly/Vercel — tùy stack).\r\n\r\n---\r\n\r\n## Lab 9.5.1 — Đóng gói + thẩm định (⏱️ 140')\r\n\r\n🎯 **Mục tiêu:** Đóng gói app bằng Docker và bắt rủi ro trong config AI sinh.\r\n\r\n📋 **Các bước**\r\n1. Prompt AI sinh `Dockerfile` (có ràng buộc): *multi-stage, base alpine gọn, user non-root, KHÔNG copy .env/secret, giải thích từng dòng.*\r\n2. Thêm `.dockerignore` (loại `node_modules`, `.git`, `.env`).\r\n3. `docker build` + `docker run`, kiểm app chạy.\r\n4. **Thẩm định:** image có nhúng secret không? chạy root không? kích thước có hợp lý không (`docker images`)?\r\n\r\n✅ **Checkpoint:** Container chạy được; image không chứa secret, không root.\r\n\r\n🔍 **Thẩm định (bắt buộc):** Thử yêu cầu AI một Dockerfile \"nhanh gọn\" KHÔNG ràng buộc → nó có `COPY . .` (kéo cả .env/.git vào image) không? Ghi lại rủi ro bạn bắt được.\r\n\r\n📤 **Nộp:** `Dockerfile` + `.dockerignore` + ghi chú \"rủi ro đã bắt\" vào `04-Development/`.\r\n\r\n🐞 **Lỗi thường gặp:** image quá to → dùng multi-stage build + base alpine.\r\n\r\n---\r\n\r\n## Lab 9.5.2 — CI + Deploy + Rollback (⏱️ 140')\r\n\r\n🎯 **Mục tiêu:** Cổng chất lượng tự động + đưa lên chạy thật + biết quay lui.\r\n\r\n📋 **Các bước**\r\n1. Tạo `.github/workflows/ci.yml`: trên `pull_request` chạy `npm ci` → `npm test` (+ lint nếu có).\r\n2. Mở 1 PR thử → xác nhận CI chạy & chặn merge khi đỏ.\r\n3. Deploy app lên PaaS miễn phí; cấu hình biến môi trường (không hardcode).\r\n4. Thêm endpoint `/health` trả trạng thái.\r\n5. Tạo một thay đổi hỏng → deploy → **rollback** về bản trước.\r\n\r\n✅ **Checkpoint:** PR có CI xanh; URL deploy mở được; `/health` trả OK; rollback thành công.\r\n\r\n🔍 **Thẩm định:** CI có thực sự *chặn* được PR đỏ không? Biến môi trường (secret) có lộ trong log/CI không?\r\n\r\n📤 **Nộp:** Link PR (CI xanh) + URL deploy + ảnh `/health` (mốc Capstone: deploy được + 1 CI xanh).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn đã khép vòng đời: từ code đã review → **chạy thật trên production** với CI làm cổng chất lượng tự động. Và quan trọng: bạn biết **config hạ tầng AI sinh nguy hiểm ở đâu** và thẩm định được nó — không phải config nào AI đưa cũng an toàn để deploy.\r\n"}]},{"name":"Giai đoạn 4 — Phân tầng ứng dụng · Brownfield","color":"#dfa88f","modules":[{"id":"M10","title":"Phân tầng ứng dụng: Greenfield vs Brownfield","theory":"# M10 — Phân tầng ứng dụng: Greenfield vs Brownfield\r\n\r\n> **Giai đoạn:** GĐ4 (Phân tầng ứng dụng) · **CASAN:** Standard\r\n> **Thời lượng:** 3 giờ (1 buổi) · **Tiên quyết:** M4–M9 (đã làm trọn Greenfield)\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Greenfield vs Brownfield](09-so-do-truc-quan/11-greenfield-vs-brownfield.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nHọc viên vừa đi hết một vòng **Greenfield** (xây mới từ BA). Nhưng sự thật phũ phàng: *đa số fresher khi đi làm sẽ vào dự án **Brownfield** — bảo trì codebase có sẵn*, không phải xây mới. Cách dùng AI ở hai bối cảnh **khác nhau căn bản**. Module ngắn này là \"bản lề tư duy\" giúp học viên nhận ra sự khác biệt và chuẩn bị cho M11.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Phân biệt rõ **Greenfield vs Brownfield** trên mọi khía cạnh.\r\n- [ ] Giải thích được vì sao Brownfield phải **\"đọc trước, sửa sau\"** và nêu rủi ro nếu làm ngược.\r\n- [ ] Dùng AI để **đọc-hiểu nhanh một codebase lạ** (reverse-documentation).\r\n- [ ] Nhận diện rủi ro **regression** là rủi ro số 1 của Brownfield.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| E — Quy trình & Phân tầng | Chọn đúng quy trình theo bối cảnh |\r\n| A — Thẩm định | Đọc-hiểu code có sẵn với AI |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Bảng so sánh cốt lõi\r\n| Khía cạnh | 🌱 Greenfield | 🏗️ Brownfield |\r\n|---|---|---|\r\n| Bắt đầu từ | Phân tích nghiệp vụ | Codebase có sẵn — **hiểu trước** |\r\n| Vai trò AI | Sinh mới từ spec | Đọc-hiểu, định vị, sửa an toàn |\r\n| Ngữ cảnh cho AI | Spec/story (vault) | Code hiện hữu + tài liệu + lịch sử Git |\r\n| Rủi ro lớn nhất | Over-engineering, lệch hướng | **Regression** (phá vỡ chức năng cũ) |\r\n| Kỹ thuật chính | Spec-first, TDD | Characterization test, refactor an toàn |\r\n| Vault dùng để | Ghi yêu cầu/thiết kế mới | **Reverse-document** hệ thống cũ |\r\n| Bộ skill | `/spec /plan /build` | `/review /code-simplify` + đọc-hiểu |\r\n\r\n### 4.2 \"Đọc trước, sửa sau\"\r\nVới code có sẵn, sai lầm chí mạng là *sửa khi chưa hiểu*. Quy trình Brownfield: **(1) hiểu** → **(2) bọc lưới an toàn (characterization test)** → **(3) sửa nhỏ** → **(4) chạy lại toàn bộ test**.\r\n\r\n### 4.3 Dùng AI để hiểu codebase\r\nAI giúp đọc nhanh: giải thích module, vẽ sơ đồ phụ thuộc, định vị nơi cần sửa. Nhưng phải *kiểm chứng* — codebase thật hay có \"bẫy\" mà AI hiểu sai.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 (0:00–0:45) | Nắm khác biệt cốt lõi Greenfield vs Brownfield và vì sao phải \"đọc trước, sửa sau\" | Bạn đọc bảng so sánh 4.1 và đối chiếu với vòng Greenfield vừa làm ở M4–M9; bạn nắm quy trình 4 bước của Brownfield (hiểu → bọc lưới an toàn → sửa nhỏ → chạy lại test); bạn hiểu vì sao **regression** là rủi ro số 1 khi sửa code có sẵn | Bạn giải thích được khi nào dùng Greenfield, khi nào dùng Brownfield, và nêu được hậu quả nếu sửa code khi chưa hiểu | 0:45 | — |\r\n| 1 (0:45–2:30) | Dùng AI để đọc-hiểu một codebase lạ và tự kiểm chứng kết quả | Bạn nhận một codebase nhỏ chưa từng thấy; bạn dùng prompt mẫu (mục 6) để AI tóm tắt kiến trúc, liệt kê module, vẽ luồng dữ liệu và chỉ chỗ cần sửa; bạn lưu \"bản đồ hệ thống\" vào `06-Maintenance/`; bạn tự đọc tay xác minh ít nhất 2 điểm AI nói | Bạn có tài liệu onboarding codebase cộng danh sách \"điểm AI hiểu sai / cần kiểm\" — bằng chứng bạn không tin AI tuyệt đối | 1:45 | Lab 10.1 |\r\n| 1 (2:30–3:00) | Tổng kết tư duy phân tầng và chuẩn bị bước sang Brownfield thật ở M11 | Bạn thảo luận: bối cảnh nào bạn sẽ gặp nhiều hơn khi mới đi làm; AI làm tăng hay giảm rủi ro regression; bạn rà lại các điểm AI hiểu sai mình vừa bắt được và rút ra bài học cho dự án thật | Bạn sẵn sàng cho Pha B Capstone (Brownfield) và hiểu vì sao M11 đi sâu vào sửa code an toàn | 0:30 | — |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — hiểu codebase lạ\r\n```\r\n\"Đây là repo [trỏ thư mục]. Hãy: (1) tóm tắt kiến trúc tổng thể, (2) liệt kê\r\nmodule chính & trách nhiệm, (3) vẽ luồng dữ liệu của tính năng X, (4) chỉ chỗ\r\nTÔI nên sửa nếu muốn đổi hành vi Y. KHÔNG sửa gì, chỉ giải thích.\"\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 10.1 — Reverse-document (105 phút):** Mỗi nhóm nhận một codebase nhỏ *chưa từng thấy*. Dùng AI lập \"bản đồ hệ thống\" (kiến trúc, module, luồng), lưu vào `06-Maintenance/`; xác minh ít nhất 2 điểm bằng đọc tay. *Kết quả:* tài liệu onboarding codebase + danh sách \"điểm AI hiểu sai/cần kiểm\".\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| System map / onboarding doc | `06-Maintenance/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Hiểu codebase | Tóm tắt được | Vẽ được luồng | Định vị đúng chỗ sửa + bắt điểm AI hiểu sai |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Áp tư duy Greenfield vào Brownfield** (sửa khi chưa hiểu). *Phòng:* quy trình 4.2.\r\n- ⚠️ **Tin bản đồ AI vẽ tuyệt đối.** *Phòng:* bắt buộc xác minh.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao \"regression\" là nỗi sợ lớn nhất khi bảo trì? AI làm tăng hay giảm rủi ro này?\r\n- Bối cảnh nào bạn sẽ gặp nhiều hơn khi mới đi làm — và bạn đã sẵn sàng chưa?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Chuẩn bị cho **Pha B Capstone (Brownfield)**: nhận codebase nhóm khác, lập system map.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- `00-MASTER-PLAN.md` mục 5 (phân tầng ứng dụng).\r\n","lab":"# Lab Guide — M10: Phân tầng ứng dụng (Greenfield vs Brownfield)\r\n\r\n> Bám module [M10](02-modules/M10-phan-tang-greenfield-brownfield.md). 1 lab · ~3 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\n**Greenfield** (vừa làm) bắt đầu từ BA, rủi ro là over-engineering/lệch hướng. **Brownfield** (đa số việc đi làm) bắt đầu từ **codebase có sẵn**, rủi ro số 1 là **regression**. Quy tắc Brownfield: **đọc trước → bọc lưới (characterization test) → sửa nhỏ → chạy lại toàn bộ test**. AI giúp đọc nhanh codebase, nhưng phải *xác minh* vì code thật có \"bẫy\".\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] **Hoán đổi repo:** nhận codebase Pha A của nhóm khác, **hoặc** dùng repo cho sẵn [`lab-m10-11-brownfield`](10-lab-assets/lab-m10-11-brownfield/).\r\n- [ ] Vault của repo đó (đọc README, `docs-vault/`).\r\n\r\n---\r\n\r\n## Lab 10.1 — Reverse-document codebase lạ (⏱️ 105')\r\n\r\n🎯 **Mục tiêu:** Hiểu nhanh hệ thống chưa từng thấy, có kiểm chứng.\r\n\r\n📋 **Các bước**\r\n1. Trỏ agent vào repo lạ, prompt:\r\n   ```\r\n   \"Đây là repo [trỏ thư mục]. (1) tóm tắt kiến trúc, (2) liệt kê module chính\r\n   & trách nhiệm, (3) vẽ luồng dữ liệu của tính năng X, (4) chỉ chỗ TÔI nên sửa\r\n   nếu muốn đổi hành vi Y. KHÔNG sửa gì, chỉ giải thích.\"\r\n   ```\r\n2. Lập \"system map\" lưu vào `06-Maintenance/`.\r\n3. **Xác minh ≥2 điểm** bằng đọc code thật.\r\n\r\n✅ **Checkpoint:** System map + danh sách \"điểm cần kiểm\".\r\n\r\n🔍 **Thẩm định (trọng tâm):** Có điểm nào **AI hiểu sai/bỏ sót** so với code thật không? (Code thật thường có ngoại lệ.) Ghi lại — đây là lý do không tin bản đồ AI tuyệt đối.\r\n\r\n📤 **Nộp:** System map / onboarding doc.\r\n\r\n---\r\n\r\n## Thảo luận bắc cầu (⏱️ 20')\r\n- Chất lượng bàn giao của nhóm gốc (vault, README, test) ảnh hưởng bạn onboard *dễ hay khó* thế nào? Rút ra bài học gì cho cách BẠN bàn giao?\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn nhận ra: dùng AI cho code lạ **khác hẳn** code mình vừa viết. M11 sẽ bắt tay sửa thật — an toàn.\r\n"},{"id":"M11","title":"Bảo trì & Vận hành dự án có sẵn với AI","theory":"# M11 — Bảo trì & Vận hành dự án có sẵn với AI (Brownfield)\r\n\r\n> **Giai đoạn:** GĐ4 (Brownfield) · **CASAN:** Standard → Automated\r\n> **Thời lượng:** 9 giờ (3 buổi) · **Tiên quyết:** M10\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Greenfield vs Brownfield](09-so-do-truc-quan/11-greenfield-vs-brownfield.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nPhần lớn vòng đời phần mềm là **bảo trì**, không phải xây mới — và đây là nơi fresher sẽ làm việc đầu tiên. Module dạy dùng AI để **sửa lỗi an toàn, thêm tính năng vào code có sẵn, và refactor mà không gây regression**. Trọng tâm: kỷ luật \"bọc lưới an toàn trước khi sửa\". Tri thức bảo trì đẩy về `06-Maintenance/`.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\n- [ ] Phân tích **nguyên nhân gốc (root cause)** của lỗi với AI hỗ trợ.\r\n- [ ] Viết **characterization test** để chốt hành vi hiện tại trước khi sửa.\r\n- [ ] **Refactor an toàn** với AI (test luôn xanh).\r\n- [ ] **Thêm tính năng** vào codebase có sẵn không phá vỡ cái cũ.\r\n- [ ] Vận hành **vòng lặp phản hồi**: feedback/log → phân tích → cải thiện.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| E — Phân tầng | Brownfield thực chiến |\r\n| A — Thẩm định | Chống regression, refactor an toàn |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Quy trình sửa lỗi an toàn\r\n1. Tái hiện lỗi. 2. Dùng AI hỗ trợ tìm root cause (phân tích code/log) — **người xác nhận**. 3. Viết test bắt được lỗi (đỏ). 4. Sửa nhỏ nhất. 5. Test xanh + full suite.\r\n\r\n### 4.2 Characterization test\r\nTest \"chụp ảnh\" hành vi *hiện tại* (kể cả khi chưa rõ đúng/sai) để khi refactor không vô tình đổi hành vi. Lưới an toàn cho code legacy thiếu test.\r\n\r\n### 4.3 Refactor an toàn với AI\r\nThay đổi cấu trúc, giữ hành vi. Quy tắc: test xanh trước và sau mỗi bước; thay đổi nhỏ, có thể revert.\r\n\r\n### 4.4 Thêm tính năng vào Brownfield\r\nHiểu vùng ảnh hưởng trước (từ M10) → viết spec cho thay đổi → TDD trong phạm vi hẹp → regression test toàn cục.\r\n\r\n### 4.5 Vòng lặp phản hồi & bảo trì dự đoán\r\nThu feedback người dùng về vault; AI hỗ trợ phân tích log để cảnh báo sớm; refactor tối ưu định kỳ.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Sửa lỗi an toàn trên code có sẵn mà không gây regression | Đọc 4.1–4.2 để nắm quy trình sửa lỗi an toàn và characterization test; bạn tập tái hiện lỗi rồi dùng prompt mẫu (mục 6) bắt AI đề xuất tối đa 3 giả thuyết root cause kèm bằng chứng — bạn là người xác nhận, không để AI sửa bừa; bạn viết test bắt đúng lỗi (đỏ), sửa nhỏ nhất rồi chạy full suite cho xanh | Bạn có 1 ghi chú incident `INC-###` và 1 PR sửa lỗi với test chứng minh lỗi đã được khắc phục | 3h | Lab 11.1 — Sửa lỗi an toàn |\r\n| 2 | Thay đổi cấu trúc code mà giữ nguyên hành vi | Đọc 4.3 về refactor an toàn; bạn chọn một module rối, bọc characterization test \"chụp ảnh\" hành vi hiện tại TRƯỚC khi sửa; bạn refactor theo từng bước nhỏ có thể revert, chạy test xanh trước và sau mỗi bước; nếu test đỏ thì bạn biết mình suýt gây regression và phải lùi lại | Bạn có code sạch hơn, dễ đọc hơn nhưng hành vi không đổi, được bảo chứng bằng bộ characterization test luôn xanh | 3h | Lab 11.2 — Refactor an toàn |\r\n| 3 | Thêm tính năng vào codebase cũ và vận hành vòng lặp phản hồi | Đọc 4.4–4.5; bạn xác định vùng ảnh hưởng (dùng kỹ năng từ M10), viết spec hẹp cho thay đổi rồi TDD trong phạm vi đó; bạn chạy regression test toàn cục để chắc không phá cái cũ; cuối buổi bạn thu thập feedback, dùng AI hỗ trợ phân tích log và ghi lại vòng lặp phản hồi để cải thiện về sau | Bạn có 1 tính năng mới hoạt động trên code có sẵn kèm báo cáo regression và ghi chú feedback loop | 3h | Lab 11.3 — Thêm tính năng + feedback loop |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — root cause có kiểm soát\r\n```\r\n\"Lỗi: [mô tả + log]. Đề xuất TỐI ĐA 3 giả thuyết nguyên nhân, xếp theo khả\r\nnăng, kèm bằng chứng trong code/log cho mỗi giả thuyết. KHÔNG sửa code. Gợi ý\r\n1 cách kiểm chứng nhanh cho từng giả thuyết.\"\r\n```\r\n\r\n### Minh họa characterization test\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 11.1 — Sửa lỗi an toàn (2.5h):** Trên codebase Pha B, nhận 1 bug; tìm root cause, viết test đỏ, sửa, full suite xanh. *Kết quả:* `INC-###` + PR sửa lỗi.\r\n\r\n**Lab 11.2 — Refactor an toàn (2.5h):** Bọc characterization test quanh một module rối; refactor; test giữ xanh. *Kết quả:* code sạch hơn, hành vi không đổi.\r\n\r\n**Lab 11.3 — Thêm tính năng + feedback (2.5h):** Thêm 1 tính năng nhỏ vào code có sẵn; chạy regression; ghi feedback loop. *Kết quả:* tính năng mới + báo cáo regression.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Incident / maintenance notes | `06-Maintenance/INC-###` | `[[note]]` |\r\n| PR sửa lỗi / tính năng | Repo | code |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| An toàn thay đổi | Sửa được lỗi | Có test bắt lỗi | Có characterization test, 0 regression |\r\n| **Mức độ thẩm định** | Nhận sửa từ AI | Kiểm root cause | Bác giả thuyết sai, chứng minh không regression |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Sửa khi chưa hiểu** → regression. *Phòng:* 4.1–4.2.\r\n- ⚠️ **Để AI \"sửa bừa cho hết lỗi\".** *Phòng:* root cause + test đỏ trước.\r\n- ⚠️ Refactor không có lưới test. *Phòng:* characterization test.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao thêm tính năng vào code cũ thường khó hơn viết mới?\r\n- AI giúp gì nhiều nhất trong bảo trì, và ở đâu nó nguy hiểm nhất?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Hoàn thành **Pha B Capstone**: ≥1 bug fix an toàn + 1 tính năng thêm vào codebase nhận từ nhóm khác.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Ghi chú AI-DLC (Predictive Maintenance).\r\n- `07-obsidian-vault-template/99-Templates/Incident.md`.\r\n","lab":"# Lab Guide — M11: Bảo trì & Vận hành với AI (Brownfield)\r\n\r\n> Bám module [M11](02-modules/M11-bao-tri-van-hanh-voi-ai.md). 3 lab · ~9 giờ.\r\n\r\n---\r\n\r\n## 📖
