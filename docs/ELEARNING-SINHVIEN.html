<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Learning Học viên — AI-Driven SDLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --primary:#f54e00; --primary-active:#d04200;
  --ink:#26251e; --body:#42413b; --muted:#807d72; --muted-soft:#a09c92;
  --hairline:#e6e5e0; --hairline-soft:#efeee8; --hairline-strong:#cfcdc4;
  --canvas:#f7f7f4; --canvas-soft:#fafaf7; --surface:#ffffff; --on-primary:#fff;
  --success:#1f8a65; --warn:#c08532; --info:#3a72b8;
  --code-bg:#f4f3ee;
  --sidebar-w:320px;
  --font-sans:'Inter',system-ui,'Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Fira Code',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--canvas);color:var(--body);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
  background:var(--canvas-soft);border-right:1px solid var(--hairline);
  height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden;
}
.brand{padding:20px 20px 16px;border-bottom:1px solid var(--hairline)}
.brand .dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--primary);margin-right:8px;vertical-align:middle}
.brand h1{font-size:15px;font-weight:700;color:var(--ink);line-height:1.3;letter-spacing:-.2px}
.brand p{font-size:12px;color:var(--muted);margin-top:4px}
.progressbar{height:5px;background:var(--hairline);border-radius:99px;margin-top:12px;overflow:hidden}
.progressbar > i{display:block;height:100%;width:0;background:var(--primary);transition:width .35s ease}
.progresstxt{font-size:11px;color:var(--muted);margin-top:6px}

.search{padding:12px 16px;border-bottom:1px solid var(--hairline)}
.search input{
  width:100%;padding:9px 12px;border:1px solid var(--hairline-strong);border-radius:8px;
  font-family:inherit;font-size:13px;background:var(--surface);color:var(--ink);outline:none;
}
.search input:focus{border-color:var(--primary)}

.nav{flex:1;overflow-y:auto;padding:8px 10px 40px}
.stage{margin-top:14px}
.stage-head{display:flex;align-items:center;gap:8px;padding:6px 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.stage-head .bar{width:14px;height:3px;border-radius:2px}
.modlink{
  display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;
  font-size:13.5px;color:var(--body);line-height:1.35;transition:background .12s;
}
.modlink:hover{background:var(--hairline-soft)}
.modlink.active{background:#fff;box-shadow:inset 0 0 0 1px var(--hairline-strong);color:var(--ink);font-weight:500}
.modlink .id{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--primary);flex:0 0 auto;min-width:30px;padding-top:1px}
.modlink .chk{flex:0 0 auto;width:16px;height:16px;border-radius:5px;border:1.5px solid var(--hairline-strong);margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;background:transparent}
.modlink.done .chk{background:var(--success);border-color:var(--success)}
.modlink.hidden{display:none}

/* ===== Main ===== */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:5;background:rgba(247,247,244,.9);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--hairline);padding:12px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.topbar .crumb{font-size:13px;color:var(--muted);flex:1;min-width:120px}
.topbar .crumb b{color:var(--ink)}
.btn{
  font-family:inherit;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;
  border:1px solid var(--hairline-strong);background:var(--surface);color:var(--ink);cursor:pointer;transition:.12s;
}
.btn:hover{border-color:var(--primary);color:var(--primary)}
.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn.primary:hover{background:var(--primary-active);color:#fff}
.btn.done{background:var(--success);border-color:var(--success);color:#fff}
.menu-toggle{display:none}

.content{max-width:860px;width:100%;margin:0 auto;padding:36px 28px 120px}

/* Welcome / home */
.hero{padding:18px 0 8px}
.hero .eyebrow{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--primary)}
.hero h2{font-size:clamp(26px,4vw,38px);font-weight:400;letter-spacing:-1px;color:var(--ink);line-height:1.12;margin:10px 0 14px}
.hero p{font-size:16px;color:var(--body);max-width:640px}
.stat-row{display:flex;gap:14px;flex-wrap:wrap;margin:26px 0}
.stat{flex:1;min-width:130px;background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:16px 18px}
.stat .n{font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.5px}
.stat .l{font-size:12.5px;color:var(--muted);margin-top:2px}
.howto{background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:20px 22px;margin-top:8px}
.howto h3{font-size:15px;color:var(--ink);margin-bottom:10px}
.howto ol{margin-left:18px;color:var(--body);font-size:14.5px}
.howto li{margin:5px 0}
.stage-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:24px}
.scard{background:var(--surface);border:1px solid var(--hairline);border-radius:12px;padding:16px 18px;cursor:pointer;transition:.15s}
.scard:hover{border-color:var(--primary);transform:translateY(-2px)}
.scard .st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;align-items:center;gap:7px}
.scard .st .bar{width:14px;height:3px;border-radius:2px}
.scard ul{list-style:none;margin-top:10px}
.scard ul li{font-size:13px;color:var(--body);padding:3px 0;display:flex;gap:7px}
.scard ul li .id{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--primary);min-width:30px}

/* ===== Rendered markdown (the lesson) ===== */
.doc{font-size:16px;color:var(--body)}
.doc h1{font-size:clamp(24px,3.4vw,32px);font-weight:600;color:var(--ink);letter-spacing:-.6px;line-height:1.2;margin:0 0 6px}
.doc h2{font-size:21px;font-weight:600;color:var(--ink);letter-spacing:-.3px;margin:34px 0 12px;padding-top:14px;border-top:1px solid var(--hairline-soft)}
.doc h3{font-size:17.5px;font-weight:600;color:var(--ink);margin:24px 0 8px}
.doc h4{font-size:15px;font-weight:700;color:var(--ink);margin:18px 0 6px}
.doc p{margin:12px 0}
.doc strong{color:var(--ink);font-weight:600}
.doc em{font-style:italic}
.doc a{color:var(--primary)}
.doc ul,.doc ol{margin:12px 0 12px 26px}
.doc li{margin:6px 0}
.doc li:has(> input[type=checkbox]){list-style:none;margin-left:-22px}
.doc li > input[type=checkbox]{width:16px;height:16px;margin-right:9px;accent-color:var(--success);vertical-align:-2px}
.doc hr{border:0;border-top:1px solid var(--hairline);margin:28px 0}
.doc blockquote{
  border-left:3px solid var(--primary);background:#fff8f4;border-radius:0 8px 8px 0;
  padding:12px 18px;margin:16px 0;color:var(--body);
}
.doc blockquote p{margin:6px 0}
.doc code{font-family:var(--font-mono);font-size:13.5px;background:var(--code-bg);padding:2px 6px;border-radius:5px;color:#b3360a}
.doc pre{background:#1f1e1a;border-radius:10px;padding:16px 18px;overflow-x:auto;margin:16px 0}
.doc pre code{background:transparent;color:#e8e6df;padding:0;font-size:13px;line-height:1.6}
.doc table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px;display:block;overflow-x:auto}
.doc th,.doc td{border:1px solid var(--hairline-strong);padding:9px 12px;text-align:left;vertical-align:top}
.doc th{background:var(--hairline-soft);font-weight:600;color:var(--ink);white-space:nowrap}
.doc tr:nth-child(even) td{background:var(--canvas-soft)}

.lesson-foot{display:flex;justify-content:space-between;gap:12px;margin-top:48px;padding-top:24px;border-top:1px solid var(--hairline);flex-wrap:wrap}
.lesson-foot .navbtns{display:flex;gap:10px;flex-wrap:wrap}

/* Tabs: Bài giảng / Lab */
.tabs{display:flex;gap:6px;margin-bottom:26px;border-bottom:1px solid var(--hairline);position:sticky;top:50px;background:var(--canvas);z-index:4;padding-top:2px}
.tab{
  font-family:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;
  background:none;border:0;padding:10px 16px;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:.12s;
  display:flex;align-items:baseline;gap:7px;
}
.tab span{font-size:11px;font-weight:500;color:var(--muted-soft)}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
.tab.on span{color:var(--primary)}

/* ===== Responsive ===== */
@media(max-width:880px){
  .sidebar{position:fixed;z-index:30;transform:translateX(-100%);transition:transform .25s;box-shadow:2px 0 24px rgba(0,0,0,.12)}
  .sidebar.open{transform:translateX(0)}
  .menu-toggle{display:inline-flex}
  .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:25}
  .scrim.show{display:block}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="brand" onclick="goHome()" style="cursor:pointer">
      <h1><span class="dot"></span>AI-Driven SDLC</h1>
      <p>Bản học viên · Tự học theo nhịp riêng</p>
      <div class="progressbar"><i id="pbar"></i></div>
      <div class="progresstxt" id="ptxt"></div>
    </div>
    <div class="search"><input id="q" type="search" placeholder="🔎 Tìm module / nội dung…" oninput="filterNav(this.value)" /></div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div class="scrim" id="scrim" onclick="closeNav()"></div>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <button class="btn menu-toggle" onclick="openNav()">☰</button>
      <div class="crumb" id="crumb">Trang chủ</div>
      <button class="btn" id="markBtn" onclick="toggleDone()" style="display:none">Đánh dấu hoàn thành</button>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

/* ============ DATA (nhúng lúc build) ============ */
const COURSE = [{"name":"Giai đoạn 1 — Nền tảng & Bộ não dự án","color":"#9fbbe0","modules":[{"id":"M0","title":"Mindset thời AI + Nghịch lý thẩm định","theory":"# M0 — Mindset thời AI + Nghịch lý thẩm định + CASAN\r\n\r\n> **Giai đoạn:** GĐ1 (Nền tảng) · **CASAN:** Curious → Augmented\r\n> **Thời lượng:** 3 giờ (1 buổi) · **Tiên quyết:** Không\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Mô hình 3 tầng](09-so-do-truc-quan/02-mo-hinh-3-tang.html) · [Thang CASAN](09-so-do-truc-quan/04-thang-casan.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐây là buổi \"định khung tư duy\" cho cả khóa. Nhiều fresher bước vào thời AI với một trong hai thái cực sai: **(a) sợ AI thay thế mình**, hoặc **(b) tin AI tuyệt đối, bấm Accept-All**. Module này thiết lập tư duy thứ ba — đúng đắn: *AI là cộng sự cực nhanh nhưng cần được kiểm tra; giá trị của kỹ sư dịch từ \"gõ code\" sang \"đặc tả + thẩm định + chịu trách nhiệm\".* Buổi học cũng gieo \"nghịch lý thẩm định\" — sợi chỉ đỏ xuyên suốt khóa.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Giải thích **vì sao** chuẩn Fresher thay đổi trong thời AI (từ code-centric → spec-centric).\r\n- [ ] Phân biệt 3 vai trò của AI: **Assistant / Copilot / Collaborator**.\r\n- [ ] Nêu được **năng lực & giới hạn** của AI (đặc biệt hallucination).\r\n- [ ] Phát biểu **nghịch lý thẩm định** và vì sao nó là vấn đề lớn nhất của fresher.\r\n- [ ] Định vị bản thân trên thang **CASAN** và đặt mục tiêu tiến bộ.\r\n- [ ] Phân biệt **Human-in-the-loop** vs **Human-on-the-loop**.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| A — Nền tảng & Thẩm định | Hiểu vì sao phải thẩm định AI |\r\n| F — Tổ chức & Governance | Tư duy Human-in-the-loop |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Vì sao kỹ thuật phần mềm đang đổi\r\n- Trước: giá trị kỹ sư ≈ tốc độ & độ chính xác khi *viết code*.\r\n- Nay: AI viết được phần lớn code → giá trị dịch sang **đặc tả vấn đề, đánh giá giải pháp, chịu trách nhiệm**.\r\n- Hệ quả với fresher: nhà tuyển dụng không còn trả tiền cho \"người gõ code\", mà cho \"người điều phối AI tạo ra phần mềm đúng & an toàn\".\r\n\r\n### 4.2 Ba vai trò của AI\r\n| Vai trò | Mức tự chủ | Ví dụ |\r\n|---|---|---|\r\n| **Assistant** | Trả lời khi được hỏi | \"Giải thích đoạn code này\" |\r\n| **Copilot** | Gợi ý song song khi làm | Tự động hoàn thành hàm |\r\n| **Collaborator/Agent** | Tự thực thi chuỗi việc | \"Triển khai tính năng theo spec này\" |\r\nKhóa học đưa học viên tới mức **Collaborator có kiểm soát**.\r\n\r\n### 4.3 Năng lực & Giới hạn của AI\r\n- **Mạnh:** sinh code/nội dung nhanh, phủ rộng kiến thức, không mệt.\r\n- **Yếu:** *hallucination* (bịa tự tin), thiếu ngữ cảnh dự án, có thể sinh lỗ hổng bảo mật, \"đồng ý\" theo người dùng (sycophancy).\r\n\r\n### 4.4 ⭐ Nghịch lý thẩm định (sợi chỉ đỏ của khóa)\r\n> Mô hình AI-driven đặt cược: *con người sẽ kiểm tra output của AI.* Nhưng fresher là người **chưa đủ trình để kiểm tra**. Bạn không thể review thứ bạn không đủ giỏi để phán xét.\r\n\r\n⇒ Mục tiêu lớn nhất của khóa: **xây năng lực thẩm định** đủ nhanh, để bạn không trở thành \"người bấm Accept-All\".\r\n\r\n### 4.5 Thang trưởng thành CASAN\r\n`Curious → Augmented → Standard → Automated → Native`. Khóa này đưa học viên từ *Curious* (dùng tool rời rạc) tới *Automated* (điều phối agent trong quy trình có kiểm soát).\r\n\r\n### 4.6 Human-in-the-loop vs on-the-loop\r\n- **In-the-loop:** người duyệt từng bước (dùng cho việc rủi ro cao).\r\n- **On-the-loop:** người giám sát tổng thể, can thiệp khi cần (việc rủi ro thấp).\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 (phần A) | Hiểu vì sao nghề kỹ sư phần mềm đang đổi và AI đóng vai trò gì | Bạn đọc mục 4.1–4.3 để nắm vì sao giá trị kỹ sư dịch từ \"gõ code\" sang \"đặc tả + thẩm định\"; phân biệt 3 vai trò Assistant / Copilot / Collaborator; ghi lại điểm mạnh và điểm yếu của AI (nhất là hallucination) | Bạn tự giải thích được bằng lời của mình vì sao chuẩn fresher thay đổi, và liệt kê được 3 vai trò AI kèm ví dụ | ~40 phút | — |\r\n| 1 (phần B) | Tận mắt thấy AI \"sai một cách tự tin\" | Bạn tự chạy demo hallucination ở mục 6: yêu cầu AI dùng hàm `dayjs.businessDaysBetween()` không tồn tại, tin rằng code đúng, rồi chạy thử / đọc docs để lật tẩy; ghi lại cảm giác \"aha\" | Bạn có một ví dụ hallucination tự tay tái tạo và hiểu vì sao không thể tin AI vô điều kiện | ~30 phút | — |\r\n| 1 (phần C) | Nắm \"nghịch lý thẩm định\" — sợi chỉ đỏ của cả khóa | Bạn đọc mục 4.4 và tự đối chiếu: bạn chưa đủ trình để review thứ AI làm, vậy làm sao kiểm tra được? Viết 2–3 dòng phản tư về rủi ro \"Accept-All\" | Bạn phát biểu được nghịch lý thẩm định và vì sao xây năng lực thẩm định là mục tiêu lớn nhất của khóa | ~20 phút | — |\r\n| 1 (phần D) | Luyện kỹ năng phát hiện lỗi AI qua thực hành nhóm | Bạn làm Lab 0.1 \"AI Failure Discovery\" (nhóm 3–4): nhận 3 output AI (code có bug tinh vi, yêu cầu bị bịa thêm, đoạn có rủi ro bảo mật), tìm chỗ sai, giải thích vì sao sai và đề xuất cơ chế kiểm tra | Bạn hoàn thành bảng \"3 lỗi + cách phát hiện\" — đầu vào cho tư duy Governance ở M12 | ~60 phút | Lab 0.1 |\r\n| 1 (phần E) | Tự định vị bản thân và chốt tư duy điều phối AI có kiểm soát | Bạn đọc mục 4.5–4.6, định vị mình trên thang CASAN (Curious → Native), đặt mục tiêu tiến bộ; phân biệt Human-in-the-loop và Human-on-the-loop để biết khi nào duyệt từng bước, khi nào chỉ giám sát | Bạn có bản tự định vị CASAN (\"đang ở mức… / bằng chứng… / mục tiêu cuối khóa…\") để đối chiếu lại ở M14 | ~30 phút | — |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Demo hallucination — \"AI sai một cách tự tin\"\r\nYêu cầu agent dùng một thư viện/hàm **không tồn tại**, quan sát nó bịa ra API rất thuyết phục:\r\n```\r\nPrompt: \"Dùng hàm `dayjs.businessDaysBetween(a, b)` để tính số ngày làm việc\r\ngiữa hai mốc, viết ví dụ hoàn chỉnh.\"\r\n```\r\n\r\n### Khung tự định vị CASAN\r\n```\r\nTôi đang ở mức: [Curious / Augmented / ...]\r\nBằng chứng: ...\r\nMục tiêu cuối khóa: ...\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ~33% (ngoại lệ có chủ đích)\r\n\r\n> ℹ️ M0 là **module định khung tư duy** (buổi đầu tiên) nên nặng demo + thảo luận; tỷ lệ thực hành ~33%. Quy ước ≥70% áp dụng cho các module *kỹ thuật* từ M2 trở đi.\r\n\r\n**Lab 0.1 — AI Failure Discovery (60 phút, nhóm 3–4)**\r\n- **Bối cảnh:** Mỗi nhóm nhận 3 output do AI tạo (1 đoạn code có bug tinh vi, 1 yêu cầu bị \"bịa thêm\", 1 đoạn có rủi ro bảo mật).\r\n- **Yêu cầu:** Tìm chỗ sai, giải thích *vì sao* sai, đề xuất cơ chế kiểm tra để bắt được lỗi đó.\r\n- **Kết quả mong đợi:** Bảng \"3 lỗi + cách phát hiện\" — đầu vào cho tư duy Governance ở M12.\r\n\r\n## 8. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Thần thánh hóa AI** (\"nó luôn đúng\"). *Phòng:* demo hallucination.\r\n- ⚠️ **Bài AI** (\"AI rồi thay hết, học làm gì\"). *Phòng:* 4.1 — giá trị dịch chứ không mất.\r\n\r\n## 9. Câu hỏi thảo luận (Discussion)\r\n- Nếu AI viết 80% code, phần 20% còn lại của con người *quan trọng hơn hay kém quan trọng hơn* trước đây? Vì sao?\r\n- Khi nào bạn nên dùng Human-in-the-loop thay vì on-the-loop?\r\n\r\n## 10. Bài tập về nhà (Homework)\r\n- Viết 1 trang: \"Chân dung kỹ sư phần mềm tôi muốn trở thành sau khóa này\" + bản tự định vị CASAN.\r\n- Tự thử tái tạo một ví dụ hallucination khác và ghi lại.\r\n\r\n## 11. Tài nguyên & Đọc thêm\r\n- Tài liệu tham khảo: Track A (Day 1 — Understanding AI in SE), ghi chú AI-DLC.\r\n- `00-MASTER-PLAN.md` mục 1 (triết lý).\r\n","lab":"# Lab Guide — M0: Mindset thời AI + Nghịch lý thẩm định\r\n\r\n> Bám module [M0](02-modules/M0-mindset-thoi-ai.md). Workshop-style · ~3 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nGiá trị kỹ sư thời AI dịch từ *gõ code* → *đặc tả + thẩm định + chịu trách nhiệm*. AI là cộng sự cực nhanh nhưng **bịa rất tự tin** (hallucination). **Nghịch lý thẩm định:** mô hình AI-driven đặt cược con người kiểm được AI, nhưng người mới lại chưa đủ trình để kiểm. Mục tiêu khóa: xây năng lực thẩm định đủ nhanh. Thang **CASAN**: Curious → Augmented → Standard → Automated.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Một agent/chatbot AI bất kỳ để demo.\r\n- [ ] Gói \"3 output AI\" do giảng viên phát (1 code có bug tinh vi, 1 yêu cầu bị bịa thêm, 1 đoạn có rủi ro bảo mật).\r\n\r\n---\r\n\r\n## Demo mở màn — \"AI sai một cách tự tin\" (⏱️ 30', cả lớp)\r\n📋 **Các bước**\r\n1. Cùng chạy prompt: *\"Dùng hàm `dayjs.businessDaysBetween(a,b)` tính số ngày làm việc giữa 2 mốc, cho ví dụ hoàn chỉnh.\"*\r\n2. Đọc code AI sinh — *cảm giác* nó đúng.\r\n3. Kiểm chứng: tra docs `dayjs` / chạy thử → hàm này **không tồn tại** sẵn.\r\n\r\n🔍 **Thẩm định:** Vì sao bạn (suýt) tin? Dấu hiệu nào lẽ ra phải khiến bạn nghi ngờ?\r\n\r\n---\r\n\r\n## Lab 0.1 — AI Failure Discovery (⏱️ 60', nhóm 3–4)\r\n\r\n🎯 **Mục tiêu:** Rèn phản xạ \"không tin mù\" + thiết kế cách bắt lỗi.\r\n\r\n📋 **Các bước**\r\n1. Mỗi nhóm nhận 3 output AI. Với từng cái: tìm chỗ sai, giải thích **vì sao** sai.\r\n2. Với mỗi lỗi, đề xuất **một cơ chế kiểm tra** để bắt được nó (vd: chạy test, đối chiếu nguồn, đọc docs).\r\n3. Lập bảng `Lỗi | Vì sao sai | Cách phát hiện`.\r\n\r\n✅ **Checkpoint:** Bảng đủ 3 lỗi, mỗi lỗi có cơ chế phát hiện cụ thể.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Loại lỗi nào *khó phát hiện nhất* nếu bạn thiếu nền tảng? Vì sao điều đó nguy hiểm cho fresher?\r\n\r\n📤 **Nộp:** Bảng \"3 lỗi + cách phát hiện\" (đầu vào cho tư duy Governance M12).\r\n\r\n---\r\n\r\n## Tự định vị CASAN (⏱️ 20')\r\n📋 Điền:\r\n```\r\nTôi đang ở mức: [Curious/Augmented/Standard/Automated]\r\nBằng chứng: ...\r\nMục tiêu cuối khóa: ...\r\n```\r\n📤 **Nộp:** Lưu vào hồ sơ cá nhân — sẽ đối chiếu lại ở M14.\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn rời buổi này với một niềm tin đúng: AI mạnh nhưng phải kiểm. Mọi module sau đều quay về câu hỏi: *\"Làm sao tôi biết output này đúng?\"*\r\n"},{"id":"M1","title":"Bộ nhớ dự án: Obsidian + supermemory","theory":"# M1 — Bộ nhớ dự án: Obsidian (+ giới thiệu supermemory)\r\n\r\n> **Giai đoạn:** GĐ1 (Nền tảng) · **CASAN:** Curious → Augmented\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M0\r\n> ℹ️ M1 **dựng Obsidian** (trọng tâm thực hành) và chỉ **giới thiệu khái niệm** supermemory; phần *cài đặt* supermemory thực tế nằm ở **M3**.\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Mô hình 3 tầng](09-so-do-truc-quan/02-mo-hinh-3-tang.html) · [Bộ nhớ kép](09-so-do-truc-quan/05-bo-nho-kep.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nChất lượng output của AI phụ thuộc trực tiếp vào **chất lượng ngữ cảnh** ta đưa cho nó. Module này biến khái niệm trừu tượng \"context engineering\" thành thứ sờ được: học viên dựng **bộ não dự án** — Obsidian vault (tri thức tường minh do người xây) kết hợp ý niệm supermemory (memory tự động của agent). Đây là *hạ tầng tri thức* mà mọi giai đoạn SDLC phía sau sẽ đọc/ghi.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Giải thích nguyên tắc **\"vault chính là ngữ cảnh đưa cho AI\"**.\r\n- [ ] Dựng một **Obsidian vault** theo cấu trúc chuẩn của khóa.\r\n- [ ] Dùng **`[[wikilink]]`**, **frontmatter (status)**, **MOC**, **Templater**.\r\n- [ ] Tạo note từ template (`User_Story`, `ADR`, `Spec`...).\r\n- [ ] Phân biệt vai trò **Obsidian vs supermemory** (bộ nhớ kép).\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| D — Quản trị tri thức | Dựng & vận hành bộ não dự án |\r\n| C — AI-Assisted Engineering | Context engineering nền tảng |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 \"Bộ não thứ 2\" và context engineering\r\nAI không nhớ dự án của bạn. Mỗi lần làm việc, bạn phải *cấp ngữ cảnh*. Thay vì gõ lại mỗi lần, ta lưu tri thức có cấu trúc vào vault và **trỏ AI vào đó**. Vault tốt → AI làm đúng; vault lộn xộn → AI đoán mò.\r\n\r\n### 4.2 Obsidian căn bản\r\n- **Note** = một file Markdown = một đơn vị tri thức.\r\n- **`[[wikilink]]`** = liên kết hai chiều giữa note → tạo \"đồ thị tri thức\".\r\n- **Frontmatter** = metadata YAML đầu file (`status`, `id`, `priority`).\r\n- **MOC (Map of Content)** = note \"mục lục\" điều hướng toàn dự án.\r\n- **Plugin Templater** = chèn template nhanh.\r\n\r\n### 4.3 Cấu trúc vault chuẩn của khóa\r\nTheo `07-obsidian-vault-template/`: `00-Inbox`, `01-Requirements`, `02-Design`, `03-Specs`, `04-Development`, `05-Testing`, `06-Maintenance`, `99-Templates`.\r\n\r\n### 4.4 Quy ước quan trọng cho AI\r\n- Trạng thái `status: draft | reviewed | approved`. **Agent chỉ code khi spec `approved`.**\r\n- Mã định danh: `US-###`, `ADR-###`, `SPEC-###`, `TR-###`.\r\n- Mọi artifact liên kết ngược về story gốc.\r\n\r\n### 4.5 Bộ nhớ kép: Obsidian vs supermemory (giới thiệu)\r\n| | Obsidian | supermemory |\r\n|---|---|---|\r\n| Ai tạo | Người | Agent (tự động) |\r\n| Kiểm soát | Cao, review được | Thấp hơn |\r\n| Dùng cho | Nguồn chân lý (spec/ADR) | Nhớ bối cảnh xuyên phiên |\r\n> Cài đặt supermemory thực tế nằm ở **M3**; ở đây chỉ cần hiểu *vì sao cần cả hai*.\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Hiểu vì sao AI cần ngữ cảnh tốt và dựng được vault đầu tiên | Đọc mục 4.1 để hiểu \"vault chính là ngữ cảnh đưa cho AI\" và khái niệm bộ não thứ 2; nắm 4.2 Obsidian căn bản (note, `[[wikilink]]`, frontmatter, MOC); cài Obsidian rồi copy cấu trúc 8 thư mục chuẩn từ `07-obsidian-vault-template/` qua **Lab 1.1**; bắt đầu liên kết tri thức bằng MOC, wikilink và frontmatter `status` qua **Lab 1.2** | Bạn có một vault mở được với đủ 8 thư mục, một `_MOC.md` điều hướng và 3 note mẫu liên kết chéo hiển thị rõ trong graph view | 3h | Lab 1.1; Lab 1.2 |\r\n| 2 | Tự động hóa việc tạo note bằng template và phân biệt được hai loại bộ nhớ | Cài plugin Templater và tạo 1 `User_Story` + 1 `Feature_Spec` từ template, đặt đúng thư mục qua **Lab 1.3**; đọc mục 4.5 để phân biệt vai trò Obsidian (nguồn chân lý do bạn duyệt) và supermemory (bộ nhớ tự động của agent); tự kiểm lại quy ước 4.4 (`status`, mã định danh) trên các note đã tạo; chốt kiến thức và nhận đề bài về nhà ở mục 10 | Bạn có 2 note đúng định dạng tạo từ template, giải thích được \"vì sao cần cả hai\" loại bộ nhớ, và nắm rõ đề Capstone để bắt đầu | 3h | Lab 1.3 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Ví dụ wikilink + frontmatter\r\n```markdown\r\n---\r\nid: US-001\r\nstatus: approved\r\npriority: high\r\n---\r\n# US-001 — Đặt lịch hẹn\r\nLiên quan: [[SPEC-001]] · [[ADR-001]]\r\n```\r\n\r\n### Minh họa \"vault tốt vs vault tệ\"\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 1.1 — Dựng vault (60 phút):** Cài Obsidian, tạo vault, copy cấu trúc thư mục từ `07-obsidian-vault-template/`. *Kết quả:* vault mở được với 8 thư mục.\r\n\r\n**Lab 1.2 — MOC & liên kết (90 phút):** Tạo `_MOC.md`, thêm 3 note mẫu liên kết chéo bằng `[[ ]]`, gắn frontmatter `status`. *Kết quả:* graph view hiển thị liên kết.\r\n\r\n**Lab 1.3 — Templater (90 phút):** Cài plugin Templater, tạo 1 `User_Story` + 1 `Feature_Spec` từ template. *Kết quả:* 2 note đúng định dạng, đặt đúng thư mục.\r\n\r\n## 8. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Vault thành \"bãi rác\"** ghi chú rời rạc, không liên kết. *Phòng:* bắt buộc MOC + wikilink.\r\n- ⚠️ **Quên `status`** → agent code trên spec chưa duyệt. *Phòng:* quy ước 4.4.\r\n- ⚠️ Nhồi nhiều chủ đề vào 1 note. *Phòng:* \"một note = một đơn vị tri thức\".\r\n\r\n## 9. Câu hỏi thảo luận (Discussion)\r\n- Vì sao tri thức \"được duyệt\" nên ở Obsidian thay vì để agent tự nhớ trong supermemory?\r\n- Một vault như thế nào sẽ khiến AI làm *sai*?\r\n\r\n## 10. Bài tập về nhà (Homework)\r\n- Khởi tạo **vault cho dự án Capstone** của nhóm: cấu trúc thư mục + `_MOC.md` + ít nhất 2 `User_Story` nháp.\r\n\r\n## 11. Tài nguyên & Đọc thêm\r\n- `07-obsidian-vault-template/README.md`\r\n- Obsidian docs (Templater, Dataview).\r\n","lab":"# Lab Guide — M1: Bộ nhớ dự án (Obsidian + supermemory)\r\n\r\n> Bám module [M1](02-modules/M1-bo-nho-du-an.md). 3 lab · ~6 giờ.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nChất lượng output AI = chất lượng ngữ cảnh bạn đưa. Thay vì gõ lại bối cảnh mỗi lần, ta lưu tri thức có cấu trúc vào **Obsidian vault** rồi trỏ AI vào đó. Quy ước cốt lõi: `[[wikilink]]`, frontmatter `status`, `_MOC.md` làm mục lục, **agent chỉ code khi spec `approved`**. Bộ nhớ kép: Obsidian (người, tường minh) + supermemory (agent, tự động — cài ở M3).\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Cài Obsidian.\r\n- [ ] Mở thư mục `../07-obsidian-vault-template/` để tham chiếu cấu trúc & template.\r\n\r\n---\r\n\r\n## Lab 1.1 — Dựng vault (⏱️ 60')\r\n\r\n🎯 **Mục tiêu:** Có một vault đúng cấu trúc khóa học.\r\n\r\n📋 **Các bước**\r\n1. Tạo vault mới trong Obsidian (vd `CapstoneVault`).\r\n2. Tạo 8 thư mục: `00-Inbox 01-Requirements 02-Design 03-Specs 04-Development 05-Testing 06-Maintenance 99-Templates`.\r\n3. Copy 5 template từ `07-obsidian-vault-template/99-Templates/` vào `99-Templates/`.\r\n\r\n✅ **Checkpoint:** Vault mở được, đủ 8 thư mục + 5 template.\r\n\r\n🔍 **Thẩm định:** Mở Graph View — vault rỗng chưa có liên kết. Ghi chú: bạn kỳ vọng đồ thị sẽ thế nào sau M4–M6?\r\n\r\n📤 **Nộp:** Ảnh chụp cấu trúc vault.\r\n\r\n---\r\n\r\n## Lab 1.2 — MOC & liên kết (⏱️ 90')\r\n\r\n🎯 **Mục tiêu:** Biến vault thành mạng tri thức điều hướng được.\r\n\r\n📋 **Các bước**\r\n1. Tạo `_MOC.md` từ mẫu, điền tên dự án.\r\n2. Tạo 3 note thử (vd `US-001`, `SPEC-001`, `ADR-001`) — liên kết chéo bằng `[[ ]]`.\r\n3. Thêm frontmatter `status: draft` cho mỗi note.\r\n4. Trong `_MOC.md`, link tới cả 3.\r\n\r\n✅ **Checkpoint:** Graph View hiện liên kết giữa MOC ↔ 3 note.\r\n\r\n🔍 **Thẩm định:** Thử để `SPEC-001` ở `status: approved` còn `US-001` vẫn `draft` — điều này có hợp lý không? (Spec không nên approved trước khi story rõ.)\r\n\r\n📤 **Nộp:** Ảnh Graph View + `_MOC.md`.\r\n\r\n---\r\n\r\n## Lab 1.3 — Templater (⏱️ 90')\r\n\r\n🎯 **Mục tiêu:** Tạo note chuẩn nhanh.\r\n\r\n📋 **Các bước**\r\n1. Cài plugin **Templater**, trỏ thư mục template về `99-Templates/`.\r\n2. Dùng Templater tạo 1 `User_Story` thật + 1 `Feature_Spec` thật cho dự án Capstone, đặt đúng thư mục.\r\n\r\n✅ **Checkpoint:** 2 note đúng định dạng template, đúng vị trí.\r\n\r\n🔍 **Thẩm định:** So sánh một note tự gõ tay vs note từ template — cái nào AI sẽ \"hiểu\" tốt hơn và vì sao?\r\n\r\n📤 **Nộp:** 2 note trong vault (mốc Capstone: vault khởi tạo).\r\n\r\n🐞 **Lỗi thường gặp:** Templater không chèn được → kiểm cấu hình \"Template folder location\".\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBộ não dự án đã sẵn sàng. Từ M4, mọi artifact SDLC sẽ chảy vào đây và trở thành ngữ cảnh cho agent.\r\n"},{"id":"M2","title":"Nền tảng để thẩm định (Git, Clean Code)","theory":"# M2 — Nền tảng để thẩm định (Git · Clean Code · Đọc hiểu code)\r\n\r\n> **Giai đoạn:** GĐ1 (Nền tảng) · **CASAN:** Augmented\r\n> **Thời lượng:** 9 giờ (3 buổi) · **Tiên quyết:** M0, M1\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Vòng đời AI-Driven SDLC](09-so-do-truc-quan/01-vong-doi-ai-sdlc.html) (xem vai trò \"phán xét\")\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐây là module **trực tiếp giải nghịch lý thẩm định**. Để review được code AI sinh ra, học viên cần một mức nền tảng đủ vững: hiểu Git (để theo dõi & review thay đổi), nắm clean code (để biết \"code tốt trông thế nào\"), và biết **đọc hiểu code** (để phán xét output). Track A bỏ qua phần này vì giả định học viên đã có; chương trình fresher thì **không thể bỏ** — đây là phần khác biệt cốt lõi.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Dùng **Git** thành thạo: branch, commit có nghĩa, diff, PR, đọc review.\r\n- [ ] Nhận diện **code smell** và nguyên tắc clean code (đặt tên, hàm nhỏ, xử lý lỗi).\r\n- [ ] **Đọc hiểu** một đoạn code lạ và tóm tắt được nó làm gì.\r\n- [ ] **Review code do AI sinh** và chỉ ra ít nhất 3 loại vấn đề (bug, smell, bảo mật).\r\n- [ ] Phân biệt \"code chạy được\" và \"code tốt\".\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| A — Nền tảng & Thẩm định | Git, clean code, đọc & review code |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Git — nền tảng để theo dõi & review\r\n- Mô hình: working dir → staging → commit → branch → PR.\r\n- **Commit có nghĩa:** mỗi commit một thay đổi logic, message rõ.\r\n- **Đọc diff & PR:** kỹ năng cốt lõi để review code (kể cả của AI).\r\n- Liên hệ: quy trình \"Finishing a branch\" (Merge / Push & PR / Keep / Discard) ở M7.\r\n\r\n### 4.2 Clean Code — \"code tốt trông thế nào\"\r\n- **Đặt tên** rõ nghĩa; **hàm nhỏ, một việc**; tránh lồng sâu.\r\n- **Xử lý lỗi tường minh**; không nuốt exception.\r\n- **Code smell** điển hình: hàm khổng lồ, trùng lặp, magic number, tên mơ hồ, side-effect ẩn.\r\n\r\n### 4.3 Đọc hiểu code (Code reading)\r\n- Chiến lược: đọc từ entry point → lần theo luồng dữ liệu → nhận diện trách nhiệm từng phần.\r\n- Dùng AI *hỗ trợ* đọc (giải thích đoạn code) nhưng **tự kiểm chứng** — không tin lời giải thích một cách mù quáng.\r\n\r\n### 4.4 Review code AI sinh — checklist nền\r\n1. Có đúng yêu cầu/spec không? (đừng chỉ xem nó chạy)\r\n2. Có bug logic / trường hợp biên bị bỏ?\r\n3. Có code smell / khó bảo trì?\r\n4. Có rủi ro bảo mật (input không validate, secret hardcode)?\r\n5. Có \"bịa thêm\" thứ ngoài yêu cầu?\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Dùng Git để theo dõi và review thay đổi | Bạn nắm mô hình working dir → staging → commit → branch → PR (4.1); bạn tập viết commit có nghĩa (mỗi commit một thay đổi logic, message rõ); bạn luyện đọc diff và mở PR; rồi vào **Lab 2.1** tạo branch, commit nhiều bước và tự review diff của chính mình | Bạn có một PR sạch với lịch sử commit rõ ràng, dễ review | 3h | Lab 2.1 (Git workflow + PR) |\r\n| 2 | Nhận ra \"code tốt trông thế nào\" và biết refactor | Bạn học nguyên tắc clean code: đặt tên rõ nghĩa, hàm nhỏ làm một việc, xử lý lỗi tường minh (4.2); bạn nhận diện các code smell điển hình (hàm khổng lồ, trùng lặp, magic number, tên mơ hồ, side-effect ẩn); trong **Lab 2.2** bạn nhận một file \"code bẩn\", liệt kê smell, refactor (có thể nhờ AI gợi ý) và giải thích từng thay đổi | Bạn có code sạch hơn kèm bảng \"smell → cách sửa\" | 3h | Lab 2.2 (săn code smell + refactor) |\r\n| 3 | Đọc hiểu code lạ và review được code AI sinh | Bạn học chiến lược đọc code từ entry point → lần theo luồng dữ liệu (4.3); bạn dùng AI hỗ trợ đọc nhưng tự kiểm chứng, không tin mù quáng; bạn nắm checklist review nền 4.4 (đúng spec, bug biên, smell, bảo mật, \"bịa thêm\"); trong **Lab 2.3** bạn cho agent sinh một tính năng nhỏ, áp checklist và tìm ≥3 loại vấn đề | Bạn có `Code Review Notes` ghi rõ các vấn đề tìm được (tiền đề cho M9) | 3h | Lab 2.3 (review code AI sinh) |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Ví dụ code smell để mổ xẻ\r\n```javascript\r\n// ❌ Tệ: tên mơ hồ, làm nhiều việc, magic number, không xử lý lỗi\r\nfunction h(d) {\r\n  let r = d * 1.1;             // 1.1 là gì?\r\n  if (r > 1000000) r = r - r * 0.05;\r\n  db.save(r); sendMail(r);     // 2 side-effect ẩn trong hàm \"tính toán\"\r\n  return r;\r\n}\r\n```\r\n\r\n### Prompt dùng AI để ĐỌC code (không phải để tin)\r\n```\r\n\"Giải thích hàm này làm gì, liệt kê các side-effect và trường hợp biên\r\ncó thể bị bỏ sót. KHÔNG sửa code.\"\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 2.1 — Git workflow (2.5h):** Tạo branch, commit nhiều bước có nghĩa, mở PR, tự review diff của mình. *Kết quả:* PR sạch với lịch sử commit rõ ràng.\r\n\r\n**Lab 2.2 — Săn code smell & refactor (2.5h):** Cho một file \"code bẩn\"; học viên liệt kê smell, refactor (có thể nhờ AI gợi ý) và giải thích từng thay đổi. *Kết quả:* code sạch hơn + bảng \"smell → cách sửa\".\r\n\r\n**Lab 2.3 — Review code AI sinh (2.5h):** Cho agent sinh một tính năng nhỏ; học viên áp checklist 4.4, tìm ≥3 loại vấn đề, viết review notes. *Kết quả:* `Code Review Notes` (tiền đề cho M9).\r\n\r\n## 8. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **\"Chạy được là xong\"** — không đọc kỹ. *Phòng:* checklist 4.4 buộc đối chiếu spec.\r\n- ⚠️ **Tin lời AI giải thích code** mà không kiểm. *Phòng:* Lab 2.3 yêu cầu xác minh.\r\n- ⚠️ **Commit \"khủng\"** gộp mọi thứ. *Phòng:* tiêu chí commit có nghĩa.\r\n\r\n## 9. Câu hỏi thảo luận (Discussion)\r\n- \"Code chạy đúng\" và \"code tốt\" khác nhau ở đâu? Cái nào AI dễ làm hơn?\r\n- Vì sao kỹ năng đọc diff lại là kỹ năng *thẩm định* quan trọng nhất thời AI?\r\n\r\n## 10. Bài tập về nhà (Homework)\r\n- Review một PR/commit có sẵn (hoặc do AI sinh) và viết review notes theo checklist 4.4, lưu vào `04-Development/` của vault.\r\n\r\n## 11. Tài nguyên & Đọc thêm\r\n- Pro Git (chương 1–3), tài liệu Clean Code (tóm tắt).\r\n- `08-agent-setup-kit/skills-catalog.md` (persona `code-reviewer`).\r\n","lab":"# Lab Guide — M2: Nền tảng để thẩm định (Git · Clean Code · Đọc code)\r\n\r\n> Bám module [M2](02-modules/M2-nen-tang-tham-dinh.md). 3 lab · ~9 giờ. **Vai trò: leveling/refresher** hướng vào kỹ năng review, không dạy lại từ số 0.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nĐể review được code AI, bạn cần: **Git** (theo dõi & đọc diff), **clean code** (biết \"tốt trông thế nào\"), **đọc hiểu code** (phán xét output). Checklist review nền: (1) đúng spec? (2) bug/biên? (3) smell? (4) bảo mật? (5) bịa thêm? — đây là phiên bản nền của checklist sẽ nâng cấp ở M9.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Git + một IDE.\r\n- [ ] Repo bài tập `lab-m2-dirty-code` (giảng viên phát) chứa code \"bẩn\" + 1 tính năng do AI sinh.\r\n\r\n---\r\n\r\n## Lab 2.1 — Git workflow & đọc diff (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Thành thạo nhánh–commit–PR và **đọc diff** (kỹ năng thẩm định cốt lõi).\r\n\r\n📋 **Các bước**\r\n1. Tạo branch `feature/lab21`.\r\n2. Thực hiện 3 thay đổi nhỏ, mỗi thay đổi **một commit có nghĩa** (message rõ).\r\n3. Mở PR; tự đọc lại toàn bộ diff như một reviewer.\r\n4. Viết 2 nhận xét review trên chính PR của mình.\r\n\r\n✅ **Checkpoint:** PR có ≥3 commit tách bạch, message rõ.\r\n\r\n🔍 **Thẩm định:** Trong diff của bạn, chỗ nào *khó review nhất*? Vì sao diff lớn/gộp lại khiến việc thẩm định code (kể cả của AI) khó hơn?\r\n\r\n📤 **Nộp:** Link PR + review notes.\r\n\r\n---\r\n\r\n## Lab 2.2 — Săn code smell & refactor (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Nhận diện & sửa code smell.\r\n\r\n📋 **Các bước**\r\n1. Mở file \"bẩn\"; liệt kê smell (tên mơ hồ, hàm khổng lồ, magic number, side-effect ẩn, trùng lặp).\r\n2. Refactor (có thể nhờ AI gợi ý) — mỗi thay đổi giải thích lý do.\r\n3. Đảm bảo hành vi không đổi.\r\n\r\n✅ **Checkpoint:** Bảng `smell → cách sửa` + code sạch hơn.\r\n\r\n🔍 **Thẩm định:** Trong các gợi ý refactor của AI, có gợi ý nào *làm sai hành vi* hoặc *thừa* không? Bạn dựa vào đâu để bác?\r\n\r\n📤 **Nộp:** Code refactor + bảng smell vào `04-Development/`.\r\n\r\n---\r\n\r\n## Lab 2.3 — Review code AI sinh (⏱️ 2.5h)\r\n\r\n🎯 **Mục tiêu:** Áp checklist review lên output AI.\r\n\r\n📋 **Các bước**\r\n1. Cho agent sinh một tính năng nhỏ (vd: hàm tính giảm giá).\r\n2. Áp checklist 5 điểm; tìm **≥3 loại vấn đề** khác nhau.\r\n3. Với \"AI giải thích code\", *xác minh* lại bằng đọc tay.\r\n\r\n✅ **Checkpoint:** Review notes phân loại ≥3 vấn đề.\r\n\r\n🔍 **Thẩm định (trọng tâm):** AI giải thích code có chỗ nào *nói sai/làm bạn hiểu lầm* không? Bạn phát hiện bằng cách nào?\r\n\r\n📤 **Nộp:** `Code Review Notes` vào `04-Development/` (tiền đề M9).\r\n\r\n---\r\n\r\n## 🎓 Tổng kết\r\nBạn đã có \"thước đo\" để phán xét code. Đây là nền của toàn bộ năng lực thẩm định mà khóa học theo đuổi.\r\n"}]},{"name":"Giai đoạn 2 — Kỹ thuật Coding Agent","color":"#c0a8dd","modules":[{"id":"M3","title":"Kỹ thuật Coding Agent (Agent Harness)","theory":"# M3 — Kiến trúc & Kỹ thuật Coding Agent (Agent Harness Engineering)\r\n\r\n> **Giai đoạn:** GĐ2 (Kỹ thuật Coding Agent) · **CASAN:** Augmented → Standard\r\n> **Thời lượng:** 12 giờ (4 buổi × 3h) · **Tiên quyết:** M0 (mindset), M1 (vault), M2 (nền tảng để thẩm định)\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Prompt ⊂ Context ⊂ Harness](09-so-do-truc-quan/03-prompt-context-harness.html) · [Harness 5 thành phần + vòng eval](09-so-do-truc-quan/06-harness-5-thanh-phan.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nĐa số người mới dùng AI coding theo kiểu \"chat đại, copy code\". Kết quả thiếu nhất quán và khó kiểm soát. Module này dạy học viên xem coding agent như một **hệ thống có cấu trúc cần được kỹ thuật hóa** — đây chính là **Agent Harness Engineering**: thiết kế bộ khung (rules, context, skills, memory, subagents) *quanh* model để biến một LLM thành agent hiệu quả, *và* đo–tinh chỉnh bộ khung đó như một artifact bậc nhất. Học viên tự tay **lắp ráp + đánh giá một coding agent cho dự án** — nền tảng cho toàn bộ SDLC phía sau, và là nơi giải nghịch lý thẩm định bằng cách *thiết kế sẵn các ranh giới Người–AI*.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Phân biệt **Prompt Engineering · Context Engineering · Harness Engineering** và quan hệ lồng nhau.\r\n- [ ] Định nghĩa **agent harness** và mô tả **5 thành phần** (rules, context, skills, memory, subagents).\r\n- [ ] Viết file **`AGENTS.md`** đặt luật chơi cho dự án (spec-first, TDD, no-placeholder, ranh giới Người–AI).\r\n- [ ] **Trỏ Obsidian vault làm Context** cho agent và giữ \"vệ sinh ngữ cảnh\" (nạp đúng folder/file, tránh nhồi gây loãng).\r\n- [ ] Cài & dùng **skill** từ superpowers / agent-skills trong Antigravity; map slash command vào SDLC.\r\n- [ ] Gắn **supermemory** qua MCP và giải thích phân vai với Obsidian (bộ nhớ kép).\r\n- [ ] Dùng **subagent** để ủy thác việc cơ học, tránh ô nhiễm ngữ cảnh.\r\n- [ ] **Đánh giá & lặp cải tiến harness**: định nghĩa eval task, đo tín hiệu, quy lỗi về đúng thành phần và tinh chỉnh.\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột                   | Năng lực cụ thể                                                        |\r\n| ------------------------- | ---------------------------------------------------------------------- |\r\n| B — Kỹ thuật Coding Agent | Thiết kế & **đánh giá** harness (rules/context/skills/memory/subagent) |\r\n| D — Quản trị tri thức     | Phân vai Obsidian vs supermemory                                       |\r\n| F — Tổ chức & Governance  | Thiết kế checkpoint Người–AI ngay từ harness                           |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Ba tầng kỹ thuật: Prompt → Context → Harness Engineering\r\nBa \"trường phái\" làm việc với AI, **lồng nhau** chứ không cạnh tranh — mỗi tầng phạm vi rộng hơn tầng trước:\r\n\r\n- **Prompt Engineering — \"Nói GÌ với AI?\"** Tối ưu *từ ngữ của một lượt hỏi*: cách diễn đạt, ví dụ mẫu (few-shot), gán vai, định dạng đầu ra. Đơn vị = một prompt. Mạnh nhưng *tức thời, dễ vỡ, không scale*.\r\n- **Context Engineering — \"AI THẤY gì?\"** Tối ưu *thông tin nạp vào cửa sổ ngữ cảnh*: chọn spec/file/tài liệu nào, lấy từ memory/RAG, cấu trúc tri thức (vault), quản lý \"ngân sách\" token, chống nhiễu. Đơn vị = cửa sổ ngữ cảnh của một task. *Bao gồm* prompt nhưng rộng hơn.\r\n- **Harness Engineering — \"AI VẬN HÀNH trong hệ thống nào?\"** Thiết kế *toàn bộ bộ khung quanh model*: rules/guardrails, tools, skills/workflows, subagent, vòng lặp, memory, **và đánh giá**. Đơn vị = cả agent system. *Bao gồm* context engineering như một thành phần.\r\n\r\n| | Prompt Eng | Context Eng | Harness Eng |\r\n|---|---|---|---|\r\n| Câu hỏi cốt lõi | \"Nói gì với AI?\" | \"AI thấy gì?\" | \"AI vận hành trong hệ nào?\" |\r\n| Đơn vị thiết kế | một prompt | cửa sổ ngữ cảnh | cả agent system |\r\n| Phạm vi | từ ngữ, few-shot, vai, format | retrieval, memory, chọn/cấu trúc tri thức, budget token | rules, tools, skills, subagent, loop, **eval** |\r\n| Tồn tại | một lượt | một phiên/task | **bền, tái dùng nhiều dự án** |\r\n| Trong khóa này | prompt bóc tách yêu cầu ([M4](M4-ba-requirements-voi-ai.md)) | Obsidian vault làm ngữ cảnh ([M1](M1-bo-nho-du-an.md)) | AGENTS.md + skills + memory + subagent (M3) |\r\n| Giới hạn | không scale, dễ vỡ | vẫn thủ công mỗi task | cần đầu tư & bảo trì |\r\n\r\n> 🔑 **Quan hệ lồng nhau:** `Prompt ⊂ Context ⊂ Harness`. Ngành tiến hóa từ \"viết prompt khéo\" → \"nạp đúng ngữ cảnh\" → \"kỹ thuật hóa cả hệ thống\". Agent càng tự chủ, **trọng tâm càng dịch lên tầng harness** — đó là lý do module này tồn tại.\r\n>\r\n> ⚠️ Tầng sau **không thay thế** tầng trước: harness tốt vẫn cần *prompt tốt bên trong skill* và *context sạch trong vault*. Học cả ba, nhưng **đầu tư lớn nhất vào harness** vì nó bền và tái dùng được.\r\n\r\n### 4.2 Agent Harness là gì — vì sao \"model giỏi\" chưa đủ\r\n**Harness** = bộ khung quanh model. Công thức chất lượng: **Model + Context + Skills + Memory + Boundaries**. Một model mạnh nhưng thiếu ngữ cảnh dự án, không có quy trình, không nhớ gì, không có ranh giới → vẫn cho output kém. Trong agentic coding, *lợi thế cạnh tranh không nằm ở model (ai cũng dùng model tương tự) mà ở **harness bạn dựng quanh nó***. Học viên dịch chuyển từ \"prompt giỏi\" → \"harness engineering\".\r\n\r\n### 4.3 \"Giải phẫu\" 5 thành phần của harness\r\n1. **Rules (`AGENTS.md`)** — hiến pháp dự án: chuẩn code, điều bắt buộc/cấm, ranh giới Người–AI.\r\n2. **Context** — ngữ cảnh tức thời: Obsidian vault + file mã nguồn liên quan. *Vault tốt = context tốt.*\r\n3. **Skills** — quy trình tái sử dụng (superpowers, agent-skills): `/spec /plan /build /test /review /ship`.\r\n4. **Memory** — supermemory qua MCP: nhớ xuyên phiên. Bổ sung cho Obsidian (xem 4.5).\r\n5. **Subagents** — ủy thác việc cơ học để giữ agent chính tập trung (chống context pollution).\r\n\r\n> Tham chiếu thực hành: `../08-agent-setup-kit/` chứa bản mẫu của cả 5 thành phần — đây chính là **harness kit** của khóa.\r\n\r\n> ⭐ **5 thành phần này TOOL-AGNOSTIC.** Khóa dùng **Antigravity làm ví dụ tham chiếu**, nhưng nguyên lý áp cho *bất kỳ agentic IDE nào* — Cursor, GitHub Copilot, Cline, Gemini CLI… Khi đổi tool, *cách lắp 5 thành phần không đổi*, chỉ đổi vị trí cấu hình. **Học nguyên lý, đừng học UI của một tool.** Phương án B chính thức của khóa: **Cursor** (hoặc **Cline** nếu cần API trả-theo-dùng). Phiên bản các tool đổi liên tục — nếu UI lệch tài liệu, tìm \"rules / custom instructions\", \"MCP\", \"context/@-mention\", \"subagent/composer\" tương ứng.\r\n\r\n### 4.4 Skills là gì \"bên trong\"\r\nMột skill chỉ là **file Markdown mô tả quy trình** (vd: các bước TDD, checklist review). Học viên mở 1–2 skill thật để thấy: AI không \"ma thuật\" — nó làm theo quy trình con người đã mã hóa. Hiểu điều này giúp *tin có cơ sở* và biết khi nào skill không phù hợp.\r\n\r\n### 4.5 Bộ nhớ kép: Obsidian vs supermemory\r\n| | Obsidian | supermemory |\r\n|---|---|---|\r\n| Ai tạo | Người (tường minh) | Agent (tự động) |\r\n| Nội dung | Spec, ADR, story — *được duyệt* | Fact/ngữ cảnh xuyên phiên |\r\n| Kiểm soát | Cao, review được | Thấp hơn, cần thẩm định |\r\n| Dùng cho | Tri thức \"nguồn chân lý\" | Nhớ bối cảnh để đỡ nhắc lại |\r\n\r\n### 4.6 Ranh giới Người–AI thiết kế sẵn\r\nThay vì hy vọng học viên \"nhớ phải review\", ta **mã hóa checkpoint vào rules**: agent phải dừng xin duyệt spec, duyệt plan, duyệt PR. Đây là cách *kiến trúc* giải nghịch lý thẩm định — một harness tốt **nhúng sẵn sự thẩm định**.\r\n\r\n### 4.7 ⭐ Đánh giá & lặp cải tiến Harness (Eval-Driven Harness Engineering)\r\nHarness là **artifact được kỹ thuật hóa và lặp như code** — không phải \"cài một lần xong\". Cách làm:\r\n\r\n1. **Định nghĩa eval task** — 3–5 task đại diện agent phải làm tốt (vd: \"thêm 1 endpoint theo spec\", \"sửa 1 bug nhỏ\", \"viết test cho hàm X\").\r\n2. **Đo tín hiệu** trên mỗi task:\r\n   - *Tuân rules* (compliance): có dừng đúng checkpoint, có theo TDD không?\r\n   - *Pass-first-try*: ra kết quả đúng ngay lần đầu hay phải sửa nhiều lần?\r\n   - *Số lần người phải can thiệp* (ít hơn = harness tốt hơn).\r\n   - *Review pass rate*: output qua review không lỗi nặng?\r\n   - *Chi phí*: token/thời gian.\r\n3. **Quy lỗi về đúng thành phần.** Agent làm sai → hỏi: lỗi do *rules* mơ hồ? *context* thiếu? *skill* sai? *memory* nhiễu? Đây là tư duy debug harness.\r\n4. **Đổi MỘT thứ rồi đo lại (A/B).** Vd: siết một rule → chạy lại eval task → so tín hiệu. Giống TDD nhưng cho *agent setup*.\r\n\r\n> 🔑 Nguyên tắc: *\"Đừng tinh chỉnh harness bằng cảm giác — đo trên eval task.\"* Đây là điểm tách \"người dùng AI\" khỏi \"kỹ sư harness\".\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Hiểu harness là gì và tự đặt luật chơi + ngữ cảnh cho dự án của bạn | Đọc 4.1 để phân biệt Prompt ⊂ Context ⊂ Harness; nắm 4.2–4.3 về công thức Model + Context + Skills + Memory + Boundaries và \"giải phẫu\" 5 thành phần; sau đó tùy biến `AGENTS.md.example` thành rules cho repo mẫu (stack, chuẩn code, hard rules spec-first/TDD/no-placeholder, checkpoint); trỏ agent vào Obsidian vault và chạy một task hai lần (trỏ đúng folder vs nhồi cả vault) để tự cảm nhận \"vệ sinh ngữ cảnh\" | Có `AGENTS.md` ở gốc repo + agent đọc đúng vault; bạn quan sát được agent tuân rules (kể cả khi bạn cố tình phá rule) và ghi chú so sánh \"context tốt vs nhồi loãng\" | 3h | Lab 3.1 |\r\n| 2 | Mở \"ruột\" một skill để dùng skill có hiểu biết, không dùng mù | Đọc 4.4 để thấy skill chỉ là file Markdown mô tả quy trình; cài superpowers + agent-skills; chạy `/spec` rồi `/plan` theo SDLC; mở file Markdown của 1 skill, đọc từng bước và tự trả lời \"vì sao bước này tồn tại\" | Bạn có spec + plan cho task mẫu và một bản tóm tắt \"skill làm gì, vì sao từng bước cần thiết\" — đủ để bạn biết khi nào skill không phù hợp | 3h | Lab 3.2 |\r\n| 3 | Cho agent nhớ xuyên phiên và biết ủy thác việc cơ học cho subagent | Đọc 4.5–4.6 về bộ nhớ kép (Obsidian vs supermemory) và ranh giới Người–AI; gắn supermemory qua MCP, nạp một bộ quy ước thật của `lab-m3-task-api` rồi mở phiên mới giao task MỚI để kiểm agent tự áp quy ước; thử đổi một quyết định và nạp 1 fact sai để thấy memory cũng cần thẩm định; thực hành 3 mẫu subagent (fan-out khảo sát, mechanical executor sinh CRUD, so sánh refactor trực tiếp vs ủy thác); nếu còn thời gian, làm Lab 3.4 viết 1 skill nhỏ của riêng bạn | Agent áp đúng quy ước xuyên phiên và cập nhật được khi mâu thuẫn; bạn có \"system map\" từ fan-out và bằng chứng subagent giữ agent chính sạch ngữ cảnh | 3h | Lab 3.3 (+ Lab 3.4 tùy chọn) |\r\n| 4 | Đo và tinh chỉnh harness như một artifact — hết \"chỉnh bằng cảm giác\" | Đọc 4.7 về Eval-Driven Harness Engineering; tự định nghĩa 3 eval task đại diện; chạy harness hiện tại và ghi tín hiệu (compliance, số lần bạn phải can thiệp, pass-first-try); tìm 1 lỗi, quy về đúng thành phần (rules/context/skill/memory), đổi MỘT thứ rồi chạy lại và so trước/sau | Bạn có \"Harness eval note\" với bảng tín hiệu trước/sau và kết luận thành phần nào cần cải tiến — tư duy kỹ sư harness thay vì \"AI dở\" | 3h | Lab 3.5 |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Trích `AGENTS.md` — hard rule \"spec-first + TDD\"\r\n```markdown\r\n## Quy tắc BẮT BUỘC\r\n1. Spec-first: KHÔNG code khi chưa có SPEC-### `approved` trong vault.\r\n2. TDD: KHÔNG viết code production nếu chưa có test thất bại (RED) trước.\r\n3. Không placeholder: cấm TODO/TBD/\"implement later\".\r\n```\r\n\r\n### Context hygiene — \"vệ sinh ngữ cảnh\"\r\n```\r\nContext TỐT:   trỏ agent đúng folder cho task (vd 03-Specs/SPEC-012 + file code liên quan).\r\nContext LOÃNG: nạp cả vault 500 note → agent lạc hướng, tốn token, dễ sai.\r\nQuy tắc: nạp ĐỦ, không nạp THỪA.\r\n```\r\n\r\n### Đọc \"ruột\" một skill\r\n```\r\nMở file skill /test trong agent-skills → đọc các bước RED-GREEN-REFACTOR.\r\nHỏi học viên: \"Vì sao bước RED (test fail trước) lại bắt buộc?\"\r\n```\r\n\r\n### Debug harness — quy lỗi về thành phần\r\n```\r\nAgent bỏ qua bước test → lỗi ở đâu?\r\n  - Rules không nêu TDD?         → sửa AGENTS.md\r\n  - Skill /build thiếu bước test? → đổi/bổ sung skill\r\n  - Context thiếu spec test cases?→ bổ sung vault\r\nĐổi MỘT thứ, chạy lại eval task, so tín hiệu.\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 3.1 — `AGENTS.md` (Rules) + trỏ Obsidian vault làm Context (90')**\r\n- **Yêu cầu (Rules):** Tùy biến `AGENTS.md.example` thành rules cho repo mẫu: stack, chuẩn code, hard rules (spec-first, TDD, no-placeholder), checkpoint.\r\n- **Yêu cầu (Context):** Trỏ agent vào **Obsidian vault** (vd `./docs-vault/`) làm nguồn ngữ cảnh; chạy một task hai lần — *trỏ đúng folder liên quan* vs *nhồi cả vault* — để thấy khác biệt về chất lượng & độ lạc (context hygiene).\r\n- **Kết quả mong đợi:** `AGENTS.md` ở gốc repo + agent đọc đúng vault; chạy task nhỏ quan sát agent tuân rules (gồm thử phá rule); ghi chú \"context tốt vs nhồi loãng\".\r\n\r\n**Lab 3.2 — Cài & chạy skill theo SDLC (90')**\r\n- **Yêu cầu:** Cài superpowers + agent-skills; dùng `/spec` rồi `/plan`; **đọc Markdown của 1 skill** và tóm tắt quy trình bên trong.\r\n- **Kết quả mong đợi:** Spec + plan; bản tóm tắt \"skill làm gì, vì sao từng bước tồn tại\".\r\n\r\n**Lab 3.3 — Memory (supermemory) + Subagents (100')**\r\n- **Memory (xuyên phiên, thực chiến):** ở \"phiên 1\" nạp một *bộ* quyết định/quy ước thật của `lab-m3-task-api` (quy ước API, kiến trúc, thuật ngữ nghiệp vụ, 1 gotcha). Mở phiên mới, giao **task MỚI** (\"thêm endpoint đánh dấu task overdue\") → kiểm agent **tự áp** các quy ước đã nhớ mà không cần nhắc. Thử **đổi một quyết định** (test xử lý mâu thuẫn/temporal). Thử **nạp 1 fact sai** → thấy memory cũng cần thẩm định, không phải chân lý.\r\n- **Subagents (3 mẫu):** (1) *fan-out khảo sát* — nhiều subagent đọc các module khác nhau của repo → trả tóm tắt → agent chính ghép \"system map\"; (2) *mechanical executor* — sinh boilerplate cho 3 endpoint CRUD tương tự theo plan đã duyệt; (3) *so sánh* làm một refactor lớn trực tiếp ở agent chính (ngữ cảnh phình, chất lượng giảm) vs ủy thác subagent.\r\n- **Kết quả mong đợi:** agent áp đúng quy ước xuyên phiên + cập nhật được khi mâu thuẫn; system map từ fan-out; bằng chứng subagent giữ agent chính \"sạch ngữ cảnh\".\r\n\r\n**Lab 3.4 (tùy chọn) — Viết 1 skill của riêng bạn (60')**\r\n- Viết một skill Markdown nhỏ (vd \"checklist review API VN\") và chạy thử.\r\n\r\n**Lab 3.5 — ⭐ Đánh giá & tinh chỉnh harness (120')**\r\n- **Yêu cầu:** (1) Định nghĩa 3 eval task đại diện. (2) Chạy harness hiện tại, ghi tín hiệu (compliance, số lần can thiệp, pass-first-try). (3) Tìm 1 lỗi, quy về đúng thành phần, **đổi MỘT thứ**, chạy lại, so trước/sau.\r\n- **Kết quả mong đợi:** \"Harness eval note\" ghi bảng tín hiệu trước/sau + kết luận thành phần nào cần cải tiến.\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| `AGENTS.md` của dự án | Gốc repo Capstone | file |\r\n| Ghi chú \"Context: trỏ vault + vệ sinh ngữ cảnh\" | `04-Development/` | `[[note]]` |\r\n| Bản tóm tắt \"bên trong 1 skill\" | `04-Development/` | `[[note]]` |\r\n| Cấu hình bộ nhớ kép (ghi chú) | `04-Development/` | `[[note]]` |\r\n| **Harness eval note** (trước/sau) | `04-Development/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá module (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| **Chất lượng `AGENTS.md`** | Có rules cơ bản | Đủ hard rules + chuẩn code | Có checkpoint Người–AI rõ, sát dự án |\r\n| **Context (vault làm ngữ cảnh)** | Agent đọc được vault | Trỏ đúng folder cho task | Biết tiết chế context, tránh nhồi loãng |\r\n| **Hiểu skill (không dùng mù)** | Chạy được lệnh | Giải thích được 1 skill | Phê phán được khi skill không hợp |\r\n| **Bộ nhớ kép** | Gắn được supermemory | Phân vai đúng với Obsidian | Nêu được rủi ro & ranh giới dữ liệu |\r\n| **Đánh giá harness** | Chạy eval task | Đo được tín hiệu | Quy đúng lỗi về thành phần + cải tiến đo được |\r\n| **Mức độ thẩm định** | Chấp nhận output | Có review | Chủ động thiết kế ranh giới để buộc review |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **\"Chat đại, copy code\"** — không có harness. *Phòng:* luôn có `AGENTS.md` + vault.\r\n- ⚠️ **Dùng skill như bùa chú.** *Phòng:* Lab 3.2 bắt đọc skill.\r\n- ⚠️ **Nhồi mọi thứ vào ngữ cảnh chính** → loãng. *Phòng:* subagent (Lab 3.3).\r\n- ⚠️ **Tinh chỉnh harness bằng cảm giác**, không đo. *Phòng:* eval task (4.7, Lab 3.5).\r\n- ⚠️ **Đưa secret vào supermemory đám mây.** *Phòng:* `supermemory-setup.md` mục 3.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Prompt / Context / Harness Engineering — cái nào bạn đã dùng nhiều nhất? Cái nào cho \"đòn bẩy\" lớn nhất khi dự án lớn dần, và vì sao?\r\n- Nếu mọi người dùng cùng một model, vì sao kết quả lại khác nhau? (→ harness)\r\n- Khi agent làm sai, bạn nên đổ lỗi cho AI hay hỏi \"harness của tôi thiếu gì\"?\r\n- Một agent \"tốt\" nên đo bằng *output đẹp* hay *tín hiệu trên eval task*?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Hoàn thiện harness cho **dự án Capstone**: `AGENTS.md` + skills + memory, kèm **1 harness eval note** (3 eval task + 1 vòng cải tiến).\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- `../08-agent-setup-kit/` (harness kit) — gồm [harness-evaluation.md](08-agent-setup-kit/harness-evaluation.md)\r\n- superpowers: https://github.com/obra/superpowers\r\n- agent-skills: https://github.com/addyosmani/agent-skills\r\n- supermemory: https://github.com/supermemoryai/supermemory\r\n","lab":"# Lab Guide — M3: Kỹ thuật Coding Agent (Agent Harness Engineering)\r\n\r\n> Bám module [M3](02-modules/M3-ky-thuat-coding-agent.md). 5 lab · ~12 giờ. Đối tượng đã có nền tảng → đọc nhanh, làm là chính.\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\n\r\nBa tầng kỹ thuật lồng nhau: **Prompt** (nói gì với AI) ⊂ **Context** (AI thấy gì) ⊂ **Harness** (AI vận hành trong hệ thống nào). Module này ở tầng cao nhất — harness.\r\n\r\n> ⚙️ **Tool-agnostic:** lab này viết theo Antigravity (ví dụ tham chiếu), nhưng **5 thành phần harness áp cho mọi agentic IDE** (Cursor/Copilot/Cline…). Phương án B chính thức: **Cursor**. Tool đổi UI liên tục — nếu lệch, tìm chức năng *tương đương* (rules, MCP, context, subagent). Học nguyên lý, đừng phụ thuộc một tool.\r\n\r\n**Agent harness** = bộ khung bạn dựng *quanh* model để biến LLM thành agent hiệu quả: **Model + Context + Skills + Memory + Boundaries**. Lợi thế không nằm ở model (ai cũng dùng tương tự) mà ở **harness**. Bạn sẽ tự lắp 5 thành phần này quanh Antigravity — **và đo–tinh chỉnh chúng**:\r\n\r\n1. **Rules** (`AGENTS.md`) — hiến pháp dự án (spec-first, TDD, no-placeholder, checkpoint).\r\n2. **Context** — Obsidian vault + file mã nguồn.\r\n3. **Skills** — quy trình tái dùng từ `superpowers` + `agent-skills` (`/spec /plan /build /test /review /ship`).\r\n4. **Memory** — `supermemory` qua MCP (nhớ xuyên phiên).\r\n5. **Subagents** — ủy thác việc cơ học, giữ agent chính sạch ngữ cảnh.\r\n\r\nHarness **không \"cài một lần xong\"** — nó là artifact được lặp như code: định nghĩa eval task → đo tín hiệu → quy lỗi về thành phần → đổi một thứ → đo lại (Lab 3.5). Nguyên tắc xuyên suốt: agent **đề xuất**, bạn **duyệt & chịu trách nhiệm**; harness tốt **nhúng sẵn checkpoint** để buộc thẩm định.\r\n\r\n---\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Antigravity đã cài & đăng nhập.\r\n- [ ] Repo mẫu: `lab-m3-task-api` (API quản lý task tối giản — giảng viên phát).\r\n- [ ] Vault Obsidian của nhóm (từ M1) đặt tại `./docs-vault/` trong repo.\r\n- [ ] Tài khoản supermemory + API key.\r\n- [ ] Đã clone 2 repo skill: `obra/superpowers`, `addyosmani/agent-skills`.\r\n\r\n---\r\n\r\n## Lab 3.1 — `AGENTS.md` (Rules) + trỏ Obsidian vault làm Context (⏱️ 90')\r\n\r\n🎯 **Mục tiêu:** Tạo \"hiến pháp\" (Rules) + lắp **Context** (Obsidian vault) — 2 trong 5 thành phần harness.\r\n\r\n📋 **Các bước**\r\n1. Copy template (repo `lab-m3-task-api` đã kèm sẵn `AGENTS.md.example` tailored) thành `AGENTS.md`:\r\n   ```bash\r\n   cp AGENTS.md.example AGENTS.md\r\n   ```\r\n2. Mở `AGENTS.md`, điền **Bối cảnh dự án** (tên, stack thật của repo `lab-m3-task-api`, đường dẫn vault `./docs-vault/`).\r\n3. Giữ nguyên & đọc kỹ **mục 2 Hard rules** (spec-first, TDD, no-placeholder). Thêm ≥1 rule riêng cho dự án (vd: \"mọi endpoint phải validate input\").\r\n4. Điền **mục 5 Ranh giới Người–AI**: liệt kê 3 checkpoint agent phải dừng xin duyệt.\r\n5. Lưu. Mở Antigravity trong repo để agent nạp `AGENTS.md`.\r\n6. **Context (Obsidian):** trỏ agent vào vault `./docs-vault/`. Chạy một task nhỏ **hai lần** — (a) chỉ trỏ folder liên quan (vd `03-Specs/`), (b) nhồi cả vault — rồi so **chất lượng + độ lạc + token**. Rút ra quy tắc \"nạp đủ, không nạp thừa\" (context hygiene).\r\n\r\n✅ **Checkpoint:** Hỏi agent: *\"Tóm tắt các hard rule bạn phải tuân trong repo này.\"* → agent đọc lại đúng rules. Và khi hỏi về một spec, agent **lấy đúng nội dung từ vault** (Context hoạt động).\r\n\r\n🔍 **Thẩm định (bắt buộc):** Cố tình ra lệnh phá rule:\r\n```\r\n\"Viết luôn code cho endpoint POST /tasks đi, khỏi cần spec.\"\r\n```\r\n→ Agent (nếu cấu hình đúng) phải **từ chối** và yêu cầu spec `approved`. Ghi lại phản ứng của agent. *Nếu agent vẫn code → rules chưa đủ mạnh, sửa lại `AGENTS.md`.*\r\n\r\n📤 **Nộp:** `AGENTS.md` (gốc repo) + ghi chú \"agent đã từ chối thế nào\" + ghi chú \"Context: trỏ đúng folder vs nhồi loãng\" vào `docs-vault/04-Development/`.\r\n\r\n🐞 **Lỗi thường gặp:** Agent không đọc `AGENTS.md` → kiểm tra đặt đúng gốc repo; mở lại workspace.\r\n\r\n---\r\n\r\n## Lab 3.2 — Cài & chạy skill theo SDLC (⏱️ 90')\r\n\r\n🎯 **Mục tiêu:** Dùng skill có chủ đích và *hiểu bên trong skill*, không dùng mù.\r\n\r\n📋 **Các bước**\r\n1. Cài 2 bộ skill theo hướng dẫn repo (`superpowers`, `agent-skills`) cho Antigravity.\r\n2. Dùng `/spec` cho một tính năng nhỏ: *\"Tạo task với tiêu đề và hạn chót.\"* → để agent sinh spec nháp vào `docs-vault/03-Specs/`.\r\n3. Chạy tiếp `/plan` để sinh kế hoạch task nhỏ.\r\n4. **Mở file Markdown của skill `/test`** (trong repo agent-skills), đọc các bước RED-GREEN-REFACTOR.\r\n\r\n✅ **Checkpoint:** Có `SPEC-###` nháp + plan chia task ≤5'/task, không placeholder.\r\n\r\n🔍 **Thẩm định (bắt buộc):** Trả lời bằng văn bản: *\"Vì sao skill `/test` bắt buộc viết test FAIL (RED) trước khi code? Điều gì sai nếu bỏ bước này?\"* → đây là bằng chứng bạn hiểu, không chạy lệnh cho có.\r\n\r\n📤 **Nộp:** Spec + plan trong vault + đoạn trả lời \"bên trong skill\" vào `04-Development/`.\r\n\r\n🐞 **Lỗi thường gặp:** Skill không hiện trong Antigravity → kiểm đường dẫn cài đặt theo README từng repo.\r\n\r\n---\r\n\r\n## Lab 3.3 — Memory (supermemory) + Subagents (⏱️ 100')\r\n\r\n🎯 **Mục tiêu:** Thấy *giá trị thật* của Memory (nhớ & áp dụng xuyên phiên, xử lý mâu thuẫn) và Subagent (giữ agent chính sạch ngữ cảnh) — không chỉ \"nhớ một câu / đổi tên biến\".\r\n\r\n> Làm trên repo `lab-m3-task-api`. Kết nối `supermemory` qua **MCP** trước (theo `../08-agent-setup-kit/supermemory-setup.md`).\r\n\r\n### Phần A — Memory xuyên phiên (40')\r\n1. **Phiên 1 — nạp một *bộ* quyết định dự án** (không chỉ 1 câu). Nói với agent:\r\n   ```\r\n   Ghi nhớ các quyết định của dự án task-api:\r\n   - API: REST, endpoint kebab-case, mã lỗi dạng TASK_NOT_FOUND / TASK_OVERDUE.\r\n   - Kiến trúc: lưu ở SQLite, KHÔNG dùng ORM nặng.\r\n   - Nghiệp vụ: task có trạng thái todo/doing/done; \"overdue\" = quá hạn `due_at`.\r\n   - Gotcha: mọi thời gian lưu UTC, format ISO-8601.\r\n   ```\r\n2. **Đóng phiên → mở phiên mới.** Giao một **task MỚI** (không nhắc lại quy ước):\r\n   ```\r\n   \"Thêm endpoint đánh dấu các task quá hạn.\"\r\n   ```\r\n   → Quan sát agent có **tự áp** kebab-case (`/tasks/mark-overdue`), mã lỗi `TASK_OVERDUE`, so giờ ở UTC — *mà không cần bạn nhắc* không.\r\n3. **Test mâu thuẫn/temporal (điểm mạnh supermemory):** nói *\"Từ giờ chuyển sang Postgres thay cho SQLite.\"* → kiểm phiên sau agent dùng quyết định **mới**, không giữ cái cũ mâu thuẫn.\r\n\r\n✅ **Checkpoint A:** Agent tự áp đúng ≥3 quy ước ở phiên mới; cập nhật đúng khi quyết định đổi.\r\n\r\n🔍 **Thẩm định A (bắt buộc):** Cố tình nạp **một fact SAI** (vd *\"task-api dùng GraphQL\"* trong khi thực ra REST). Phiên sau agent có tin theo & làm sai không? → Bài học: **memory cũng cần thẩm định & vệ sinh; nó không phải chân lý.** Liệt kê 1 loại dữ liệu **không** được đưa vào supermemory (secret/PII) và vì sao.\r\n\r\n### Phần B — Subagents, 3 mẫu (50')\r\n1. **Fan-out khảo sát:** giao 3 subagent đọc 3 vùng khác nhau của repo (vd `routes/`, `db/`, `services/`), mỗi cái trả tóm tắt trách nhiệm → agent chính ghép thành \"system map\". *(Agent chính không phải nhồi toàn bộ code vào ngữ cảnh.)*\r\n2. **Mechanical executor:** sau khi bạn duyệt plan, giao subagent **sinh boilerplate cho 3 endpoint CRUD tương tự** (vd cho một resource `project`).\r\n3. **So sánh có/không subagent:** giao một refactor lớn (vd thống nhất xử lý lỗi toàn bộ routes) **trực tiếp ở agent chính** → quan sát ngữ cảnh phình & chất lượng giảm; rồi làm lại **qua subagent** → so sánh.\r\n\r\n✅ **Checkpoint B:** System map ghép từ fan-out hợp lý; boilerplate đúng mẫu; thấy rõ khác biệt \"loãng vs sạch ngữ cảnh\".\r\n\r\n🔍 **Thẩm định B (bắt buộc):** Kết quả subagent có chỗ nào **ngoài phạm vi / sai** không? Bạn vẫn là người **duyệt cuối** dù việc do subagent làm.\r\n\r\n📤 **Nộp:** Ghi chú bộ nhớ kép (gồm test \"fact sai\") + system map từ fan-out + nhận xét \"có/không subagent\" vào `04-Development/`.\r\n\r\n🐞 **Lỗi thường gặp:** MCP không kết nối → kiểm API key & cấu hình MCP. · Fan-out mà mỗi subagent đọc trùng vùng → phân vùng rõ trước khi giao.\r\n\r\n---\r\n\r\n## Lab 3.4 — Viết skill của riêng bạn (⏱️ 60', mở rộng)\r\n\r\n🎯 **Mục tiêu:** Hiểu skill tới mức tự tạo được.\r\n\r\n📋 **Các bước**\r\n1. Tạo file Markdown skill mới, vd `review-api-vn.md`: checklist review API theo chuẩn VN (validate input, mã lỗi tiếng Việt rõ, không lộ thông tin nhạy cảm).\r\n2. Nạp vào Antigravity, chạy thử trên một endpoint của repo.\r\n\r\n✅ **Checkpoint:** Agent áp đúng checklist bạn viết.\r\n\r\n🔍 **Thẩm định:** Skill của bạn có bắt được lỗi nào mà skill có sẵn bỏ sót không? Ghi lại.\r\n\r\n📤 **Nộp:** File skill + ví dụ kết quả vào `04-Development/`.\r\n\r\n---\r\n\r\n## Lab 3.5 — ⭐ Đánh giá & tinh chỉnh harness (⏱️ 120')\r\n\r\n🎯 **Mục tiêu:** Đo harness của bạn tốt/dở ở đâu và cải tiến *có cơ sở*, không theo cảm giác. Theo [harness-evaluation.md](08-agent-setup-kit/harness-evaluation.md).\r\n\r\n📋 **Các bước**\r\n1. Định nghĩa **3 eval task** đại diện (vd: ET-1 thêm endpoint theo spec; ET-2 sửa 1 bug nhỏ; ET-3 viết test cho 1 hàm).\r\n2. Chạy harness hiện tại trên cả 3 task, **ghi tín hiệu**: compliance (vi phạm rules/task), pass-first-try, số lần bạn phải can thiệp.\r\n3. Chọn **1 lỗi** quan sát được → quy về đúng thành phần (rules? context? skill? memory? subagent?).\r\n4. **Đổi đúng MỘT thứ** (vd siết một rule trong `AGENTS.md`) → chạy lại 3 task → so tín hiệu trước/sau.\r\n5. Viết **Harness Eval Note** theo mẫu trong file harness-evaluation.\r\n\r\n✅ **Checkpoint:** Bảng tín hiệu trước/sau + kết luận thành phần cần cải tiến.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Thay đổi của bạn làm tín hiệu **tốt lên thật** hay chỉ cảm giác? Bằng chứng nào? Nếu một rule mới khiến agent *cứng nhắc/chậm hơn* — đó cũng là phát hiện đáng ghi.\r\n\r\n📤 **Nộp:** `Harness Eval Note` vào `04-Development/` (mốc Capstone: harness có 1 vòng cải tiến đo được).\r\n\r\n🐞 **Lỗi thường gặp:** Đổi *nhiều thứ cùng lúc* → không biết cái nào gây thay đổi. Luôn đổi **một** biến.\r\n\r\n---\r\n\r\n## 🎓 Tổng kết lab M3\r\nSau buổi này bạn có một **agent harness đã được lắp ráp VÀ đánh giá** cho dự án: rules + skills + memory + subagent + một vòng eval cải tiến — sẵn sàng dùng xuyên suốt Pha A Capstone. Quan trọng hơn: bạn đã *chứng kiến* agent tuân/từ chối rules, *hiểu* bên trong skill, và biết **đo–debug harness như một kỹ sư** — không phụ thuộc mù, không tinh chỉnh bằng cảm giác.\r\n"}]},{"name":"Giai đoạn 3 — AI xuyên suốt SDLC · Greenfield","color":"#9fc9a2","modules":[{"id":"M4","title":"BA & Requirements với AI","theory":"# M4 — BA & Requirements với AI\r\n\r\n> **Giai đoạn:** GĐ3 (AI xuyên suốt SDLC · Greenfield) · **CASAN:** Augmented\r\n> **Thời lượng:** 6 giờ (2 buổi) · **Tiên quyết:** M0–M3\r\n\r\n---\r\n\r\n> 🗺️ **Sơ đồ trực quan:** [Lưu đồ BA: Inbox→Story, chống \"bịa\"](09-so-do-truc-quan/07-luu-do-ba.html)\r\n\r\n## 1. Tóm tắt (Why this matters)\r\nMọi dự án phần mềm bắt đầu từ **hiểu đúng vấn đề**. Fresher thường yếu khâu này nhất vì thiếu kinh nghiệm nghiệp vụ. AI giúp biến dữ liệu thô (ghi chú họp, email) thành User Story + Acceptance Criteria nhanh chóng — nhưng cũng rất hay **\"bịa thêm\" yêu cầu** không có thật. Module dạy dùng AI để *tăng tốc phân tích nghiệp vụ* đồng thời *thẩm định để loại bỏ yêu cầu ảo*. Đầu ra nạp thẳng vào `01-Requirements/` của vault.\r\n\r\n## 2. Mục tiêu học tập (Learning Objectives)\r\nSau module này, học viên có thể:\r\n- [ ] Dùng AI **bóc tách** dữ liệu thô (từ `00-Inbox/`) thành User Story chuẩn.\r\n- [ ] Sinh **Acceptance Criteria** dạng Given/When/Then đầy đủ trường hợp biên.\r\n- [ ] Thực hiện **gap analysis** & phát hiện yêu cầu mơ hồ/mâu thuẫn với AI.\r\n- [ ] **Ưu tiên hóa** backlog (vd MoSCoW) có lý lẽ.\r\n- [ ] **Thẩm định** để bắt yêu cầu AI \"bịa thêm\" và mục bị bỏ sót.\r\n- [ ] Phân rã **Epic → User Story** và dựng **chuỗi truy xuất (traceability)**: Business Requirement → Epic → Story → Spec.\r\n- [ ] Dùng **Graph View** phát hiện \"yêu cầu mồ côi\" (story không phục vụ mục tiêu nào / yêu cầu khách chưa rã task).\r\n\r\n## 3. Năng lực đầu ra (Competency mapping)\r\n| Trụ cột | Năng lực cụ thể |\r\n|---|---|\r\n| C — AI-Assisted Engineering | Requirement elicitation với AI |\r\n| A — Nền tảng & Thẩm định | Phát hiện yêu cầu ảo / thiếu sót |\r\n| D — Quản trị tri thức | Ghi requirement vào vault, liên kết |\r\n\r\n## 4. Nội dung lý thuyết (Concepts)\r\n\r\n### 4.1 Từ dữ liệu thô → User Story\r\nQuy trình: nạp ghi chú họp/email vào `00-Inbox/` → yêu cầu AI bóc tách thành story theo template `User_Story` → người duyệt & gắn `status`.\r\n\r\n### 4.2 Acceptance Criteria tốt\r\n- Dạng **Given/When/Then**, đo được, phủ happy path + biên + lỗi.\r\n- Tránh tiêu chí mơ hồ (\"hệ thống phải nhanh\" → \"phản hồi < 500ms ở p95\").\r\n\r\n### 4.3 AI cho Business Analysis\r\n- Backlog refinement, ưu tiên hóa (MoSCoW: Must/Should/Could/Won't).\r\n- **Traceability:** mỗi story liên kết tới spec/test sau này.\r\n- Phát hiện **ambiguity** & **missing requirements** bằng cách hỏi AI \"yêu cầu này còn thiếu gì, mâu thuẫn ở đâu?\".\r\n\r\n### 4.4 ⚠️ Rủi ro đặc thù: \"AI bịa thêm yêu cầu\"\r\nAI hay thêm tính năng hợp lý-nhưng-không-ai-yêu-cầu (scope creep ngầm). **Quy tắc:** mọi story phải truy được về nguồn trong `00-Inbox/`; cái gì không có nguồn → đánh dấu \"cần xác nhận khách hàng\", không tự gắn `approved`.\r\n\r\n### 4.5 Truy xuất ngược (Traceability) & phân rã Epic\r\nĐây là kỹ năng BA cốt lõi mà công cụ thường (Word/Excel/wiki) làm rất khó. Obsidian giải triệt để nhờ **liên kết hai chiều**.\r\n\r\n- **Chuỗi truy xuất:** `Yêu cầu kinh doanh (trong [[Meeting-...]]) → [[EPIC-###]] → [[US-###]] → [[SPEC-###]] → task`. Mỗi mắt xích liên kết ngược về mắt trước.\r\n- **Phân rã Epic:** yêu cầu kinh doanh lớn → tách thành Epic (nhóm tính năng) → mỗi Epic rã thành nhiều Story. Dùng template `Epic`.\r\n- **Săn \"yêu cầu mồ côi\" bằng Graph View:** mở Graph View để *thấy bằng mắt*:\r\n  - Story/tính năng **không link ngược** về Epic hay mục tiêu kinh doanh nào → có thể là *scope creep* (cần bỏ hoặc xác nhận).\r\n  - Yêu cầu khách hàng (trong meeting) **chưa có Story nào** trỏ tới → yêu cầu *bị bỏ sót*.\r\n- **Lợi ích kép:** traceability vừa là tài liệu quản trị, vừa là **công cụ thẩm định** — node mồ côi trên đồ thị chính là dấu hiệu trực quan của bịa/thiếu.\r\n\r\n### 4.6 (Nâng cao) Bàn giao thực thi — Execution Handoff\r\nSau khi Story + AC được chốt trong vault, BA cần **bàn giao xuống đội Dev/quản trị**. Có thể tự động đẩy yêu cầu đã làm sạch sang công cụ quản lý (Jira / Lark / Trello…) qua **API hoặc n8n** để giao task & theo dõi tiến độ.\r\n> ⚠️ Mức **giới thiệu/tùy chọn** cho fresher — trọng tâm vẫn là chất lượng yêu cầu, không phải pipeline automation. Liên hệ [M13](M13-to-chuc-quan-ly-doi-ngu.md) (quy trình đội).\r\n\r\n## 5. Phân bổ buổi học (Session plan)\r\n\r\n> Lộ trình tự học theo buổi. Bạn có thể học theo nhịp riêng — đọc Bài giảng trước, làm Lab, rồi tick \"Hoàn thành\".\r\n\r\n| Buổi | Mục tiêu buổi | Bạn sẽ học & làm gì | Kết quả đạt được | Thời lượng | Lab đi kèm |\r\n|---|---|---|---|---|---|\r\n| 1 | Biến dữ liệu thô thành User Story chuẩn, có bằng chứng nguồn | Đọc 4.1–4.2 để hiểu cách đi từ ghi chú họp/email sang story và thế nào là Acceptance Criteria tốt (Given/When/Then, đo được); bạn dùng prompt mẫu có ràng buộc \"trích câu gốc làm bằng chứng\" để chống AI bịa; sau đó vào Lab 4.1, gom \"gói dữ liệu thô\" trong `00-Inbox/` thành ≥2 Epic, rã mỗi Epic thành Story và tạo ≥5 `US-###` có AC; bạn link Story ↔ Epic ↔ `[[Meeting-...]]` | Trong `01-Requirements/` có ≥2 Epic và ≥5 User Story đã liên kết ngược về nguồn, mỗi story kèm Acceptance Criteria đo được | 3h (0:00–0:40 lý thuyết · 0:40–3:00 Lab) | Lab 4.1 |\r\n| 2 | Thẩm định backlog, ưu tiên hóa và dựng bản đồ truy xuất để bắt yêu cầu bịa/bỏ sót | Đọc 4.3–4.6 để nắm BA với AI, MoSCoW, traceability, phân rã Epic và rủi ro \"AI bịa thêm yêu cầu\"; bạn làm Lab 4.2: chạy prompt gap analysis (bỏ sót biên, mâu thuẫn, mơ hồ), lập bảng MoSCoW, đánh dấu story \"cần xác nhận\"; mở Graph View để tìm story mồ côi và yêu cầu khách chưa có story nào trỏ tới; cuối buổi bạn review chéo với bạn học rồi chốt backlog | Backlog đã ưu tiên (MoSCoW) + bản đồ truy xuất trong Graph View + danh sách \"mồ côi/bỏ sót\" để xác nhận với khách; backlog được chốt sau review chéo | 3h (0:00–0:45 lý thuyết · 0:45–2:30 Lab · 2:30–3:00 review chéo + chốt) | Lab 4.2 (tùy chọn: Lab 4.3 Execution Handoff) |\r\n\r\n## 6. Nội dung chi tiết\r\n\r\n### Prompt mẫu — bóc tách yêu cầu (có kèm ràng buộc chống bịa)\r\n```\r\n\"Đây là ghi chú cuộc họp [dán nội dung]. Hãy bóc tách thành User Story theo\r\nmẫu Là/Tôi muốn/Để. Với MỖI story, trích câu gốc trong ghi chú làm bằng chứng.\r\nNếu một yêu cầu KHÔNG có trong ghi chú, ĐỪNG thêm — thay vào đó liệt kê ở mục\r\n'Câu hỏi cần làm rõ'.\"\r\n```\r\n\r\n### Prompt mẫu — gap analysis\r\n```\r\n\"Rà soát danh sách story sau. Chỉ ra: (1) trường hợp biên bị bỏ sót,\r\n(2) mâu thuẫn giữa các story, (3) yêu cầu mơ hồ không đo được. KHÔNG tự sửa,\r\nchỉ liệt kê để con người quyết định.\"\r\n```\r\n\r\n## 7. Lab / Workshop (Hands-on) — ≥70%\r\n\r\n**Lab 4.1 — Inbox → Epic → User Stories (140 phút):** Cho một \"gói dữ liệu thô\" (ghi chú họp + 2 email khách hàng) trong `00-Inbox/`. Học viên dùng AI: (1) gom yêu cầu thành **≥2 Epic** (template `Epic`); (2) rã mỗi Epic thành Story; tạo ≥5 `US-###` (template `User_Story`) có bằng chứng nguồn + AC; (3) **link** Story ↔ Epic ↔ `[[Meeting-...]]`. *Kết quả:* Epic + Story trong `01-Requirements/` đã liên kết.\r\n\r\n**Lab 4.2 — Gap analysis + Traceability map (110 phút):** Chạy gap analysis, lập bảng MoSCoW, đánh dấu story \"cần xác nhận\". Sau đó **mở Graph View**: tìm (a) story *mồ côi* không trỏ về Epic/mục tiêu nào, (b) yêu cầu khách trong meeting *chưa có story* nào trỏ tới. *Kết quả:* backlog có ưu tiên + bản đồ truy xuất + danh sách \"mồ côi/bỏ sót\" để xác nhận với khách.\r\n\r\n**Lab 4.3 (nâng cao, tùy chọn — 45 phút):** Thử **Execution Handoff**: export backlog đã chốt thành CSV/JSON và (nếu có) đẩy sang Jira/Trello/Lark qua API hoặc một flow n8n đơn giản. *Kết quả:* yêu cầu sạch chảy được sang công cụ giao task. *(Bỏ qua nếu thời gian hạn chế.)*\r\n\r\n## 8. Deliverable (nộp & lưu ở đâu)\r\n| Sản phẩm | Lưu tại | Định dạng |\r\n|---|---|---|\r\n| Epic (nhóm tính năng) | `01-Requirements/EPIC-###` | `[[note]]` |\r\n| User Stories + Acceptance Criteria | `01-Requirements/US-###` | `[[note]]` |\r\n| **Traceability map** + danh sách \"mồ côi/bỏ sót\" | `01-Requirements/` | `[[note]]` + Graph View |\r\n| Requirement Review Notes (gap, mơ hồ) | `01-Requirements/` | `[[note]]` |\r\n\r\n## 9. Tiêu chí đánh giá (Rubric rút gọn)\r\n| Tiêu chí | Đạt | Khá | Tốt |\r\n|---|---|---|---|\r\n| Chất lượng story | Đúng mẫu | AC đầy đủ | Phủ biên + đo được |\r\n| **Mức độ thẩm định** | Nhận story từ AI | Có kiểm bằng chứng nguồn | Bắt được yêu cầu bịa/thiếu, đặt câu hỏi đúng |\r\n\r\n## 10. Lỗi thường gặp & Anti-pattern\r\n- ⚠️ **Nhận nguyên story AI sinh** không kiểm nguồn → scope creep. *Phòng:* ràng buộc \"trích câu gốc\".\r\n- ⚠️ **Acceptance Criteria mơ hồ.** *Phòng:* buộc đo được (4.2).\r\n- ⚠️ **Story/Epic không liên kết** → vault thành \"bãi rác\", mất traceability. *Phòng:* bắt buộc link ngược + kiểm Graph View (4.5).\r\n- ⚠️ **Bỏ qua node mồ côi** trên Graph View. *Phòng:* coi mồ côi là tín hiệu bịa/thiếu cần xử lý.\r\n\r\n## 11. Câu hỏi thảo luận (Discussion)\r\n- Vì sao \"AI bịa thêm yêu cầu\" lại nguy hiểm hơn \"AI bỏ sót yêu cầu\"? Hay ngược lại?\r\n- Làm sao biết một Acceptance Criteria là đủ tốt?\r\n\r\n## 12. Bài tập về nhà (Homework)\r\n- Hoàn thiện backlog cho **Capstone**: ≥8 story có AC + ưu tiên + review notes trong vault.\r\n\r\n## 13. Tài nguyên & Đọc thêm\r\n- Track A (Day 2 — AI-Assisted Requirement Engineering).\r\n- `07-obsidian-vault-template/99-Templates/User_Story.md` · `Epic.md`.\r\n- Sơ đồ: [Lưu đồ BA + chuỗi truy xuất](09-so-do-truc-quan/07-luu-do-ba.html).\r\n","lab":"# Lab Guide — M4: BA & Requirements với AI\r\n\r\n> Bám module [M4](02-modules/M4-ba-requirements-voi-ai.md). 3 lab (1 tùy chọn) · ~6 giờ. Sơ đồ: [Lưu đồ BA + truy xuất](09-so-do-truc-quan/07-luu-do-ba.html).\r\n\r\n---\r\n\r\n## 📖 Đọc nhanh (15')\r\nQuy trình: dữ liệu thô (`00-Inbox/`) → AI bóc tách thành `Epic` → `User_Story` → người duyệt & gắn `status`. **Acceptance Criteria** dạng Given/When/Then, đo được. Rủi ro đặc thù: **AI bịa thêm yêu cầu** (scope creep) → mọi story phải truy được về nguồn; cái gì không có nguồn → đánh dấu \"cần xác nhận\", không tự `approved`.\r\n\r\n**Truy xuất ngược (Traceability):** chuỗi `[[Meeting]]` → `[[EPIC]]` → `[[US]]` → `[[SPEC]]` liên kết hai chiều. Mở **Graph View** thấy ngay *node mồ côi* = story không phục vụ mục tiêu nào (bịa) / yêu cầu chưa rã task (bỏ sót). Đồ thị = công cụ thẩm định trực quan.\r\n\r\n## 🧰 Chuẩn bị\r\n- [ ] Vault Capstone (M1) + agent đã cấu hình (M3).\r\n- [ ] Nạp dữ liệu thô vào `00-Inbox/`: [CAP-1 phòng khám](03-capstone/du-lieu-mau/du-an-dat-lich-phong-kham.md) (hoặc dữ liệu nhóm tự thu).\r\n\r\n---\r\n\r\n## Lab 4.1 — Inbox → Epic → User Stories (⏱️ 140')\r\n\r\n🎯 **Mục tiêu:** Bóc tách yêu cầu chuẩn, có bằng chứng nguồn, phân rã theo Epic & liên kết truy xuất.\r\n\r\n📋 **Các bước**\r\n1. Đưa nội dung `00-Inbox/` cho agent kèm **prompt chống bịa**:\r\n   ```\r\n   \"Đây là ghi chú họp + email [dán]. Gom yêu cầu thành các EPIC (nhóm tính năng),\r\n   rồi rã mỗi Epic thành User Story (mẫu Là/Tôi muốn/Để). MỖI Epic & story phải\r\n   trích câu gốc làm bằng chứng. Yêu cầu KHÔNG có trong nguồn → ĐỪNG thêm, liệt\r\n   kê ở 'Câu hỏi cần làm rõ'.\"\r\n   ```\r\n2. Tạo **≥2 `EPIC-###`** (template `Epic`) + **≥5 `US-###`** (template `User_Story`) trong `01-Requirements/`, mỗi cái có bằng chứng + AC.\r\n3. **Liên kết:** trong mỗi story link `[[EPIC-###]]`; trong mỗi Epic link `[[Meeting-...]]` nguồn. Gắn `status: draft`.\r\n\r\n✅ **Checkpoint:** ≥5 story, mỗi story trích được câu gốc.\r\n\r\n🔍 **Thẩm định (trọng tâm):** Chạy lại không có ràng buộc \"trích câu gốc\" và so sánh — AI có **bịa thêm story nào** khôn
